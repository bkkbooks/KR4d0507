body:
  text: 間居叢稿卷一元蒲道源撰古賦雪軒賦并序延祐四年余與牛君楚臣同官于翰林國史院始獲相識君京師人宰相知其賢而有文以白衣辟用授國史院編修官未幾求去余私謂從君遊者檢閲宋文郁曰第語牛先生云今司文柄者徒欲得君之賢以為此職非責以朝夕奔走期㑹姑少留得俸金以給饘粥可乎文郁以告君曰蒲之意甚厚然吾以早衰不能勉強非不樂此職也但食人之食而不事其事吾不為也遂决辭余聞之深有愧其言暨余承乏國學君使人持雪軒卷求余序引余竊思君之取義於雪其必有深意焉今試以君平昔觀之則夫雪之皓然一色皎而不汚者庸非君之潔乎其掩穢覆瑕者庸非君之有容乎其倐然而集忽爾而釋與時變化者庸非君之出處乎若夫為䅘牟之瑞則君之孜孜講學以善及人者可知矣至如天葩繽紛匪雕匪刻作止疏密飛舞之態而其文章之妙天機所到非有意而為之者似焉宜君之以雪名軒而識者亦以為然也向所謂賢而有文與其翻然而去不以窮達纍其心者於兹而益信噫君子樂道人之善而欲播于歌詠者觀此有以識其大方云既以為之序又從而賦之牛君楚臣以雪名軒太常陳子悉著于篇而又徵文于余也余掇取陳子之所棄者以為言方其𤣥冥用事白晝將夕嚴風乍止同雲坌集天花散墜彌望如一飄然而入吾之户忽爾而縞吾之室余乃掩關退處蟄壞其居蕭蕭騷騷鳴吾竹窗之紙皎皎潔潔映吾棐几之書恍虛白之漸生渺俗慮之絶無當此時也或倚蒲團以聽其聲或據槁梧以觀其色神魂灑然而昭蘇肝膽以之而瑩徹如生乎鴻濛之世與澆風之懸隔如獨立萬物之表脫垢氛而超邈此伯夷采薇於西山求仁而有得而顔子躬四勿之訓已私之盡克之時也歟噫微斯人而與言啜茗飲以冲默四言古詩贈宗石泉相士石以為甃泉居其中塵滓莫染渟滀涵空粵有道人瞭然雙瞳覽物無遁與泉則同氣色顯晦骨相窮通我亦何心爾賦斯容挾術見訪奈豫已翁水落石出一笑相逢五言古詩送鄧明仲之察司書吏鄧生鄉曲英行業雅修整遇事膽輪囷折𠂻言骨鯁匹馬走京師載筆上臺省櫝玉正求沽囊錐初脫穎相望五千里寄聲問幽屏去秋鮮鞍馬過我情味永誰知離别久復此遊從幸一朝忽徵詩遽以行期請云承憲司檄欲往親簿領青雲有餘地白日無停景滿意取功名歸來娛定省張教授盆池石山種梅曲江安靜退閉門但却掃精心砭餘頗復事幽討巉嵓一拳石愛惜如至寶種梅於其巔磽確費天巧殷勤十二冬要看花實好傍人笑我癡我意真自保南枝氷的皪今果慰懷抱無勞歎春遲似比蟠桃早吾聞橘中樂不減商山皓况此大觀中覿面即蓬島何須窮弱水墊沒死枯槁持酒壽先生一醉洗衰老次王仲禮九日感懷韻佳節成虛擲悵如損百金秋菊夕可餐徒為楚騷吟獨有淵明家足以供幽尋淵明家所愛興同無古今眼中人豈乏然各懷其心所以子期沒伯牙應輟琴東籬景依舊白衣奚再臨無酒須謀賖滌此塵埃襟誰能起廢㑹庶令朋盍簪九月十五日李子文席上佳節若為酬分韻得節若書生時時愁富家日日節乘此閒暇時不飲何怡悅樽前三四友年少文愈傑新詩落筆成句句皆清絶酒來不須辭要使頳吾頰菊節過六日友人邀小酌我時適無事來意已不卻賓主情况熟笑談應自若欣然具肴核不豐亦不約沿溪共徘徊秋景正蕭索留連興未闌野鴉啼日落逸題駃騠千里心奔馳追電掣一朝羈維中不能前跛鱉士生天地間出語比稷契豈知與世謬舉足便差跌當途爛羊封空谷白駒潔胡弗事諂諛苦自完氣節曲肱陋巷貧炙手權門熱行藏道所係去取今已决倘佯復何為歌詠自怡悅惟知詩語工遑恤生涯拙間居紀事二首客從長安回敘濶訪鄰里貌悴於去時因而問所以客悲向我言此行幸脫死長安遭飢荒食盡到糠粃升合貴不資珠金何足恃凌晨出求糴于于如櫛比暮歸持空囊菜色皆相似老弱困且羸行隨墻壁倚村墟向昏黑剽掠羣凶起咸云田中麥苗枯無雨水今年如弗收炊爨當易子豫聞重歎嗟禍及乃至此八政食為先周書寓微㫖天下苟有飢稷思若由已梁惠戰國時民粟知移徙一夫不獲所古人心愧耻如何填溝壑遽忍立而視此邦粗偷生唇亡寒及齒嗷嗷食口衆身不親耒耜今朝聽此言徒增驚悸耳古人制昏禮所貴在人倫冠笄年既邁受幣方交親後世雖偷薄十中五猶遵如何至今日彛典俱湮淪男癡已合配女幼皆成姻安知慮夭壽奚暇占吉辰媒妁走市井鼓吹喧城闉百年祗倉卒大事為因循問之何遽然詔云選佳人傳聞至太甚意失非本真正道難化俗訛言易惑民於初苟不慎其末弊將臻寄聲秉鈞者風俗何時淳送齊府判北行北風天欲雪欵樞君話别袖出諸公篇意不容我缺蹇余適丁艱離况轉悲咽情深詎可辭政美難悉說君才信更綀民瘼亦究徹正論當風霜始怒終見恱侯邦居末僚用未盡施設頗聞求間局此行計已决謀此行云善許國奚自潔况今訪落初求治正急切肯將棟梁具小用為扂楔秉鈞方得人此語宜中節送府史竇彥立遷奉元藹藹府中英夫誰可屈指竇君長安人衆論共推美氣和更敏才志鋭方壯齒留胸無芥蒂出語有綱紀一朝過我辭試問其所以廟堂新立法為吏互遷徙簡書迫程期信宿不容止門當道途旁所幸還鄉里聞之心惘然别緒紛莫理一杯送歸韉一言贈吾子人生重名節不義深可恥青雲路雖高欲致由踐履去去宜勉旃好音行洗耳次德衡弟韻五首古道不可作轉覺澆風長人心所去就但與時炎凉燕石藏十襲連城遺路傍汝賢乃迂濶汝直成狂徉世味鼎一臠人爭染指嘗伊我淡無慮簞瓢身世忘處汚奚害潔視變皆為常彼哉聲利徒末路空皇皇羲和破凛冽可愛固其宜晨興盥漱罷茅簷與相期晴光亂錦繡口有難言詩溫然寓天理令人蕩邪思苦恨白晝短忽忽光隂移冬者歲之餘為學當及時禮樂三千字他年對丹墀萬物長養極歸根以成冬四時只如此鬱鬱南山松猶人內主敬外貌嚴而恭肯隨桃李花嬌靚為君容澗壑老不悔工師非願逢用心欲剛明為學貴專靜人之不已知於吾奚所病風月自清間篇章足歌詠鐘鼎與山林從來各天性其肯枉尺尋獲罪於前聖蓍龜無庸决去取豫能定古人進道心如水朝東勢滔滔晝夜間欲已而不已明德與新民顛沛必于是吁嗟朱子沒道統誰能嗣年馳志弗立豈不增驚悸學而徒為人固非分內事區區斗筲才恃彼詞鋒利簡德衡弟戒飲人生有秉彛尤物害之極麯蘖本致和為禍亦云劇夏后防其源遂見疏儀狄周公戒淫湎作誥何諄悉大則國政隳小則家業失甚則遭戮辱否則成痼疾書傳之所載厯厯記疇昔如何後來者乃循覆車迹吾弟頗涉獵豈不增夕愓憶余自童幼杯杓素所嫉無何人強勉頗亦開涓滴當其下喉時惡藥與沙礫方知酩酊中特賴扶持力苟若輕放肆野馬恣奔逸聞汝以此戒令我喜折屐雖能勇于始其末烏可必莫學醉伯倫婦言非所恤餞杜仲正經厯美解東歸脫屣蘭省掾曵裾蓮幕賓胸中自水鏡筆底皆陽春面無喜愠色口不臧否人餘事及文翰出語清絶塵佳篇屢貽我玉唾光猶新寒齊坐移晷傾寫見情真瓜期遽云代歸意浩無垠渺渺關山路皚皚霜雪晨留之不肯住握手但酸辛後㑹知何時别離宜自珍題竹雀圖昔聞丹穴雛棲梧而食竹要看五色羽輝映森森玉歲晚不一逢黃雀乃見辱此君初無心汝得暫棲宿壽甫教授徵余文漫成二首人生天地間分定不可移得亦胡為喜失亦胡為悲我今兩俱置順適了無疑惟餘樂善心蚤夜以孳孳我本空疏人虛名謾驚俗外誇實未充內省恆自恧已然知奈何勤學補不足庶用期寡過慕榮非所欲贈雪梅相者天爵人不修妄意希富貴縱然貌可取其中復何謂道人慎許可更當窮本原子游裴行儉豫乃無間言贈月軒日者月軒挾術遊言論非剽竊星策相命書一理皆貫徹為人推禍福吻若合符節豈比浮誇徒枯中但饒舌寄太子賓客王山木公昔解郡紱漢中久盤桓江山發令姿草木有榮觀逸興超物表清辭落毫端而豫等燕雀何幸隨鳳鸞間居侍函丈議論驚層瀾或時舉玉趾乘興看藥欄優哉聊卒歲俯仰天地寬胡為召檄至去住處尤難義有不可辭促裝對金鑾儲君得正士學問資甘盤固知神明相獲遂寢食安恨無飛仙藥使我生羽翰一往見顔色晨昏奉清歡題田氏壽母詩卷啜菽胡可樂列鼎胡可悲蓋以親為心貧富安足移田君偉男子母老鶴髮垂立身掾冬官祿養諧心期金巵獻壽祉綵服為兒嬉慈顔自怡悅堂上春熙熙八秩又四稔康寧殊未衰晚福方川增㑹當慶期頥題袁氏忍恕堂袁氏敞華構而以忍恕名求詩發其義為子且細評治家苟不忍觸事成乖爭待人苟不恕施舍違常情癡聾可作翁和順無操兵立心務寬綽潔矩皆方平同族歡弗問在邦怨奚生朂哉事斯語千古垂芳聲陜州盧知事服闋從仕忠孝欲俱立在人良亦難歸養失委質出仕曠問安進退求一可重輕察兩端見危當致命處常易休官盧君佐戎幕陟岵時長歎豈以升斗祿而忘菽水歡挂冠奉甘㫖具衣適燠寒愛日既云久號天復吞酸終制始從調國光再來觀識面詢所履敢為武辨看資爾事父敬葵傾寸心丹庶完終始節令名垂不刋額森特穆爾承㫖先塋樹碑堂堂開府公接士如不及天教長詞林聲譽何洋溢收羅得英彥燦若瑚璉質載筆登鑾坡贊助誠有益念切知己報此身寧自惜矧兹武穆王帝室勳業岌詔許樹豐碑文章爛星日君行從所主光彩動鄉邑便私非素心相事無遺力歲晚期斾還扶搖看摶翼題泣麟圖孔子不得位麟出非其時感而作春秋絶筆亦在兹拭面固無取心亦含深悲麟名自此著聖為百世師彼皆草木腐此獨日星垂仰德罄終古不泯惟民彛萱春堂寸草至微物發生待春暉惟人有此身豈不感慈闈育我顧復我須臾無暫違教誨至成立獲此食與衣罔極恩難報竭力猶庶幾三復郊也句餘情重依依緋衣兩昆季純孝知所希有賴憲幕賢扁堂乃發揮令我撫卷歎遙瞻白雲飛噫歟微斯人吾誰與同歸題雍氏通𤣥類證續編為醫本濟世不善或費人弗學亦云已學則窮本真有生羅衆疾傷寒最危身隂陽及虛實務要識所因毫釐少差失生死分夕晨雍君業難素授若岐黃親類證著續編張門有忠臣百問指諸掌條理細敷陳刋之使行世信無夭折民斯人用心溥奚問越與秦始知天地間通貫乃為仁撫卷重歎息我志何時伸送翰林沙知印之武州倅沙君西域英言動安且詳久矣被推擇登兹白玉堂日與羣彥集職恭持印章年滿當補外五馬分輝光豈惟我志得要覩斯民康異時樹風猷無愧漢循良題何氏孝友義士詩卷人生天地間萬殊一本原由親洎疏逺施有隆殺恩我觀曹溪何衮衮來慶源相承盡積德仁念心所根四世弗異爨一家無間言孝養厥父母友愛于弟昆波及顛連者為義勇勝賁平糶救荒歉出資周嫁婚黔敖食餓者翳桑命能存病藥死給櫬衆善難具論餘力宇仙釋並列孔聖尊上表祝釐懇敢隨俗趨奔聲名達淵聰褒詔如春溫彼哉嗜利徒欲蔽靈臺昏既自厚封植復思窮并吞私吝守愈固豈思同化元題詩重歎息不覺辭已繁要期引勿替傳之子若孫題林氏義井詩卷寒泉天一生苦惡其性死譬諸人之身涕汗棄物耳惟餘玉池液潄咽內充美海濱斥鹵田鹺司所經紀民聚井味惡逺汲汗流泚林君丞于斯人渴視猶已積誠致懇祈濬地泉湧起冽寒異尋常烹飪倍甘㫖捐金具磚甓砌甃護崩圮綆罌四駢集老稚悉驚喜滿慰塵土心挹彼仍注此昔君因歲荒施粟救鄉里乃今興惠利隂德重積纍既收勿幕功名記千百祀題僧石隱詩卷道本費而隱似無乃真實放則彌六合卷則退藏密求其所以然了不見形迹師從讀書來此理諒能識身行京塵中名隱聊自適天地如許寬豈求石罅隙蚩人莫說夢不必深致詰題許魯齊慰狄子昭亡子書聖學繼者誰本朝許文正詵詵門人中修短孰非命向來慰亡書今日深起敬細觀遺翰墨滿紙皆情性送逸姓氏還奉元憶昔寓京日所接罕可人裒然有竒士充賦來西秦金針五色線黼黻期補紉知者喜收録如磬獲泗濱當年行輩中齒髮尤青春天馬不受羈海犀能辟塵九載此重覯喜色含津津贈我移蘭篇辭翰俱足珍臭味既云同千里猶比鄰還歸有公論主人方肅賓謝蔡參政惠寄甘州枸杞來自酒泉郡殷紅色尚新去家不食此逺寄住家人住家人老矣獨愛芳甘味欣然親解包咀嚼感珍惠春晚山茶始開示德衡弟山茶本冬花憔悴遂開晚儕輩鬭芬芳已獨尚息偃及兹春事深渥丹始赫烜參列姚魏前正色無婉娩因之觀我生平昔匪驕蹇衡門自棲遲臨老遇摧挽朱紫皆少年跡親心自逺華顛豈懷榮田里幸得返功名船上灘歲月輪下坂撫樹三歎息歲寒同繾綣壬戌五月一日題所贈扇小惠乃人為等此一扇材大德天地功及物無邊涯搖時熱暫去停手熱還來早晚秋風至灑然心目開為扇解嘲次前韻朱明天地爐得此解愠材知君力所及如我生有涯但當録小善勿遽期方來朂爾竹帛功相兹橐籥開菊欄邊金錢盛開黃菊未開時金錢為前驅顔色頗同調節操乃爾殊地産富百鎰天質成五銖鮮明宜露洗黯淡愁霜枯芳姿甚可愛藥品時亦須連茹多或厭滋蔓久難圖不以時湔沸恐隨凡草俱體弱雖自植頭重還相扶間居叢稿卷一
