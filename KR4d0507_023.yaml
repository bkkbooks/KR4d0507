body:
  text: 閒居叢稿卷二十三元蒲道源撰祭文祭僉憲王元亨文嗚呼西軒夫子倡道漢中天畀二子若憐此翁長職教以克承次游宦而亦通夫子厭世歳星一終方哀伯也之奄逝豈意叔兮之遽從何吾道之不幸而一至於此窮耶惟公克家之孝報國之忠交友之信事兄之恭守學之正蒞事之公明白洞達表裏昭融由清慎而選中臺之吏以剛直而乘御史之驄繼分憲於蜀西復改斾於江東不畏强禦也負埋輪之意氣慨欲澄清也凜攬轡之威風至於約已禄秩之奉為親甘㫖之供在鄊黨有愈自卑之意斥奸惡有不可犯之鋒具此全能方期於大用夫何一旦遽聞於告凶嗚呼哀哉以賢勞而得疾兮擠竒志於九原之下凌浩蕩而逺歸兮歛英氣於一木之中從西軒與伯氏往胥㑹於幽宫酌祖觴而一酹冩予等之哀恫祭興元路宣差文惟侯性無忤物量足包荒坦白真淳不見一毫之偽雍容謙遜弗知三品之尊徳既如斯誰人不服又况禄至二千石而無擔石之私儲夀踰六十年而有百年之遺愛去歳小君之薨逝尚切痛傷祗今嗣子之孤㷀未能成立興言及此隕涕無從某等託在下風乆塵清接目睹輀車之邁耳聆笳鼓之悲天亦興哀雨如助泣聊申薄奠以冩卑情祭路宣差夫人文懿哉夫人配我元侯惟此元侯徳量𢎞優不忮不克不貪不求相彼侯徳可知内助何嗇其年竟至大故悽風寒雨行路嗟咨一觴祖奠侑以哀辭祭史拱之先生文嗚呼始予讀書於明善齋先生實助夫訓䝉闕朱墨以流汗鬢斑白而成翁余痴幼以何知時問疑於下風闕四十有二歳可知夫先生夀考之隆食再生於兒齒視瞭然於方瞳盖清心而寡慾惟安分以固窮有以全夫天之所畀凜然如傲歳之長松昔漢伏生及衞武公皆九十而彌劭而先生則與之同慨余先子眉山之鄊人耿長庚臨旦而將終今則已矣胡不哀恫柩前哭而致奠尚舉予之一鍾為杜克欽祭母文嗚呼鞠育顧復恩惟罔極嗟我為子報蔑涓埃違親逺遊亦冀有立今則已矣痛悔何追湯藥弗嘗窀穸弗視聞訃奔喪幸得還家哀慕不寧音容如在謹以潔牲柔毛粢盛醴齊哀薦成事尚饗祖祭薛宅崔氏文惟靈安静柔嘉閨儀肅兮儉素勤助婦功篤兮克相厥良盡雍睦兮雖益其子能勉朂兮徳既如斯夀胡不闕兮知者歎嗟泪陸續兮我作祭辭以奠以讀兮祖祭北溪老人李天錫文醫學成家靖重老成拙於競利工於衛生不忮不求安分知止徳豐慶隆天錫二子長登仕版次領醫流田畆杖屨歳晚優游七十古稀夀已踰闕屬纊精明得正而逝猶有可憾胡不期頤北溪之原遽成永歸不鄙晚學忘年相好祖奠涕流誄文以告祭李子文文嗚呼子文而遽止於斯昔君䟦涉乎雲南萬里之逺謂功名之可期握予手而不忍别泪承睫而莫持予强笑以寛勉然此心之孔悲謂暫暌之終合復談笑以熙熙如長庚與殘月耿相望於天涯我憶君而不置君思我而可知屢升堂而問信聞遲歸而有時昨因訪乎令弟同佇立於門西報君來而不見僕牽騎而含悽予私心之已怪纔入門而果啼噫進前而問故死瘴癘於蠻夷嗟道路之迢遥但函骨而致之神惝恍而若失淚縱横而交頤此真耶而夢耶乆瞪目而若痴嗚呼子文君真死矣中國之人異域之鬼惟君聰敏好學不墜世美富於經術旁貫方技切磋之益言論亹亹暇日相尋不彼即此某情合義同蘭臭可比孰謂數人獨君夭死注目南溪悠悠逝水㳺從之地不復見爾嗚呼垂白之親未齔之子相對長號孰究天理唯故鄊之一念魂歸來兮庭止懐我故人設奠讀誄惟君聞乎不聞慨一慟而永已為李子直祭兄文嗚呼先君之殁我兄弟三人不幸伯氏亡於外惟我仲兄勤勞恭儉用稍充給亦欲奮厲以光大先緒是以有雲南之行今年之春聞兄歸信不意到家乃函骨耳嗚呼天不佑善而至此極耶手足既斷肝腸欲裂堂上之親復何望耶昔成都之别誨言在耳當服膺拳拳斯不負我兄之託謹擇吉辰從吾先君於北原之塋姪男方幼當教養成就俾奉主後皇天后土實聞此言卒哭是期潔蠲以告兄其有知實鑒臨之為何茂實祭李氏父執文噫先君之存日盖與君而為友惟義氣之激揚殆志同而心偶暨相約以比鄰又忘情於杯酒有言話以相尋分始終而逾厚痛我親之先逝喜夫君之得夀惟君剛毅果敢明白洞達柔不侵凌强不懼怯能禦侮於鄊社才實近夫豪傑况家資之日厚與貴㳺之交結每供具於鮮濃時憇息於林樾忽二䜿之為殃歎百醫之無䇿享年過於七秩夀不為之夭折承家得夫五子祀不憂於乏絶盖在公為何憾於我心而悲噎悼先人之執友如曉星之俱㓕致薄奠以陳辭拜柩前而永訣祭梓人王提控惟靈𣲖流江漢名擅工師方者中矩圓者中䂓深得不傳之巧大木為杗細木為桷殊無可棄之材血指汗顔羣工拱聽引尋執杖大厦立成運郢人之斤成孔聖之宇不計其直克成厥功用能享夀考之多有子孫之衆或聞凶訃益重歎嗟愧非栁子之才為述梓人之傳聊陳祖奠以答勤勞秋谷平章改葬祭顯妣韓國太夫人文嗚呼旻天不弔早失所恃幸承遺訓遭遇明時榮寵洊加忝聞大政禄弗及養哀隕曷勝請告未俞展掃遂闕越惟顯考旅殯覃懐夙夜憂惶欲謀合葬兹因餘慶仰荷天恩啟國錫稱光賁泉壌命官治具遷祔祖塋舉柩之初敢以誠告恩靈如在舍舊圖新無震無虞對此休命待營𤣥域從我先公永奠攸居緜祀罔極興元路祭韓國太夫人文兹者朝使䕶輿發自漢中言歸祖兆忝牧於此敢不欽承上命以佐治具恭惟太夫人冡嗣為國名臣光輔元聖忠嘉顯著表前日之義方福禄鼎來發向時之潛徳柔儀慤範愈乆彌新薨逝歳深莫遂升堂之拜啟行路逺徒伸祖奠之誠仰冀淑靈俯垂昭鑒祭考君焚黄文某偶承乏使獲供奉于翰林今天子與賜封贈之恩考君得贈七品官從仕郎母趙氏封冝人此皆祖宗以及考君積慶之所致而某等幸䝉成爾生育教誨哀慕兢業惟恐有負惟尊靈其相之謹命次男承事郎雲南諸路肅政亷訪司知事蒲道銓以柔毛粢盛醴齊祗薦於墓舉焚黄之典謹告祭顯妣文某仰承積慶忝仕於朝初匪忘親貪戀微禄實以家世簮纓所傳黽勉庶幾用光遺緒既䝉封贈子忝世科先徳致然自惟何力因循於外覲省曠時得告言還行及鄊里始聞凶訃慟哭何追嗚呼養生既乖送終弗及負此大罪天地曷容小祥倐臨設此菲祭不勝哀慕如見慈顔尚饗祭辛伯遷文嗚呼伯遷明敏達時儒以為質吏以行之推擇進用升於憲司如車發軔如驥方馳按事至鄊賀者熙熙云胡俄頃變故如斯前日眷聚今作孤嫠前日笑語今作悲啼車僨驥踣行路嗟咨子於我門執經訂疑重以子姪婚媾維持視子屬纊痛徹心脾往歸兆域覿晤無期文以告哀侑以酒巵祖奠董教授紹昌文維靈眉山盛族家世詩書壮歳北徙以儒業醫老成忠厚心無自欺唾面自乾不校雄雌捐金報本開天有基天道不僭報獲其冝晚膺一命為醫之師癘氣所染吉門可疑造化終相痛苦莫施起居如常屬纊弗迷七秩有五恨不期頤惟我先子共飲玻瓈繼以締姻夫豈人為亦遽逝矣重我悽悲祖奠永别靈其鑒知代王思進都事祭禰焚黄文維某仰被生育訓誨之恩資給之惠俾讀書從吏粗有成立通名仕版今聖朝推恩於下以勵臣子為忠為孝顧某庸愚何以及此考妣得以六品官贈光賁九泉皆先世隂徳之報敢不益自勉勵服行遺訓以答至渥之徳但以身縻職守遥望松楸不能展掃曷勝悲愴惟尊靈其鑒之祭董仁亮文嗚呼昔我顯考與君先人共飲玻瓈氣味相親黙契天合果獲締姻嗟嗟仁亮慤實温純好逾二紀敬愛如新不意遘疾有百其晨醫殫厥技祝禱於神暫已復作竟殞厥身謂之弗夀世罕七旬謂之闕姓類我斯真處置無憾死與生均我迷我悟聚散屈伸所恨永訣能不悲辛有酒斯酌有肴既陳欲君一舉勸侑無因撫棺慟哭奚止霑巾又嗟哉仁亮壻我蒲宗先君晚歳情愛所鍾有齊季女未知適從暨于垂絶付嘱申重奉以擇對惟君乃逢質直慎言罔愧南容親宻既乆欵接彌恭曽是遘疾荏苒去冬幸然少差遽爾變凶西郊有墅馬鬛為封郭門祖餞哀痛填胸一杯永逝無復廻蹤祭妹文嗚呼我妹遽至於斯我兄弟俱已衰老歳時伏臘祠祭祖先望汝來歸今不復然矣汝病時我等及良醫救而不能汝雖不及嘱我後事我等處置如汝之心汝之聰明亦當知之惟棺歛送葬盡心無慊今又百日以汝平生好善為汝修設明真大齋超度汝夫婦亦如汝之心終此生矣痛毒奈何幽冥之中想如平日祭姻翁王福臣大使文惟靈外發謙冲内根淳質謹身無玷亦既克於保家教子有方尚不墮於前志宴賔惟恐其怠交友能盡其誠較之同儕具此衆美胡止中夀未享修齡常人猶共歎嗟况我乆敦姻好今扶靈柩歸葬先塋敢即路隅畧陳祖祭舉觴一酹與涕俱零祭子年月日孝子燧以祖父命謹告於考隠君之靈父殁周朞喪曽祖母適隔翼日哀痛何勝今值大祥同伸奠獻代蜀省郎中巨徳新祭考妣焚黄文某自惟生鞠之恩欲報罔極向因游宦墳墓逺離今閱歳時汛掃莫及先世積徳慶集某躬進位朝班獲䝉恩贈官守所限祭告未遑兹因備員往佐蜀省過家上塜榮耀里閭顧瞻松楸曷勝悲愴謹録宣副禮具焚黄尊靈有知尚祈昭鑒佩服寵命保佑後人哀辭挽王復亨母惟大鈞之播物兮數各乘夫耦竒其不然而或然兮亦視人之所為噫夫人之淑懿兮乃百福之攸基偉覀軒之倡導兮為學者之宗師自結縭以相敬兮其徳實能配之蚤丁時之孔棘兮初未聞乎磷緇洎晚節之熾昌兮仍儉勤而自持慈和以為膏沐兮曽脂鉛之不施豐潔以供祭祀兮但菲薄而隨冝篤二子以成材兮燁然有聞於時撫諸孫以怡老兮秀茝蘭於瓊荑何衰疾之遽垂兮中荏苒而求醫七秩不為不夀兮恨不至乎期頤以正禮而送終兮絶浮屠之蠱疑棺槨衣衾之華美兮畵翣盛夫威儀齊衰哭而僻踊兮行道之人亦悲俾夫人之名没世而不朽兮或有見余之哀辭題李教授父誄辭惟大鈞之播物兮初何有於愛憎其窮達與修短兮亦氣數之相乘嗟若人之雖逝兮念素行之可稱孝弟行於家庭兮信義著於友朋矧賙卹於貧乏兮奚强畏而弱陵彼屢變而莫定兮我則固而有恒夀胡不副其徳兮用又不充其能盖彀滿而必發兮豈抑乆而弗興有諸子之力學兮皆全器而克承但未識而遂已兮頼誄辭之足徵何氏冝人哀辭猗與夫人兮生而静專於士族以毓粹兮習如自然既在家而孝於父母兮罔或微愆笄而歸於蒲宗兮奉以周旋惟服飾之儉素兮不事華妍雖汲爨之弗辭兮養舅姑以勤拳有桓少君之風兮夫自慙非鮑宣羌祠祭於祖先兮躬灌滌而潔蠲見諸叔之胥㑹兮具飲食之芳鮮補紉尊幼而弗輟兮雞既鳴而未眠教子而不溺於愛兮屢以言而勉旃果儒科以禄養兮人謂光前獲從夫而受封恩兮報豈非天校桑榆之享福兮斯可為全年七秩而終於正寢兮亦得中年自侯牧以下皆送終兮觀者駢闐作哀辭以書素旗兮庸述其賢閒居叢稿卷二十三
