  text: 欽定四庫全書
  hash: sha256:64d9ff2e7643d8cd3464e7f4c9e75c7d6d85eb6ee80c540d6dcbeeab187b9ddc
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4d0507_WYG_012-1a, image: WYG1210/WYG1210-0669c.png}
body:
  text: 間居叢稿卷十二元蒲道源撰樂府酹江月次李壽卿侍西軒先生九日賞菊暮秋天氣似堪悲還有一般堪悅憔悴黃花風露底香韻自能招客手當紅牙觴飛急羽且為酬佳節龍山依舊不知誰是豪傑我愛隱士風流就開三徑欲往無能得萬事㑹須論一醉非我非人非物座上狂歌尊前起舞待向醒時說傲霜枝在莫教空老寒色又次梅隱丈壽旦感懷南箕月直想青天萬里光芒生夕誰料英靈如此賦辜負生平胸臆世事悠悠塵緣衮衮仰看晴空碧利名餘子面騂羞汗長瀝幸自吾愛吾廬南山招隱灑掃躬厮役但願身强餘慶在流與子孫逢吉暢飲怡情浩歌乘興風月共呼集從今數去那朝非是生日水調歌頭癸未中秋雨悶中示德衡弟天公何見戲凡事每相乖應知今夜秋半故故放雲霾不遣妲娥窺户空使騷人賞客樽爼預安排無復弄清影祗自黯愁懷下簾櫳收綺席罷金叉誰能為我叩廣寒玉殿令開待得良辰美景却遇凄風苦雨好事實難諧髙卧清無夢簷溜滴空階又次權待制韻燕城過長夏鄉思若為禁故園松竹瀟灑久矣負幽尋賴有仙壇詩伯同寓玉堂清署相顧意殊深餘暇儘談笑煩暑自消沉繞長廊臨靜砌稱間心颼颼樹杪風至流水入衣襟尚愧無窮汗簡也預諸公奮筆投跡是非林何日了官事倒珮脫冠簮滿庭芳南營探梅至梅隱丈故居長憶當年讀書窗下嵗寒留看孤芳巡簷索笑重到更倣徨梅隱先生何在清江外新構茅堂人應道攀枝嗅蘂那得救飢腸多情餘習氣芒鞋竹杖未忍相忘但年年依舊踈影幽香好是春風近也猶記得吟繞昏黃開樽飲參橫斗轉同醉卧花傍木蘭花慢壽王國賓總管數當今人物問誰似玉堂仙但蘇子才名居中未幾補外何偏天公意深有在要周流海內作師傳萬古斯文正脈一生前聖遺編胸襟理勝自超然雖老未華顛念厚祿崇資真成大耐何計榮遷心期嵗豐民樂更公庭無訟酒如川喚取梅花為壽看他老檜千年又壽劉邢公八旬今又八說尚齒更誰尊况賜號司徒疏封大國榮及生存白麻制詞新寵算一家四世被皇恩七十兒為內相斑衣笑捧金樽近聞迎駕到金門親奉玉音溫問父子行年康寧壽考定省晨昏鑾坡正須耆舊道平時致仕不宜論這種靈椿丹桂天公偏養深根西江月九日南城郊行堤栁風前影瘦池荷雨後香殘髙秋風色已闌珊落日孤烟微暗平野大家徐步此身贏得長間路逢俗子笑相看道我為歡冷淡清平樂李子文惠秋瓜一罌甘露來自東陵圃五色金盤摩詰句到口聊消沉痼割開碧玉稜層嚼時牙頰生氷可惜這般風味不當六月炎蒸又壽趙總管相門華胄勳業誰居右且向人間涵養就鼎軸青氊依舊鄜延遺愛尤思梁州新政方宜處處邦民香火祝君千嵗為期又壽李平章闕年宫教龍躍隨天造定策兩朝儒者後勳業更誰能到玉堂暫得餘間歸來燕坐知還待滿令公書考却回絲竹東山㸃絳唇次杜仲正經歷懹古韵少日峥嶸已看紫氣衝牛斗詩才神授我輩宜緘口蓮幕風流得見芝睂秀空搔首野梅官栁先落君家手又重次前韵三闋西蜀明侯鈎連閣道蒼崖斗漢皇天授故國嶓江口往事浮雲依舊梁山秀時延首淡烟踈栁欲畫無竒手又一賦阿房水之江漢星之斗精微心授不待形容口贈我新詞字字皆竒秀宜稱首肯教韓栁獨擅文章手又深味遺編無心祿仕求升斗學慙師授朱墨聊糊口自笑踈頑詎敢儕英秀寧低首五株門栁間袖春風手又賦野荼䕷玉蕊瓏璁繞籬盈樹知誰種碧雲堆重化作飛瓊洞勾挽春衫裊裊珠瓔弄風微動行人飛鞚更著清香送又趙嘉議大尹壽席政感豐年天公不禁興元酒金巵如斗滿獻君侯壽福祿川增來處由寬厚從今後平登朝右官與人長久臨江仙次仲正經歷韵三闋世路滔滔方得意從渠掉臂昻頭峥嶸笑殺楚纍囚功名雖自許妻妾見應羞吏隱羡君懷雅志胸中自有嵩丘且須夏葛與冬裘隨時無不可未用賦歸休又健筆興來揮樂府無愁可到睂頭可憐郊島兩詩囚枯腸徒自惱騂汗只供羞我欲與君追李白神遊共訪丹丘千金不惜翠雲裘呼兒多換酒一醉萬緣休又俗務相仍何日了紛紛百緒千頭空教縈繞似遭囚情知鷗與鷺亦解替人羞春曉拂衣隨父老扶攜尋壑經丘本無肥馬衣輕裘間身元自在不問幾宜休又次解東庵學士詠梅韻聞說東庵梅最好何須逺訪西湖金衣相映玉肌膚幽香俱可愛顔色不妨殊花主惜春仍好事作詩清似林逋氷蕤雪萼正敷腴只愁無客至那怕酒頻沽朝中措張允濟子滿晬熊羆佳兆應神籖何必夢中占看取龍顱犀角不愁長守虀鹽今朝滿晬諸般排比筆墨先拈休道添丁無用能教乃祖掀髯鷓鴣天和客中重九冷落寒芳一徑幽無詩無酒若為酬一生幾得花前醉兩鬢難禁客裏秋思往事淚盈眸共嗟日月去如流短歌謾寄鄉鄰友寫入新箋字字愁又壽楊同知好景良辰近上元天公為問産英賢政聲洋溢春風外德澤流行漢水邉官一品壽千年應知仁者得兼全鳯凰池上恩波暖指日丹墀步武聨又壽耶律總管霢霂春膏兆有年街頭粟賤不論錢時機似見天心順物理端由刺史賢人富貴壽綿延滿城桃李動芳妍邦民香火才收罷黃閣聲名次第傳太常引送趙參政西城别筵相君今日已登程暫車馬駐西城尊酒若為情且喚取雙歌送行逺山顰蹙秋波凝竚清淚也盈盈便有遏雲聲怎留得前頭斾旌人月圓趙君錫再得雄君家陰德多多種重得讀書郎掌中驚看隆顱犀角黛抹朱粧最堪歡處靈椿未老丹桂先芳他年須記于門髙大車馬煌煌感皇恩次子驤莭使示趙內翰韻家世本吾儒六韜能曉從事和林十年了一麾才把尤被揶揄嗔早漢城官滿處人傳道郊次攀留馬前持抱闕殷勤盡癃老謂君到處不見月烏驚繞天公終料理桑榆好間居叢稿卷十二
