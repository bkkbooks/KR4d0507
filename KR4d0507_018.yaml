body:
  text: 間居叢稿卷十八元蒲道源撰序送洋州馬士逵州判詩序武康於興元為屬郡去府治百里而近其官吏之臧否政事之得失易以聞知比年以來到官者多不以善去故其俗號為訐近嵗得人視他郡最勝民皆鼓舞歌詠至其秩滿將代又攀援號訴不忍其去然後知昔之為非民之罪也長民者之過也節判馬君士逵天姿開爽而清白粹雅又得家庭之訓其在武康也以誠意待同僚而蔑纎芥之隙以卑牧接士類而獲切磋之助以寬恕理民訟而盡哀矜之情及瓜而待士民留之不能相與狀其在官之績詣部使者祈升陟之一日君趣裝東歸取道於府相過告别出武康郡倅而下暨諸士大夫贈别之什且曰某是行也歸無物以奉家君之悅者縱有亦非所悅得此有以藉手矣僕披玩焉皆稱揚君為政之美且致其拳拳不忍去我之意於以是知士逵之篤於孝而盡於忠也惟其篤於孝也故能舉錯顧義不使微纇少玷辱其身而纍於親惟其盡於忠也故能夙夜在公必使善行美譽有諸己而光於親推是道也奚為而不可奚行而不至哉則武康之政又非他日所以稱道君者孔子曰人能𢎞道非道𢎞人尚期勉旃送髙彥明經歷序夫為天下之事常患乎才有餘而量不足才有餘而量不足不惟其事之無成而所謂才者反為身纍矣經歷彥明才氣英發載筆蘭省聲譽藉然總幕漢中爬整絲棼剗除盤錯旬月之間遂以無事然性不瓦合上下不能無異同者遂乘間擠以事君引吏為左吏亦懼不克擔荷君慨然當之詣省宰物者亦諒君而不深罪比還人謂君必銜憤肆忿而君與向異同者如未嘗有事遇吏如平昔然後知君非特才過人而量有不可及者上之人方求才屬事則前步之逺不待龜灼然矣諸士夫以君解組東歸歌詩以贐余謂君在官雖多可書今皆略之特發其所難者以著於贈别首云賀李唐英桂蘭共芳序并詩有德者必有後乃理之常也然或丁於氣數之不幸者亦有之伯道竟無兒中郎僅有女至今猶為之太息唐英李君篤信君子也年踰知命而嗣續之重不絶如縷安能無介於懷在朋友間亦為唐英歉一日僕過柏庵明府明府謂僕曰唐英近有喜一乳而子女俱此莫大之慶也吾黨皆有賀什子亦無惜數語以冠於其首僕謂唐英門左懸弧門右設帨遲暮之歎一旦豁然若困苦之遇神醫飢渴之得美饌則天下之為快豈有以加於此哉夫滄海之珠崑山之玉貴則貴矣其有益而樂於人不若是也闕既以積善之報俾得夫有後之常理則吾所以黽勉於善者又當如何哉他日堂構之託門楣之喜根深葉茂源逺流長實兆基於此矣僕於唐英蓋嘗一面之雅而非深識也亦喜為書之傳家一線正憂惶陰德天教晚節昌熊虺既同前夕夢桂蘭應共此時芳眼中堂構應無慊意外門楣定有光慶事鼎來遲是疾他年鴈鴈看成行贈寫字張童子序并詩夫兒童七八嵗入小學執筆摹朱始能成字唇吻襟袖皆黑古今天下皆然也老杜有總角草書又神速之句夫總角則十餘嵗草書未必能真楷也惟王獻之七八嵗學書父羲之密從其後掣筆不得知後當以書名然亦未聞七八嵗時遂能大書也近傳關中張氏子七嵗能作字徑丈者初未之信適憲府掾燕君美自安西至示嵗寒二字徑二尺許乃童子所書也且稱其德性之美僕憮然曰真有是哉展視其書則緊結徑正骨肉相副筆力千鈞類非童子所到不言其人雖以為老於書者可也恨不得親見其磅礴揮灑之狀以快其意雖然字心畫也童子既能盡之於外則必有得於中不幾於生知之性乎苟能以其得於中者讀書求道不以一藝局則逺大器業吾將有望於童子也若夫一角之獸九莖之草前史書之以為嘉瑞吾意今日之瑞將在此而不在彼也君美還求為童子贈姑以是語之宿世臨池老伯英此生依舊性根靈已能作字侔三絶試問行年始七齡觀額題回驚鬢白法書閲罷歎胸青倘教二子今猶在慙愧張家小寧馨洋州宣差餞行序并詩洋為州雖蕞爾之區比年以來守職者往往以黷貨亂政民羣譁之竟得罷去故洋隨號為難治至元癸巳秋乃聞郡監宣差承旨公坐以不及期之任今例當免者闔州之士夫耆宿等狀其行事懇於部使者請留之部使者雖不敢廢格聽其留然實異其得人心之若是條民之辭且薦之洋之士民有來者試詢之咸曰凡治吾州者未始公見也其亷以律己惠以及人修舉廢墜消弭姦慝方安其政未期而輒去是以不忍夫字我則父母毒我則仇讎吾民初何容心哉余聞之仰而歎曰嗚呼孔子所謂斯民也三代之所以直道而行也信不誣矣於是思一識公而未果十月之晦會於寓館話至曛夕洞見肺腑觀其吻合義理其通經之士有以服砥礪亷隅雖立節之夫有弗愧然公出於西陲豪貴之胄宜以弓矢狗馬為心飲酒炮羔為樂而所為乃能若是豈非天資之美有大過人者歟今國家惠養元元簡賢登俊公又從方壯之年往當任使則是行也將見居位日崇施惠日普宜洋之民有不得專其賜矣四字亷能與惠慈不繇學問出天資關河昔滯來時限父老今深去後思雲闕丹心行色動霜臺華衮薦書馳殷勤試問洋民道絶後光前更有誰送薛仲章之憲司書吏序并詩有為己之學有為人之學知義理之當然必欲有得於己孳孳焉汲汲焉老而不厭者為己之學也惟利祿之是要必欲求知於人營營焉屑屑焉終亦必亡者為人之學也夫知為人為己之分則庶乎可與言學矣吾友仲章自童年即從事於簿書由縣吏升府修飭勉勵未嘗過敗而辱及其身直諒而克濟以和周慎而不流於冗余既已敬其為人矣始邦之大夫不以僕為不肖以禮延致俾得與為吏者公暇而講授焉仲章於儕輩中年最長豫懼其過時而學也不勝扞格之勞未幾衆以事繁劇為解獨仲章從豫講問朝夕不懈風雨不替嘗戲之曰凡讀書知義理則與今為吏者所為大不便將若之何君對曰聖人所謂朝聞道夕死可矣夫死之與不便輕重則有間矣豫服其篤信既而益自亷苦果齟齬於時然終不以自悔而廢其講習焉今郡牧曹侯而下皆賢明始異待之而憲司選補之檄適至衆咸以為宜君見豫以辭去不得卒業為恨豫謂之曰夫學以致用也子其尊所聞而行之不為利誘不以勢恃惟義之為歸此正為己之學見於用也苐宜勉之仲章再拜曰敢奉以周旋既退書於餞别之章首云聞道莫恨晚降心良足佳愧豫學未至蒙子手重義青燈風雨夕淡然對空齋於義云煩講於時乃多乖行藏固有定言議安苟諧春風不相值愧獨守枯荄主人未肯肅詎敢登賓階憲府偶公選幽光發湮埋既喜又愁别能不介於懷今朝馬首東夢寐與之偕願言自勉朂進德期無涯送羅壽甫北上序凡天下之事成於有志而敗於自輟者多矣是以君子不以事之難易為辭而視吾志何如耳木生於山雖磽確之甚必逹水流於川雖洄曲之多必東以其性專也矧人為萬物之靈得二氣五行之秀者哉壽甫吾友自幼而學不為童嬉植志讀書攻苦食淡二十餘年其發於文辭固已曄然矣嘗被省檄職教南岐子弟從學者皆彬彬可觀邦之大夫翕然尊敬之其所立固不苟矣一日慨然謂豫曰昔太史公周覽天下名山大川講業齊魯與燕趙豪俊遊發胸中之瓌瑋而文益竒蘇潁濱亦自謂恣觀終南嵩華之髙顧黃河之奔流仰瞻天子宫闕之壯麗與夫當世人材之秀偉而自多焉今我幸生明聖之時四海一家惟意所適欲效昔人之遊觀開廣耳目之見聞廓達胸中之隘陋安能局促塊居此乎余應之曰子將止於遊觀耶抑有為而然耶君笑而不答豫曰子雖不言其意可知矣夫有可用之才居無可用之地者君子之不幸也無可用之才居有可用之地者君子之所恥也吾子孳孳力學求免夫後日之所恥皇皇逺涉思勝夫今日之不幸可謂有志矣嗚呼中州無賢士大夫則已如有賢士大夫其必有合焉則吾子之志不患乎不伸矣送李壽卿之成都路知事序客有為余言益為西蜀都會土地廣衍民物繁庶其總治之府簿書期會財賦出入使傳之往來獄訟之參決宜乎填委矣必得少年明鋭辨博通濟之士為之僚屬相與議論其是非彌縫其缺失然後可濟不則敗事余應客曰子之所言固然也以余觀之殆末耳未及其本也凡今天下郡國之事繁冗者豈特益耶其敗闕者又豈特其才之不足耶是固有説矣夫居官者不患乎職業之不修但患吾心之未正心正則本立矣本立則事變之酬酢如權度之於輕重長短焉而又勇以決之謙以出之勤以成之尚何敗事之有或者不求其本而規規於事為之末將見事未立而名已隳利未得而害己隨尚能謀人之是非而補其闕失耶客斂袵曰余論偶不及此也今友人李壽卿適為賔幕於彼欵門告别余因敘向者與客問答之辭書以為贈壽卿信而敏和而文其往也將不負豫言矣送王同知詩序夫良醫之診視苟非憒亂之疾不輕投以瞑眩之藥但調和其五臟節適其飲食氣平疾自愈矣良吏之政亦然下無大姦極弊順而撫治不求赫赫之功去後人多見思興元少尹王君君美其人也中統間朝廷以商亷二相重德雅望命宣撫陕西既開府以經濟辟君為掾時軍國多務而以謹敏克稱器使自此踐歷仕路三十餘年更嘗世故練達物情有非新進少年比及倅二此邦安靜為理悃幅無華徐視民瘼而藥之不要竒功不釣浮譽然自士大夫以及閭巷草野之人皆以誠篤愷悌許之其去而見思可知矣既滿將代浩然有歸與却掃之意嘗謂人曰某是行也當歸老於家徜徉太平之日以終餘年豫謂君昔為商亷二公所簡拔雖老未及引年而聰明未耗筋力尚強其治人之術愈驗愈精與老於醫者無異矧今日圖任舊人之際豈無大臣之知君者言而用之吾意其田園歸老之計猶未遂也將行漢中之士率為詩以惜其去屬豫序以引之送張平甫府判序惟人生於斯世克自樹立不碌碌為鄉里之常人亦難矣又况才氣有餘橫翔捷出流光仕版得行其志為時所稱道者蓋鮮矣總判張侯自為吏時已嶄然不羣及聮郎署聲聞愈藹繼而僉判興元總府事愈自亷慎無少瑕纇其上承下接彌縫其闕和不詭隨正不激切發機則的中迎刃而莭解其才固有餘矣故僚吏亦相與語曰某事之成也吾張侯實為之某事之弗濟也吾張侯適不與聞焉其為人信服蓋如此而侯其中退然如不勝衣其言呐呐然如不出諸口初未嘗以此自多蓋侯昔常受知於左山公所至必與名士大夫遊其讃詠稱許積成巨軸平居喜讀書手不釋卷陶染薰炙德性固宜然也今得代去是必將為時所大用以展其材則其功業之美又將溥於漢中一方之施而聞望之遐又豈期於一朝之著則前所謂流光仕版為時所稱者蓋又不足為侯道也詩曰允矣君子展也大成請出此以為行李之贈何君寶之孝友詩序人之大倫有五惟父子兄弟為天屬之親餘以義合宜人之於是必盡其恩愛之實有不待勉強者然世之人往往父子不相得兄弟為仇讐甚則禽犢之不若者何哉彼皆汨於利欲而不知反其天理而思之也明府何君寶之孝友之性發於天衷純厚質直不事華藻始其尊公鑒世之昆季以利相傾奪者而君之二弟又皆庶出於是俾為老佛之徒兾以杜其患君既長慨然曰吾豈以家資獨利忍同氣之愛陷於滅絶之教歟乃悉召歸為之婚娶均産業為三恣二弟取之餘一以自給嗚呼世固有為人父慮後世之紛爭而為是甚不得已之術者多矣然豈其本心也哉而為人子者能不以利滅天理使友于之愛得其父之本心如何君者又不知能幾人也今君手足具體塤箎協律天理根乎一原春風遍於九族向其父甚不得已者毫髮無遺恨矣兹非孝友之大者歟凡漢中士夫之知君者嗟嘆不足繼以詠歌集成巨軸余謂何君之出宰百里又當充擴是心施于有政使民於天屬之親皆有以盡其恩愛之實風俗還淳令聞長世此又推已及人之功也敢僣以是書於編端云孔大使種德亭序并銘子盍觀夫農之為職乎春耕而播夏苗而耘秋成而穫然後嵗功成而無荐飢之患書曰若農服田力穡乃亦有秋又曰惰農自安不服田畝越其罔有黍稷吁豈獨農也哉凡吾所以自治無不然也夫治心修身闢田疇也孳孳為善播嘉種也懲忿窒欲除稂莠也如是而不止焉則熟而穫矣故曰積善之家必有餘慶蓋言其效也大使孔君彥禮心地坦明性根純粹厚施而薄取富藝而約居任考工之職積有餘稔雖造作星火而下無一言怨之者語及於君皆曰德人也今其身享安榮子孫詵詵福方臻而未艾詎不信然君築亭於門右為賓客之次未有以名之部使者暢公純甫亷問漢中風裁嚴肅慎於許可熟君為人為榜曰種德嗚呼公之意深矣豈不曰君之先種德深厚而君穫之君益種之於身而俾後之穫之然則後君者其可不視此勉懋若農服田力穡以承於罔既乎鄉之士蒲某見而知之為推原其意拜手而為之銘曰百畝之田耘耔不力彼嵗之終烏獲而食十圍之木毫芒弗植彼夏之炎奚蔭而息人惟物靈胡不視此反求諸身以種厥美勿棄小善毋要近功本根深厚枝幹豐隆衆人蚩蚩目前是急開落榮悴飄忽呼吸栽者培之理固昭然我作銘詩俾世其傳王仲平有鄰堂序夫里仁為美擇不處仁焉得知吾友王仲平以故止之弊陋龜於其南而築室焉介於柏庵扈宰道夫少府二君子門墻之間可謂知所擇矣至元甲午冬新居落成柏庵為字其堂曰有鄰蓋取德不孤必有鄰語二君仍歌書以寵之其豫進可謂至矣一日仲平㩦堂扁二字請發其義豫以仲平脫屣簿領教子讀書又能卜居仁里借明月之光資大河之潤是皆可尚因告之曰夫所謂德者行道有得之謂蓋德不孤立以類相從猶居之有鄰也子其務進修於是如葺屋然爰始於基朝斯夕斯亦既考室丹雘終之既然已則居之安居之安則左右鄰里交相輔翼苟悟此理與進德同不厭不棄及其久也則吾之所居處莫非仁宅而出入由行莫非禮門義路矣子其勉之余雖不獲託蹤鄰近子其為我持此文以附庸於二君子大國之作其不以我為蒹葭倚玉則吾亦有望焉耳送任士行後序木生於大國之郊其挺正曼碩之材既已為棟為楹矣而瑣細支離猶能為棁為桷松柏生於蜀山之幽盤踞髙聳負梁棟之姿而不為世用何哉其所處然也漢中去京師僅半萬里僻處一隅民俗淳厚士生於其間抱道而間居懷藝而不售者有矣豈非去天甚逺無大人顯者為之倡歟任生士行鄉曲之俊選也一日叩門來謁曰某雖不肖切謂人之為學將以有用也今天下理平偃武修文某欲浮舟荆襄取道梁趙覽江山之雄秀歷都邑之繁會以自開廣然後北走京師觀國之光摳趨當代之偉人以為進退輕重願有以教之且出諸公餞行之什僕讀書塊居跬步不出踰三十稔聞之亦為之神躍徐告之曰豫視子之容貌舒舒言語申申充之以學問潤之以文彩年妙志美而堂上雙親猶未耆艾挾有用之術振厲北遊以當工師之矩度時不可失幾不可後孰曰非宜子行矣不然亦將與蜀山之木為伍矣士行拜手曰請書之因為書於餞章之末云間居叢稿卷十八
