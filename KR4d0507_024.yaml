body:
  text: 閒居叢稿卷二十四元蒲道源撰墓志銘青渠王先生墓志銘先生諱無疾字復亨西軒先生諱得輿字載之之長子世為穫澤高平人辛亥侍親遊漢中因家焉曽祖諱璧字潤夫祖諱仁政字道亨皆隱德不仕西軒始以伊洛之學倡道漢中創立廟學作成士類前編類世祖皇帝實録時於高人逸士科已附上矣其平昔行誼櫽括備見門人李孟與夫臺省請諡之文見奉中書省判送禮部議擬得王西軒生前雖曽勑授儒學教授以目疾力辭退處於家終身不仕其高風實行與許魯齊同稱即係藴德丘園聲實名著之人也擬合遵依故典聞奏贈以美諡相應今已附奏事房祖妣張氏勤儉雍肅以母死兵亂終身不事華飾先生天資粹美又得家庭之訓少力學為養故時至田畝未嘗不挾經自隨及長學成博而不雜約而不陋亦以性命道德為說總府屢辟俾攝教官以養親懇辭不就諸生等相率狀其文行上憲庭願得為師表憲司以茂才異等不求聞達薦之勑授興元路儒學教授先生嗣前人建學之規完所未備修講堂齊舍更衣等屋數十楹孜孜焉忘寒暑朝夕日進諸生講解其間以朱子四書為入德之門既通然後及餘經若史循循有序後生程式之文一長可取者稱奬激厲以是翕然尊敬之大德改元聖天子詔興學養士田屬官而閒者撥充瞻學先生詢訪田之合詔格者纍申覆上司乞撥付既得請然多為權豪隂據嘗曰此職分所當為也詣公庭爭之得田千餘畝置簿稽其租出入設司計一人掌之以供春秋旦望祭奠及修補廟學之費餘給士之老而貧及士子之幼而孤者已無一粒之入焉人咸服其公西軒家法嚴肅先生極孝承顔養志未嘗少拂甘旨之奉不以貧而或闕始丁母憂水漿不入口者七日柴毁骨立父有嘻其甚矣之嘆作詩勸之及丁父憂年幾五十矣其哀毁有過自初喪至葬祭一遵文公家禮雖期功之喪亦必自盡而不苟親黨及鄊里有喪者必就正而取法焉外舅母孀居嘗病惟一息在逺方先生躬自延醫嘗藥視膳及卒室如懸磬為率其諸壻持服哀臨且貸錢舉喪與外舅合葬於已地焉至於親戚知舊之喪無力者助之無地者畀之未嘗有吝惜之色其無後者親視其棺斂深窽竁葬之尤切戒人焚毁喪者真得古人匍匐救之及於我殯之義其於昆弟友愛尤篤弟某宦遊四方或奉使及告歸入里門趨至家祿俸餘資不入私室則奉獻之旦夕聚子姪行定省之禮相事有如父子先生經理家務仰事俯畜俾無內顧之憂晚年以空言無益絶筆不作築亭家孰之南字曰四勿針以自警有千載而下顔跖異同勿兮勿兮一字之功我思古人敢曰倫擬恐因斯築工夫斯始關中蕭徵君維斗為書扁及銘以寄之大哉乾元萬物所資至哉聖傳曰仁是為元統天道雲行雨施仁專心德著而禮儀伊何未仁形氣有私勝私復禮渾然秉彛昔在顔子聞諸聖師明睿大勇請目靡疑視聽言動有禮與非凡厥非禮一勿是治黃間在機六師在縻三千三百循循罔差兹約禮初博文自來心過不二三月不違欲盡理粹具體而微千載凖的如日星垂矯矯王君蚤聞禮詩講道漢褒多士景隨於理於欲明析毫釐學顔所學四勿題楣造次顛沛念兹在兹以多問寡興起懦衰敬內有範制外有規努力相望死生以之先生惟寬厚樂易平居與人言如不忤物者洎臨事確乎不移及解教職即不復從調淡乎以經史自娛而疾不起矣疾革時忽夢中語曰子從何來及覺子惟田侍問之曰適有嘉客自程夫子至蓋其平昔景慕程朱之學形於夢寐然也易簀曰吾于西軒垂範躬行不逮汝曹勉旃享年五十有八時親賔及門人在旁者皆慟哭曰世寧復有斯人耶配劉氏甚賢佐先生養親能得歡心閨門雍睦殊無間言先卒翁媪制服哭之慟生男五人曰惟昌惟輝惟同惟田惟康女二人曰純曰緩繼氏景氏生男三人曰惟擴惟宏惟寅女二人曰薰曰藝孫男一人曰孔孫女五人曰巽曰順曰瓊曰憲曰蕙以其年夏五月丙午奉柩歸葬於褒城縣麓堂鄉西臯之先塋三務提領崔君墓志銘君諱某字某世為平陽洪洞人壬辰兵後譜牒逸墜不可考然崔氏歷代以來為顯姓大父諱堅父諱善娶某氏君弱冠克自樹立時平陽始附國朝事皆草創守闕冀氏縣尉升為尹縣事以闕管軍千户并奧魯官後隨軍至興元因家焉屢更錢穀之任以能稱君性剛直人有一毫拂於已必求伸理雖强禦不畏或以為訐實非也以大德五年正月六日卒享年七十有五初娶翟氏卒繼解氏卒繼蘇氏子男五人長天祐翟氏出娶王氏次天祥解氏出娶楊氏次天輔天麟天禮皆蘇氏出婦喬氏王氏張氏孫男五人孫女六人皆幼以是年三月壬寅卜葬於興元府南鄭縣開化村西莊壬舍其妻蘇氏與天輔等來請銘銘曰惟若人兮直匪頗年既修兮子孫多瞑目幽堂憾復何勒銘兹碣永弗磨孺人鄧氏墓志銘孺人鄧氏今漢中處士任君元善字東鄊之配也其先滄州人金末播遷譜系逸墜父諱某國朝之壬寅年從先鋒帥秃薛公征蜀以功為興元招撫因家焉孺人自幼聰慧未出房闥已間儀則勤於蠶織工於剪製任君之母趙氏選以配子既歸任宗已不逮其舅事姑以孝睦親以和御下以慈處家以儉姑甚憐惜呼為愛女然未嘗恃愛少有違懈執姑之喪哀戚尤甚任君讀書行古道冠婚喪祭一遵文公家禮孺人相之克協儀軌其於薦享戒具滌溉必躬必親或有故則中心缺然不寧始於家道未充織緝之外專業蠶桑蟻飼繭簇風雨寒燠節適法無不得冝歲獲甚豐遂致完美漢中治生者取以為法性端慤秉義族人以事不平來質者必以理諭之不顧其怨後皆感服任君內事一以諉之然未嘗專制必參决而後行子出仕戒之曰汝從學西軒王先生之門其人朝野推重搢紳以為模楷今當景仰踐履勿使愧辱庶不負汝父母之望可謂慈而能教恩不掩義者也以大德甲辰八月十一日辛卯以疾終於正寢享年六十有五將以次年正月十四日葬於南鄭縣味溪村黎園之吉兆子一人曰輗為䝉古教授娶前興元行省詳議官苗君仲平之季女女二人長適巴州尹雷承務之子仲威次適前南鄭縣尹王從仕之孫瑾孫一人曰侗以善狀一通來請銘某鄉邑晚進視任君先輩又與其子輗遊雅知孺人之德為婦為母始終無憾訂其狀不誣銘曰噫猗淑姿嫓有德順姑心修婦職奉粢盛躬蠶織家既豐子能飭得中夀歸𤣥域惟北原玊靈食無壞傷詔罔極提領杜君墓志銘杜君諱和字義夫其先平陽之襄陵人兵後逸譜牒不克記其先世父諱海國初為河東南京等路征行先鋒總管領兵渡河直抵洛陽西南攻破亡金御城山寨有功都元帥塔海嘉其勇敢聞於朝錫以銀符洛陽之役俘百餘人歸以歲饑悉縱之有感恩而不忍去者歲壬寅八月從帥塔海西征蜀師次長安之灞河九月十日以疾卒於軍年四十有二母陳氏澄城縣陳氏之長女誓死守節君時甫五歲兩目幾喪明陳氏竊憂之日夕露香祝於神曰妾既守寡子復失明將何所依神其聽之願垂哀憫若此子目復明自願為黃冠以答神貺庶子母得以相保未浹旬君目如初由是參禮掌教洞明祈真人為師真人親書妙安名以授之遂至同州依父母家建𤣥𤣥菴為棲息之所不御葷酒清淨持戒凡三十四年未嘗少替歲甲寅君年十有七母陳氏語之曰汝父早喪汝叔父煥自丁未歲任興元鎮守百夫長汝盍往問安焉君應曰諾乃即日趣裝來漢中省侍叔煥同㸑以居興元防城總管王逸之納為長女贅君痛念母老獨居不得終養言輒涕下哽噎不自勝壬申臭馬乘至同州載母至興元以養凡滫瀡溫凊如禮至元丁丑除充興元路都牙場副使克稱所委居無何興元金州等處安撫司知事高安建言規辦課程事行中書省就擬高安為金州茶場酒醋都稅使司大使君以才擇充副使果辦最辛巳母陳氏卒年七十有三君居憂畢復授興元路梔茶提領之職以母喪未葬不就歲丁亥親負母之遺玊合葬於襄陵之先塋纍石為塔高一引有半并刻石以志戊子省檄除充興元路洋州都酒醋稅使司大使既復任興元路山河等堰提領修葺有方堰固水足農民便之晚年不復仕進於南鄭之北五里而近卜築為終焉計其治生用具皆有法度故能化竒為贏直居之西有堂西溪王禮部子勉字以適安又有亭曰思齊亷水全御史君集為書其扁君生於多故繼不及學然天資孝愛所居立祠堂亦遵朱文公家禮設主四時致祭其才力精敏有思未盡其能以大德甲辰九月五日卒夀六十有七以是月某日奉柩葬於南鄭縣召村之塋配王氏先君卒繼周氏歐陽氏一子曰伯恭前受省除南陽府郟縣酒醋都稅使司提領女一人壻張清前興元路應辦副使伯恭等既以禮葬君後二歲來請曰伯恭之先人生於晋卒於漢中不有紀述恐後之人迷厥初辭不獲銘曰惟杜之先出祈姓戴侯而降族逾盛君雖中微所傳正才氣明鋭可從政生於襄陵葬南鄭子孫繩繩襲餘慶守素大師女冠錢善道墓志銘善道姓錢氏杭之錢塘人吳越王鏐之後也在南宋理宗時生十有三年入侍宫掖至元丙子宋滅隨其君來朝留京師奉睿聖皇后懿旨於其年之九月望日俾居昭應宫禮其宫提舉通妙大師某為師度為女冠賜紫衣愈恭謹守道齊心奉香火朝夕課經祝聖夀以報答恩遇為務餘力則經紀宫事繕葺琳宫無少懈怠賜號守素大師以至大己酉三月五日卒享年六十有六其徒陳守中李惠清等以其年某月某日葬於某所求銘以志之惟師以亡國之餘被維新之澤洗滌塵垢享清福三十有三年之久亦可謂瞑目無憾矣銘曰吳越王歸於宋氏孫曰自然命為道士有淑其裔歸我聖元隨被中㫖闕黃冠惟表忠觀與昭應宫三百闕異世同風錢氏有德綿綿其澤闕素師允蹈前則爰清爰靜以終闕何以臻斯繄我皇仁嚴子詠墓志銘君諱沂字子詠建昌南城縣人也始祖長源公徙城西父仁闕字周卿母闕氏由周卿而上六世讀書皆潛德不耀君為人質實矻矻自守不喜嬰闕務勤儉治生閉門教子孫書曽一闕盱江書院掌書輒自棄去終身不闕祿仕然篤於為善睦姻族鄊黨稱其信義至元癸未某月日卒享年五十有八娶李氏生男二人曰履祥曰德輝長娶吳氏次娶宥氏女一人壻石山章孫男四人曰子班曰士光曰夀逸曰平逸以儒業醫夀逸充南豐州學正平逸撫州金川教諭孫女六人俱適人曾孫男八人女二人以至元戊子某月日葬於南鄭縣古塘之陽先塋嘗謂士之處世雖無功業見稱於時然知分自守不失為鄊里之善人視世之不度德量力而冒沒奔競者亦賢矣况久畜必發久塞必通固物理之循環者安知不在後人乎冝君之子孫詵詵其多也越葬二十有九年其孫夀逸致其父命託鄊友左祥求銘墓碣余時供奉翰林文字詳職書寫懇請不容辭銘曰闕焉不怠於善學焉不志於祿人處之而弗堪已泰然而自足紹先世之菑畬猶未逢於歲熟閟幽宫而永寧福慶綿於嗣續劉君墓志銘劉氏本顯姓中微業農君諱成無字以質朴不能紀録由曾祖而下至君之父俱不記名諱所可記者曾祖始居趙之寧晉縣娶某氏生君之祖祖娶劇氏生三子仲子乃君之父值金亂祖奉曾祖攜其子等遷於曹州之成武縣因定居焉三世皆葬於其縣之寶閨鄊君父娶傅氏生君君性純實勤勞稼穡自奉甚約家以優裕克孝二親教其子以成人鄊黨敬慕配王氏生男二人女二人長曰毅娶某氏次曰某娶某氏女俱適人長孫氏次朱氏孫男三人君以某年月日疾卒享年六十有四男毅克自樹立以仕易農得推擇為禮部繼掾留守司滿考勑授承務郎廬州陸安縣尹政績可稱母王氏猶及祿養夀今七十有七子毅等卜以某年月日奉君之柩葬於先塋將葬毅來請曰先世不幸絶無譜牒可考毅不孝喪父葬又不能志為罪甚矣敢固請某不獲辭因喟然曰古之卿大夫起家農畝者多矣今劉氏之祖先劬勞積德以遺其後人安知不自是而昌大乎為次序其事而銘之曰孝弟力田在漢有科今雖未遑天理不磨從事於斯粵惟劉君謹身則孝不匱由勤父菑子穫有卓惟毅克承其休邑長之貴於葬於祭視前有豐幽靈不昧奚憾於終閒居叢稿卷二十四
