body:
  text: 閑居叢稿卷十七元蒲道源撰書寄弟德衡書日者朱曉窗德性温雅精於三命五緯之學挟其術以遊蜀求字為先容相知處無惜齒牙俾薄有所獲為資粮屝屨之助云與郭幹卿郎中書向於江西憲史廖克譲處話及左右静而思之怳如隔世繼又獲見餞李推官正甫佳作愛其有涵蓄意非世俗語令人知當為世用者果聞玉堂烏府踐歴清華其克自樹立深所嘆仰都下人至聞稱道賤名過實愧悚愧悚今因杜克欽往求為先容敢布於下執事倘不見斥繼自今嗣音有日矣克欽乃温雅吏事通敏者希一顧未間萬望為時為道自愛與幹卿侍御書去嵗辱教墨知體履休嘉不勝欣慰即欲奉答縁史氏子説欲親往求書因循直至今春去與備細書未審達否緬維日者寓都自以衰晩不能與英俊角公聚之餘不多出間一再到貴止以賓客送至不得罄所懷聞旌斾西来兾得一二日侍以快平昔之願不意馬首復東悵惘奈何所諭求訪令外祖丘墓史氏前輩皆已今其晩生尚安知此但見少年口人即細詢之茫然莫曉不知當時徐用之所指的在何處令外祖母今葬府東十五里名百合坡向適史大夫得一女一子女為長妻岳子於昆仲中第四岳翁媪與史四皆殁已久岳有一女二子女及長子亦殁今惟存次子史四有一子出贅於人史大夫盖五子長不記次寓奉元久不知存亡史三史四史五皆亡史三二子長甚不肖焚葬屍鬻墓田家業蕩盡流落不知所往次子即今寄書者亦不甚實史四史五子頗肯治生岳之子則為農貧窘公以凱風寒泉之悲莫若少出費託人封殖令外祖母與岳氏史四等墳同一塋域築垣墻以遮䕶不致牧豎牛羊之踐履天其或者訪得令外祖葬玉别為措畫卑意如此不知髙明以為何如見稱大子為縣特以慰老懷耳願賜教督為佳秋晩向寒尚兾為時自重與鄧明仲郎中書累貢字計已達左右然乆不奉来教詢問盛宅亦無書未悉起居何似懸想曷可言此間親舊家居岑寂殊甚思與明仲煮茗劇談把酒一笑定何時耶此外俱不足道也杜克欽行草此動問漸寒伏兾順時保重不宣與鮑宜卿亷恕甫二省郎書銘復北迴得審動止佳勝而又踐履清要喜慰何可言今因杜克欽行謹候即辰起居克欽鄉人想二賢必能殊顧不待僕喋喋也秋候漸寒伏兾順序珍愛與鄧直方郎中書一别十餘嵗懸仰何可言聞榮踐亨衢健羨健羨諒惟吉人天相無不履用康裕某為况如昨衰遲非所歎但學不加益為愧耳杜克欽行謹此奉問起居彼亦藉以介紹與進是荷與王君貢運使書去秋承人至下問不勝感慰就審台候起居廸吉某自京師别閲九寒暑矣懸仰可知不意公理河東鹽賦雖未得覿芝宇而音問復通向曽寄上鄙作深愧不工特欲發一笑爾興元府吏王繼祖者為人亷慎可委本路向嘗保明牒呈充運司書吏未曾録用今又再保其人有父在朝邑年邁言及淚下若得成就非止前步寸進其親相去不逺兩皆得安冒昧及此兾公憫而一援引焉與巨德新郎中書邇者恭審髙軒榮至陕省起居佳勝芳譽洋溢鄉里榮耀但恨道路脩阻不能造賀府吏李敬所囘猥䝉下問足見故舊不以貴賤而有間也感感今因府吏楊伯源行謹貢片楮少露卑意不能罄萬一與劉君傑臺郎書李潤甫囘承訪問審起居清勝為慰僕雖况如昨但見鄉舊間如君傑者能卓然自立清介鯁亮有聞於時亦足増氣此外不足言也前恵王維竹未有報楊伯源行畧叙鄙懷與張允濟書别久思可勝言趙摶霄至話及行藏乃知京師帥府去就未判所求鄙序似難擬筆未果奉命僕年少時與吾友日相追逐每語以為世間事無足為者及今賤齒半百竟無所成百念灰冷世俗紛紛口亦不欲言爾况真為哉何用如此吾友志剛氣鋭百折必東胸中耿耿者常在但不肯同流合汙詭隨苟順坐是少有坎坷雖然益堅益壯在我固宜自勵或俯或仰於時亦當少從吾子以為何如要之亦命也所示薦語溺於相愛不覺過情愧甚愧甚土宜甚闕畧附微禮表故舊意未容面罄向風悵然與富珠哩子翬憲使書自都城判袂星紀將周天飛淵淪蹤跡各異仰惟德業充大果副夙期陕服監臨首叨下問不忘契舊感慰何言但僕已及引年衰病無取欽承綸命慙懼莫支出處之間進退維谷力扶往應必遂摳趨先此裁答畧叙卑悃陽春密邇伏兾為道自重以綏福履大究經濟之學傾祈不能一一既與四川趙伯儀参政書伏惟鈞侯起居多福某凡陋不足齒録每䝉相公殊顧又寵惠嘉墨未有以報但銘刻於心耳未参拜間伏兾為國鈞重以綏福祉與鮑宜卿亷副書别久懸仰何言諒惟吉人為善之效履用自然佳勝不待祈祝某托庇閑居自適無勞介意末由良晤伏兾順時珍䕶餘不及一一悉與蔡逢原叅政書某聞之為治者貴能知要而通變盖綱舉則目可張弦更則瑟可調然必待智者而後能常人則不知也今陕西以師旅飢荒疾疫之餘聖天子簡賢以寜輯之公是以来参其行省之政救荒之術可謂竭其智而盡其心矣然不過請錢於内府移粟於他郡爾此紓目前之急活垂死之民以止流移之心爾汲汲焉為之猶未暇也尚遑他恤哉某猶以為此則近慮而非逺慮夫近慮不可廢逺慮尤不可忽蓋錢粟有盡久逺之計將如之何闗中之灾近古罕見疾疫固天之流行而飢饉亦嵗之代有至於人民相食以及其親屬尚可忍聞而忍言哉語曰自古皆有死民無信不立夫信聖人猶不以死廢孟子曰獸相食且人惡之獸之無知相食人猶惡之至於食其親屬者則與死而失信獸之相食孰為輕重哉今朝廷以州縣闕官廢事且淹滯者衆遣重臣遷調之此特常事耳某謂逺慮者國家自有闗陕以来涵育幾百年生齒之繁夥一旦疾疫飢荒相戕害而食與夫流徙四方者十室而九空矣州郡縣邑荒凉至甚人情所不樂居若得知稼穡艱難勤於勸課知禮義亷恥明於教化之人勿拘常例増其品秩優其俸禄限以嵗月責其功效勸課以足其食教化以淑其心蓋陟其能而黜其不能逺足為治也產於土者然後可以足其食生於心者乃其固有之善秦人文王化之以興二南之仁嬴氏用之以致斬級之果其善不善由上之人導之何如爾倘不以此言為然則流亡未可遽集民食未可必足俗惡未可復美其患有不可勝言者夫事未至而言人以為迂濶待他日不迂濶已不及矣斯言也惟某不識忌諱得以言之惟明公特達足以聞之昌言於朝俾陕重地鞏固而不搖而公亦獲知變通達之美而免常人之譏爾不宣與蔡逢原叅政第二書某聞之周有天下修廢官四方之政行焉蓋官有可廢有不可廢可廢而不廢則為冗員不可廢而廢則為闕事興元之河渠司乃不可廢者也興元之為郡其地之廣衍視他大郡不及什之二三所恃者惟渠堰而已渠堰之水興元民之命脈也渠堰在在有之無慮數十然皆不及山河堰之大其澆溉自褒城縣竟於南鄭縣江北之境舊設河渠司以領之其秩五品其任職也專其受責也重故堰之修理無抛棄渗漏之水水之分俵無澆溉不均之田視夫水之多寡以為水額强不得以欺弱富不得以兼貧澆溉之法自下而上間有亢旱之年而無不收之處及朝廷以天下繁冗之官遣使可减者减之當時議者曽不究其實希合取容例為可罷使者寔不知其利害信意從之自是以来委之有司而有司復差設掌水者率不知水利之人是以政出多門而不一矣法生多弊而莫制矣堰不堅密水抛棄於無用㧞盖水門也無人視廵筒盖則水以澆田者髙下任移自下而上澆溉之法廢强得欺弱富得兼貧以力争奪數日之間倐忽過時而不及事官府又不為理如秦人視越人之肥瘠嵗稍值旱惟田近上源之渠者得收下源逺渠者全不收矣修堰之時下源者一例納木供役而不得水澆溉賦税公田之徴定額則不可免民轉溝壑可知矣其罷河渠司也不過嵗省官吏俸給數千緡之費爾然足食足賦税不聞以今賑濟所費校之孰為多乎某竊謂欲復立河渠司朝議非年載間不可定莫若省府權分委屬陕西渠堰官吏奏差等官各一員監視興元渠堰庶使水利均平嵗無荒歉之患蓋利於民即利於國也某閒不安分而僣越至此者韓子所謂畏天命而憫人窮也蓋前日不敢言又不可言今則敢言又可言矣惟相公裁之不宣啓囘􅊚親王氏啟伏以談經漢上蔚為儒者之宗分憲河東仰荷明時之寵風猷未逺聲氣敢同兹承亷訪僉事第二子庭訓早承豈輕伉􅓻而某第二女閨儀方習曷稱擇求何期媒妁之往来復遂絲蘿之攀附来儀甚腆愧不成於報章之子于歸願無忘於永好其於忻幸曷易名言為宋公亮子納幣王氏啟伏以桂子生香氣平分於素序黄花有信期密邇於芳辰敢藉成言以宿夙好恭惟姻翁某世德可師家聲如昨愧微蹤之不振䝉髙誼之俯從但頑息非東坦之才而長愛乃西軒之裔敢求佳偶亦欲良婣此豈人謀寔由天相絲蘿永附願申固於前盟筐篚雖輕庶用將於誠意幣儀不腆别幅具呈閑居叢稿卷十七
