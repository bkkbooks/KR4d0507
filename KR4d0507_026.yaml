body:
  text: 閒居叢稿卷二十六元蒲道源撰行狀西軒王先生行實先生姓王氏諱得輿字載之世為濩澤高平人其先有仕至郡守者有云出於文中子之裔但以世涉多故家譜逸墜無可考徵父諱仁政潛德不耀能守先法母陳氏通孝經論孟及女誡等篇先生生於己卯四月初五日髫齔穎悟強記過人九歲中經童然性莊重如老成人母曰興王氏者其此子乎金末壬辰之變怙恃俱失時年十有四能自立雖顛沛流離之際未嘗廢學所至必交有識之士辛亥從戍蜀時夾谷公行興元西川省事駐重兵漢中尚書楊德新郎中夾谷君玊識先生行伍間薦於公辟用先生雅不欲遂相與招延之使教諸子先生因留家焉癸丑李忠宣公以從冝行府興元一見深器重之以邊鄙俗尚獷悍起先生充三教提領視事未幾即以興修廟學為請南冠之在俘縶者皆百計振拔俾復儒編先生早工詩文丙辰過長安聞魯齊許氏以道學鳴遂悔其少作而火其藁慨然曰吾儒自有可學事奚用是為於是絶去俗學聚周程張朱氏書而探討之得其義理之精微尤以踐履躬行為實務中統建元商亷二公行川陜省院事升充興元路提舉學校兼本路勸農事先生嘗曰農桑者學校之所資學校者人才所自出而人才又風化所係也於是復以廟學請於樞院行府得報營於城內西南先生親督其事搆簣進齊於大成殿之東為諸儒講授之所書伊川四針及白鹿洞齊規以示教人及為學之方至元乙亥先生將改葬其先於濩澤時歲艱盜剽或有止其行者先生曰是念一萌幽明無間餘何避焉遂决意行過秦歷魏抵高平冒暑復下河南詣登封故居求祖考妣之遺玊陵谷變遷茫然莫擬先生齊宿默禱致其精誠夢寐有徵求而果獲遂一遵文公家禮而合葬焉觀者如堵僉曰昔所未見也登封令杜某拜且泣曰某以先世靈櫬在茲表請於朝得宰是邑求訪百至而情事竟不獲伸先生孝感豈偶然哉歸自覃懷過魯齊先生留止旬日魯齊深嘆贊之明年至漢中以目疾力辭提舉職怡然退處覃按察彥清雷御史彥正游平章子明王大參彥才俱以按治過郡交章薦聞朝論亦以先生宿儒耆德人所儀表勑授興元路儒學教授竟以前辭不就所居庭宇幽深竹樹茂美東偏為家孰號曰習齊中奠先聖顔孟左右周程張朱邵司馬六先生像朔望率子孫而拜奠之四周積經史子集及前賢墨跡石刻今士大夫詩文雖後生小子片言隻字略無所遺以文公敬針標第其號俾易尋取不致散失一器一物置之用之各有常處嘗曰有物有則人自不察爾有齊曰西軒先生自號也其燕處之室曰慎獨蓋其戒慎恐懼無所不用其力焉南有園園有亭字曰怡然記者謂先生二字友愛有怡怡之怡孝養有怡聲之怡先生俯仰無愧一順於理有怡然之怡凡賔客及名卿巨公至漢中者則必登先生門升此亭聞義理性命之論冠婚喪祭之說異端詭怪縱橫利祿一言不得與也又南褒有别墅築亭龍江之滸榜曰曲肱得山水之秀目以八詠弦誦之暇徜佯乎其間有浴沂詠歸之樂先生居常正襟危坐肩背竦直無少欹側雖僮僕卑幼不冠不見未嘗見有惰容至是屬疾二十餘月猶無異平日論語一書與餌藥方無時釋卷家人勸之乃曰一息尚存此志不容少懈我自樂之無所苦也疾革誦詠不絶座客問讀何書先生曰序卦屬纊無别語抗聲曰無極之真二五之精妙合而凝良久徐曰存吾順事沒吾寧也以至元二十九年壬辰十二月望日壬寅卒於正寢夀七十有四葬褒城縣麓堂鄊之西臯娶張氏勤儉雍肅以母死兵亂中終身不事容飾鄊里歆慕焉先生學術之正實承伊洛考亭之後於書無不讀禮樂名物節文度數洞究淵微亮析縷解然純一不雜窮理以致其知反躬以踐其實四書未嘗去手集注或問皆默成誦尤粹於易訓蒙以小學書為切務曰此古人教人為人樣子雖大學不是過也初年郡人多不知小學之教而有譏之者曰自有六經在奚用是為先生莫之辨也久而學者信讀之由是而有成者衆矣嘗曰學不貴乎博貴乎適用為學而不適用則亦何以為學哉海內之士道同心契者魯齊許氏潛齊楊氏有疑不憚逺而相與訂正焉先生家法之嚴尤謹於內外男女之别諸婦送其子女止於中門男賔未有輒至中門者有事擇書童幼而謹願者以將命子壻同居二十年未嘗一至其寢室每旦夙興詣祠堂拜謁畢子孫於其所在行晨省之禮先生問以所習事業而責其成功婦女羣下皆然昏定亦如之正至朔望叙拜如儀先生必以平昔所歷患難今日所以為樂者諭之且警戒曰惟孝友於兄弟又曰孝衰於妻子又曰異姓之婦或能賊同氣之愛人之所以為人者孝弟而已一日復視易傳諸書凡三十五部計一百七十三帙共九百三十三卷既畢召其子及諸婦諸孫序立堂下示之曰吾見人家昆季往往不義皆因父祖積財以啓爭端吾幼罹大變骨肉離散惟餘此身艱險百至雖欲積財何可得也縱使得之亦匪我心惟於六經書籍必存心懇懇以求之近所得書籍類皆散亂甚可惜也余雖盛暑日以雞鳴而起手自料理如是者兩踰晦朔殊不知勞自以為樂爾庶幾若輩領解吾意也他日觀是書者必不忍鬻墜之就能明乎聖經賢傳之奧日行乎孝弟忠信之實則一家之中父父子子兄兄弟弟夫夫婦婦上下和睦和氣藹然雖欲致爭亦無自而得也或私畜財貨敢言異居者子放婦出非我宗嗣子子孫孫永為家範皆再拜於堂下壻劉天祿舉杯為慶先生因書以為記趙總判德元因謁先生覩其家雍睦氣象不覺嘆曰先生一家其堯舜之民乎鄰母楊尚書夫人在興元最名有家法者其家人少有喧譁即禁止之曰獨不畏王先生聞之耶郡人有某兄弟爭財役訟者歷年不決先生諭以孝弟之義天倫之重翼日二人感泣相謝同㸑如初乃弟文以紀其實先生為書其後曰某門勝事先生守禮之篤冠婚喪祭一以朱氏書為本行之惟恐未至異言喧豗弗顧也長婦之喪一遵禮制子無疾猶疑以請先生曰禮如此吾獨何為後因閲朱子格言見文公喪其長子於寒泉用是禮先生曰文公以是喪其長子吾以是喪吾長婦之為後者又何過乎其有義起而因時制冝者如父在妻亡而有子而主祭者父也夫祭妻亦禮也題其主則當如之何先生以宗子之法斷之俾題曰亡室某氏冡婦某氐神主祭則使其夫若子奉父祖之命而祭之後考禮有舅夫若子為之主之文又家禮婦人無腰絰先生則以儀禮為主而用之但視男子之制為小耳童稚則絰而不冠先生之意不惟與禮意默契而所以處之者又得其冝焉郡人治喪不但一二人家化之尤重於追逺奉祀則變常盡敬以致其如在之誠少不如意則愀然纍日如有求而弗得者月朔薦新雖貧必備嘗曰吾於考妣皆不及養惟此庶少盡此心也生朝則深居靜處或出避野次誦蓼莪及書文公新舊說仍識其歲次于後是日也不飲酒食肉語輒流涕聞有歌則起而避之明日子孫方上夀焉先生教人之方自灑掃應對進退之節禮樂射御書數之習日用常行無非至理所寓講誦則必欲字真句絶習舊通新日有程式本末先後莫不有序學者逺近歸之童稚侍立必義手端拱行或蹶而手不敢失故其門人皆能以禮自牧不問可知為先生弟子至有未遊先生之門而聞其風者亦必詳詢備録以為矜式先生師道之嚴竊有慕於伊川進不以禮未嘗輕受門人受業者至於貴且皓首見先生猶凜然畏敬伏拜牀下來去不迎送其以師道自重如此先生遇物之誠其於詐與不信雖不逆不億而未嘗不先覺之亦未嘗見罔於理之所無也惡人之惡能改即止於所當言不少假貸而不能不忤於人久而後知先生之言為有益於己未有不慙且服者交友則久而益敬不以盛衰存亡有異友人王君厚使絶域沒於王事遺孤甫六歲獨與母居貧乏不能自存先生教育之均於己子弱冠則授以室又為之請祿爵俾得以奉先養母其於取舍有非義不受者有以義而不受者嘗曰與其取之而傷亷曷若與之而傷惠寧失於我無負於彼先生風化之念不少釋於懷寓漢中四十年其始至也庶事草創人惟知有二家不復知有吾儒先生嘆曰斯責其在我乎遂懇請公卿創修廟學經始洎落成朝夕孜孜甚於貪夫之營私者雖祈寒暑雨不一日少弛其勞為屋近百楹手植槐柏皆方列成隂至元丙戌始克大備先生又以魯齊所定釋奠儀參以文公蜀本凡七家禮而折𠂻之是秋之祭觀者大悅皆以為內郡文物之盛蔑有加也次子無妄拜雲南監察御史受命之日以親老辭先生曰君命不可違也汝身向已屬官吾得而子之哉將行授以四書家禮釋奠儀曰使逺人知此以為學知此以為禮知聖人之教為可尊而王化由是可行則是行也其庶矣乎吾老何恤焉先生字畫之微亦不苟簡必正色凝神一㸃一畫而徑正緊結類其為人有求書者必擇名教切已之言書之莫不因其人之善而勉之因其失而救之先生資稟極高涵養有素精思力行自幼至老敬義夾持體用該備明白洞達表裏輝映晚年道尊德盛元氣混融即之如陽春之溫徐而察之蓋有凜然不可犯者噫使見用於世正大則有格君之術剛毅則有諌諍之風平易則有循良之政其不用命也然道德之盛雖處於下猶足以淑諸人焉參政左山商孟卿贈詩云漢中有高士王姓字載之簞瓢陋巷居怡然榜門楣妻子不戚戚生徒亦熙熙名教非無樂紛華羞外馳橫流嘆湯湯砥柱非君誰又云閉門不求知實在名自隨關中昔楊震漢上今程頤江流不可蝎思君無盡期中丞青崖魏太初記先生怡然亭自謂無愧辭其略曰先生巍冠博褐進止舒徐其容莊其辭溫藹然程朱家語録中人也又曰先生之怡油然自得於義理涵泳之中日用體踐之實故為識者景仰如此尚書西溪王子冕贊云有諸中形諸外識與不識望而知其為有道之賢其為名流所推重如此其他不可具述先生二子長曰無疾興元路儒學教授次曰無妄四川亷訪司僉事事親俱以孝聞居喪毁瘠踰禮蓋能世其家法云訥庵處士任君行狀處士諱某字東卿姓任氏其先世居太原之汾州孝義縣仁智村得姓自顓頊少子湯封於任夏更封於薛周威烈王時有名座者以直言見稱於魏文侯居西河郡即今之汾州也後有寧州刺史諱溫濮州刺史諱德基大理評事諱政譜牒逸墜故不知為幾代祖也高祖諱某以孝行稱隱德不耀曾祖諱文明字大有為襄陵尉遂家襄陵學問該博政有能聲善於天文圖緯之學祖諱潤字天澤父襄陵君令業醫不使之仕人怪之莫測其意病革私謂之曰天象示變久矣不十年北方兵起汝莫求聞逹明醫足以逃世難活人足以積隂功一家可保也祖天澤遂不仕以醫名於世歲之壬申天兵南下其言果驗父諱志愈字時泰醫得家傳之妙其道大行貧者施以藥資以米所活甚衆一日聞逆旅有呻吟垂絶者往視之乃病旅也狀貌雄偉遺藥給粥月餘獲愈其人拜謝曰生我者父母也活我者君也吾雖貧志則有之他日當以死報摩合羅之名者我也再拜而去其後金兵復冦平陽邏騎得君縳使前導指藏金寶之地君恐遇害乃紿之以延頃刻之命且行見甲馬百餘突前者連呼曰住令釋其縳衆軍皆驚不知其故前者下馬却兜鍪謂君曰汝識我乎我即汝所活摩合羅也吾今為帥求君相報已三日矣欲呼與去辭不從乃指避兵之方與白金百兩仍贈弓矢曰有人來擾以此示之遂舉家獲全於難後與平陽安某者俱以醫事睿宗凡湯藥悉經其手以謹願得幸未嘗一日離左右嘗賜錦貂帽以拜掃丘壠乞歸又賜良馬一白金五十兩既歸散餘資於所親之貧者築亭襄陵之城南榜曰種德里之老者皆曰吾司命來矣病乞藥者如市既愈酬以金帛一無所取曰非種德之意也乙未太宗詔都元帥塔海紺卜征蜀病股訪名醫皆以君為言乃請於太宗授以都元帥行軍太醫提領之職月給銀一十兩至漢中興元行省沔國公留止遂卒時辛丑之十二月八日也娶某氏先卒生子二人曰和曰睦再娶趙氏生訥庵己亥五月二十六日也晬日母趙氏置書筆錢三物試其所愛但取書與筆而已或以錢握於其手輒擲於地人驚異之辛丑父卒甫三歲晨昏匍匐求父甚哀髫齔不遂兒嬉凜然有成人之狀母趙氏性嚴有法教以義方五歲聞講解孝經既曉大義既長穎悟拔萃母有疾則輟食求醫鄰舍趙翁戲之曰汝能割股乎曰能又曰孝經云不敢毁傷如何對曰不敢毁傷聖人之法也割股愈疾孝子之心也翁竒之是夜焚香稽顙北辰言曰某三歲失父賴母鞠育甫十歲矣今而有疾豈敢自愛其身不以愈我母之疾乎遂剪其肉以饋其母即愈鄊里稱之母卒號痛嘔血絶而復蘇水漿不入於口者五日哀毁柴立終身不復擇葬親拘忌隂陽者皆曰年月不利答以司馬溫公論葬一節力主行之後卒無事皆嘆服焉凡冠婚喪祭一遵禮制君郊居二十年不喜入城府然祠堂舊在城中居四時朔望必躬詣薦新未薦不先嘗至期雖風雨或微疾亦力以往未嘗少怠也舅氏趙某者兵後相失偶於人彀中得之竭資以贖仍為娶侍同居二十年甘㫖供養始終一日也卒為制服以禮葬焉間嘗謂其二兄曰某見人家以户役財物紛訟不已者甚衆某安忍為是且國家南征北討軍事為重我自應役於此鄊里田園足以資給子姪諸孫足以奉侍二兄但當娛樂自適某悉無所取自是四十餘年二兄絶不以軍役介意既卒子姪間亦未嘗及之來告乏者資之使還雖數輩不輟郡人有馬氏者嘗以白金百兩為寄且死君詣其家見其母問曰知我與令郎有約否其母以為負債來索也驚哭曰君勿言我兒死矣百事我無與焉君曰非也我處寄白金百兩今持以還無驚憂也遂遺之其母叩頭拜謝君先考之嬖人劉氏頗知經史善醫藥父卒為黃冠别屋以居醫道大行於漢中家用饒足劉氏病篤呼君謂曰我出汝家三十餘年賴令先君之餘庇有中人之産諸養子無足托者我死汝盡收之勿為諸子所破君辭之曰無是理也劉曰我死任氏鬼也不歸任氏將安之乎君固辭劉曰得無憚歲時一奠我君曰祭祀之事終身不忘止受一銀合以免其意後諸養子果盡蕩其産君至今不忘祭祀云君性剛正負竒志少頗喜孫吳術一日讀孟子至論王道之際慨然曰吾儒自有可學事刮去舊習折節讀書聞闕峯陳先生精於易圖緯術數之學曲盡其妙即往受易焉先生嘗曰吾閲人多如任子者鮮矣君師慕交友皆有識之士西軒王先生字其所居之齊曰求己王西溪子冕書以揭其楣一時名公若青崕魏中丞山木王內翰寓軒張集賢濟南姜中丞太原馮參政輩皆以按治過郡深禮敬之褒詠題贊盈縑滿軸且交薦於朝因北上至汴偶有不慊於意歎曰夫學將以致用而伸吾志堯舜其君民使無愧於心可也不然豈可碌碌隨人後校升斗之祿哉吾不為也即日西歸為終焉之計卜築於無憂灣之南朝夕逰詠於其間名其室曰訥庵且歌之有不夷亦不惠非樵亦非漁之句園中所植花木必成行列曰置物如養心不可使亂去草必務盡曰去此如去惡不盡必將復萌不可圖也為政亦猶是爾庭中有古山茶一株蒼柯怪節盤錯如石常呼為歲寒友嘗自題云世教衰微日更深今人誰復古人心試看亭下蒼蒼木一日猶移三面隂其寓意如此亭北畦蘭數十本南開二徑兩旁皆菊清溝環匝植以白蓮常曰左右前後皆正人又曰使居位者親賢若是豈不有庇於民哉君襟韻灑落無塵俗之氣所居又有清致幅巾杖履逍遙其間庵壁挂大易十圖燕坐瞻對其胸中造詣又非他人所得知也每佳客至必出酒共飲談笑終日使人亹亹忘倦常愛古語題其門曰舉世盡從愁裏過誰人肯向死前休又云不用閉門防俗客愛閒能有幾人來山木王公往歲奉使入蜀一見愛重如平生歡公後按察漢中為銘求已齊有矯矯任子中立不倚之句後十餘年公復來總興元治暇即往候之相與徜徉於水光林影之中俗事一言不及也或把酒浩歌或對牀清話賔主兩忘常云農桑者衣食之本風化之原乃力農桑以率游惰又漢中風土之冝寒暄之節與古法有異者别集為一書名蠶桑輯要取為法者賴給足焉又云達而為相固可活人窮而為醫亦可活人分殊而志同者也乃搜閲家傳凡平日經驗藥方為一書名曰任氏集驗方一十卷樂周人之急士之貧而請謁者寒衣飢食有甚於已死喪患難尤著意焉見窮獨者必遺之食曰此無告之民也不可不恤與人言是是非非務盡道理不固執不詭隨親戚有紛訟者正言以喻之不顧其怨其人始雖懷念終則悅服鄊里子弟有可進者隨其才之高下勉勵之氣和言忠聽者不厭雖居畎畝以天下之愛樂為心聞時政之善者則喜形於色反是則鬱鬱終日夏五月疾作謂其子曰吾生登明今而衝於太一涒灘來角於此木之絶也吾其死於七八月之交乎子輗應曰昨筮得臨之泰吉也君笑曰非爾所知也易樂必多憂泰者乾反居下乾父道也父失位矣子為父占吉從何來臨不曰至於八月有凶至者其在月之首乎吾死必矣命具棺槨衣衾凡喪葬之須曰吾歸矣夫復何憂又曰有負吾債者想貧也我死勿難於人悉還其劵疾革憑几而坐神愈精明戒其子曰吾以勤儉起家未嘗少懈雖居散地念不忘君汝出仕雖居下僚不可苟也當汲汲自勵以父母之心為心可謂孝矣釋老二家吾無與焉命紙筆大字書曰豫生無益於時者安忍勞人動衆盈塞街衢取觀於人吾未見其榮也東野草堂實豫遊息之所我必止於斯歲時祀我於此再命紙書留别山木公一絶云云就寢少頃復正襟危坐命其子誦濓溪太極圖說一篇畢屢肯其首曰大哉易矣其反吾之始乎遂卒實乙巳歲八月壬午也配鄧氏前興元招撫鄧君之次女有賢行前一年卒子男一人曰輗任蒙古教授娶苗氏女二人長適前巴州尹雷成務之子仲威次適前南鄭縣尹王從仕之孫瑾孫一人曰桐以其年九月某日葬於南鄭縣味溪村梨園之先塋其子輗一以朱文公家禮行事且紀君平生行實泣拜以授道源使狀次之道源以鄊里晚進視君為先輩不敢固辭竊謂君早孤克自樹立勉勵得聞先生長者餘論及與賢士大夫遊其學識醇正踐履篤實雖不用於時觀其行己治家綽有餘矣按其所紀序述為狀未暇約其辭以待當世名公巨儒采擇為志以發其潛德焉閒居叢稿卷二十六
