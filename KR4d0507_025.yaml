body:
  text: 間居叢稿卷二十五元蒲道源撰墓志銘表節婦曹氏墓志銘泰定乙丑春興元府史黨復初持其亡祖母節婦曹氏永終堂詩卷來求詩於某其堂顔及記皆勤齋蕭徵君所作詩則當世名公之所贊詠也既已異之為題卷尾歸之其秋復具禮幣及節婦行狀致其尊人世榮之命求葬銘辭不許乃敘之曰節婦曹姓諱崇善世為蒲城良族金源末譜逸不可紀節婦其生也幼而明慧長間禮則年十六歸黨氏為諱豫字仲和之配克相其夫事舅姑承顔順意得其歡心姑雖嚴以是愛猶己子至元己巳七月八日不幸仲和卒遺孤二子一女節婦哀毁幾斃鄊族嗟異時甫三十五歲既以盛年守義黨氏族大力薄節婦刻苦治生持門戶內外資給不闕又取人負其夫積債貧不能償之劵稟於舅姑悉焚之篤教其孤二子舅姑繼沒罄家之有以辦喪具大德改元十二月有司以鄊里狀曹氏貞節上之朝旌表其閭里安西王妃懿旨寵錫纁帛優渥重疊榮耀一時時年六十五矣康寧之福在於晚歲子孫詵詵歲時上夀輝映家庭若曹氏之積善慶可謂無歉矣以延祐丁巳十一月十二日終於正寢享年八十有三女適元氏先殁二子長名逸字彥才為安西邸實資居積庫提舉年四十二先卒娶屈氏亦卒生孫男克誠娶竇氏曽孫男橘實孫女一人適郭周卿先生之孫惟聰次子名榮字茂之亦嘗提舉塌房尋不仕凡二娶先趙氏生孫男二人女一人長復初娶蔡氏生曾孫男移興冝兄梁山崇山次泰初娶楊氏生曽孫男孝孫孫女適鄭萬户之孫思復繼元氏生孫女一人適孫氏初以二子之從事於安西邸遂挈家寓奉元之咸寧縣遂以曹氏之喪權厝於奉元之里仁里子世榮欲得銘以某年月日歸蒲城合祔於先塋禮也余謂婦從一而終固為常禮然書傳記所載卓然可紀者亦無幾矧世降俗薄如曹氏氷霜之操事舅姑治家教子無愧於古人無負於死者耶某嘗職太史是冝書銘曰無非無儀為婦之常至於患難其節乃彰始也不幸終也彌光含飴哺孫既夀而康瞑目無愧與夫同藏刻辭幽宫庶久不忘強君妻程氏墓志銘致和元年秋八月興元路儒學教授程從道來請曰某不幸有姊之喪自惟兄弟逺離病不克奉其湯藥沒不得見其屬纊送不能與於執紼悲痛莫贖僅有求文以志其墓少伸此志願有以寵綏之余亦哀其請弗克固辭視其狀序之曰程氏故鳯翔隱士程載之之長女也幼慧而婉善適父母意又睦於昆季冝於家人年二十有一歸同郡強氏強先世居洛陽厥祖諱堅者值金亂徙鳯翔占籍焉二子曰寧曰順寧先卒順字和甫力農不仕年七十二而卒配楊氏亦二子長先卒次諱文寶字君玊即程氏所適也君玊為人聰明篤實頗涉書史亦不願仕孝悌力田敦睦宗族信接朋友好周人急又得程氏相之撫育兄子如己生及長為婚娶以祖遺業及己所殖産中分無所吝強氏姊卒女數人無依皆厚資給歸名族氏至於他人之婚喪不給者亦往往助之君玊以此見稱於鄊里程氏無不力焉君玊一日置酒饌會親舊酒既行言曰某命當終望諸親善自愛不復久相見矣因遍拜泣下座皆驚惑翼日復各詣門告别又後數日具衣冠與妻子訣囑以後事即寢良久不聞息就視之已逝矣衆異以為竒男子時至治三年九月十六日也年四十有六始程氏歸君玊時舅姑具在以事父母之孝事之俱得其歡心娣姒無間言敬事其夫未嘗忤其顔色教育諸子治理家務內外整飭婦道母儀可謂克備以致和元年七月十有七日病卒年五十有六凡六子曰允忠允恭允敬允道允德允謙女適本郡張某次未笄孫女三人俱幼姪孫男二人兄子時中之子允敬漢中道亷訪司保為四川道亷訪司書吏以其年某月日合祔於鳯翔府北里仁鄊之先塋夫君玊之墓禮也弟從道來速銘曰葬有日矣敢請銘曰貞靜以為質婉順以為容相其夫以勤儉凜其志於初終子孫蕃衍閨門肅雍歲方閲五伉儷相從德則多矣夀胡不融以托其實以銘其封太原郡侯王公神道碑銘聖朝廣仁孝於天下凡內外官皆得視所受爵秩之崇卑以及其親於是中憲大夫興元路總管兼管本路諸軍奧魯總管管內勸農事王忠得以三品秩追贈其考亞中大夫懷慶路總管輕車都尉太原郡侯妣關氏太原郡夫人嗚呼可謂幽顯皆有光矣先是忠繇國學生史户部徽政及都事章慶使司勑授公承務郎關氏追贈恭人公拜受已蹙然曰嘻我何功而至此哉後忠擢徽政院檢校覆料官進公承直忠自奉直大夫經歷章慶又升奉議繕珍司丞秩正四品公已卒制贈中順大夫知河中府上騎都尉追封太原郡伯關氏太原郡君忠繼授朝列大夫都提舉萬億賦源庫提舉洎遷尹興元公得贈三品進侯爵蓋王氏太原之望世居晉寧之襄陵公諱誠字子敬曽大父樞大父讓父伸皆潛德不仕伸娶張氏子男三人長貞次泰季即公也性醇慤而恕力田為業不服華美居里閈以義聞子孫營生者嘗諭之曰為人貴心術端正無或自欺吾見世之競利者於出入之際權衡之低昻概量之盈縮尺度之短長欲欺於人先欺於已害天理傷隂隲誠為可畏汝等得已則已無如治田力食無愧儉約省浮費自可以給故公治家有法亦贍足嘗見遺粒於地則以暴殄天物責家人鄉里子弟之從學煢獨窮居親戚之婚娶喪葬行道之流離乞丐匱乏艱棘目之所睹力之所及率惠助之或得遺物必歸其主不得即榜於路以須其人其克己安分如此雖天性之美而家法亦有自來矣旦望宴集親友談論相朂以善嘗遇異人授以道術年甫四十夜靜坐達旦享夀七十有五子男三人伯蚤卒次曰忠曰德忠娶謝氏繼續氏以忠貴皆封郡夫人孫男四人質亨施元曽孫男燕山善慶女孫二人公之配夫人關氏亦克相夫子閨門雍肅衣儉以潔祭祀必躬奉尊長動止以禮大小衣服裁紉不倦每炊密減米抄合歲久積多遇荒歉給家之餘尚可及人妯娌親鄰睦無間言雖卑幼責無惡語嘗誡新婦等相義讓毋妬致昆仲不協勿私藏竒外家各勤苦率先勿稱已勞不幸先公卒合葬從祖塋禮也於總尹興元三年篤實愷悌民愛慕之則其能服公平昔之訓而施於政事可知矣與道源居相邇且久一日以善狀禮幣再拜請曰先公積德於身而不顯以遺我後之人墓道之碑未樹蓋有待也今既侯斯可矣敢求文以刻諸石固辭請益堅道源自惟嘗執筆太史氏之後法所當書不書是不能成孝子之志也謹敘而銘之曰允矣王公德積於身其德維何篤守真純欺不萌心惠存及人以訓諸子亦克書紳仲也宦達恩得顯親公歉何功不笑而顰晉疆侯爵殁贈繼臻象服襜然兼賁其嬪維孫及曽魚貫詵詵其福未艾若時方春銘鑱墓石愈久彌新何氏冝人墓銘何氏某梅隱先生名坤章字朝瑞之長女母王氏冝人生而淑懿願慤性極孝不勞教誨循於禮法善女工夫道源年十四五時從其父先生學先生憐其頗可教遂妻之及歸蒲氏克執婦道盡將其纂組舊習棄而弗治一意於紡績蠶桑之業時道源家貧至於二親甘旨有所不充冝人布衣菲食躬汲與㸑勉力供養雖淡薄咸得歡心一家之縫紉補綴燈火達旦不以為苦後數年道源以教授鄉里生徒翕集家頗溫舅姑怡樂冝人眉亦舒平生寡言笑不事粧飾簡出入雖其弟家相距不越數里十餘年不一二至從可知也嫁時衣白首猶如新娣姒等無􅊏隙之嫌歲時相祀惟謹歲癸丑道源被召命為翰林國史院編修官又三年以應奉翰林文字同知制誥以七品例蒙封贈父母妻何氏遂受冝人之命從姑與宗族閭里之慶今道源又受五品職冝人當封縣君未及而卒生二子三女閨門恩不掩義長子曰樞先卒時年三十有一娶千夫長王氏孫女次機擢戊午舉同進士出身為芮城縣令娶陳氏長女歸景氏夫大全為城固縣主簿卒次歸江東肅政亷訪僉事次男王惟祥先卒次歸杜氏次子彥禮攻進士業今為洋州儒學正孫男二人牧奴開奴孫女三人冝人病荏苒歲餘次男婦陳氏以辛未年正月十有五日風中卒宜人驚憂至十九日乙未亦卒其生也歲壬戌秋七月二十有六日至辛未年七十歲殯於家次男機自芮城歸以是年十有一月某甲子葬於興元之東甕池村之先塋夫道源以婦人之行不出門人無知者自拭淚以銘之銘曰士之修行猶不望知况婦人兮其歸我也舅姑有怡愈之色宗族無間異之辭又克勤以成家不溺愛而教子咸得其冝銘而刻諸玄室以致余之哀思鞏氏先塋之表古之士大夫家嚴宗子詳譜系而世次不紊俗降法廢為人後者懵不知其祖先之所自同宗昆弟甚至不相識間有超流俗登仕版卓卓自樹泝流求源以昭示來世其賢於人亦遠矣此鞏氏墓表之所由作也鞏得姓自周卿士鞏簡公以邑為氏晉有鞏朔歷代譜佚不可考至曾祖府君諱孝章大同路朔州人也世掌戎行金時為監軍以忠厚傳家子二人長曰子固於今為伯祖行驍勇絶人金末領軍民元帥逮歸我聖元仍職戍太原今為冀寧路及卒葬於彼之榆次縣鞏村之兆次諱安實為祖考性沖淡不喜奔競從事於秦樂終南甘水之秀因卜築焉夀六十有二祖妣侯氏勤儉起家克相夫子生子六人溫英天瑞仁義希文夀六十有八以至元六年八月某日合葬於奉元路盩厔縣珍藏鄊姚村之塋溫字仲和行為伯父研究經史潛德不耀以逸齋自號有四子伯泰伯誼伯昌騂革顯考諱英府君字仲榮為人材武曉師律起授千夫長方朝廷加兵於蜀也君率所部從蜀既定立家於成都以至元十三年四月二十七日卒享年五十歲妣李氏後君十一年四月十七日卒享年六十歲以元貞元年二月某日合葬於華陽縣之新塋子男三人伯康伯平世傑天瑞以下皆叔父也天瑞字仲祥仕至彭山主簿有三子仁字仲信生文毅革文郁思忠思恭思茂凡六子義字仲禮一子闕美嗣希文字仲章一子伯諧嗣皆不仕蓋自監軍而下伯祖房皆居冀寧祖房皆居奉元惟考君及叔天瑞房皆居蜀嗣孫世傑與道源有舊從調京師訪余於史館懇請曰世傑幸承餘慶獲祿不及養顧惟先世隨所寓地而葬子孫因亦散居而墓隧皆未有銘志以表顯於後大懼傳世久逺邑里敻隔末裔不復知鞏氏一源此而弗圖厥罪何所逃耶余感其誠意不忍辭為視來狀次第之世傑今為奉議大夫新知劍州讀書有吏材其官業之進家門之盛猶未可量也銘曰惟鞏受氏爰自邑封裔徙朔邊世以武雄金社既墟挈族來冀復葬鞏鄉事若符契仲也至秦子孫詵詵又派於蜀聚居曷因太原郡伯王公墓表元統二年春興元路總管王忠以事狀一通備述其丘瓏因革祖父實迹拜請於某求文以表墓道辭不獲視狀直敘其事曰惟王氏世居晉寧之襄陵為望族金季譜逸莫考縣之西南村曰齊勝有王氏逺祖塋內存三大塜俱無志石又東北六十舉武亦王氏塋三大塜又一小塜無志不能派别地狹穴滿遂直東北五十舉武創塋祖居中伯父二及考君敘葬孝孫忠至順二年在興元任制下贈祖為中順大夫中山府知府上騎都尉太原郡伯祖母張氏太原郡君祖諱伸忠年十有三歲時已老健嘗聞其訓誡子孫曰汝等勿欺暗室勿陷害人妨德損福莫此為甚我遇兵難挈負三子避於山中艱苦不可勝言幸際平定得保餘生粗衣糲食自以為安勤儉積粟及棗實甚於金玊自給之餘周給貧困救助凶喪不施勞於人不矜已長而言人短侵田畔者不與爭訟屈已遜言彼自感動復歸所侵人有紛競勸各忍忿悅從者衆吾平日以此存心宜志之又誡諸婦孝親治生敦義讓絶妬忌子孫及諸婦俯首聽命永為家法至元十七年五月十七日終於正寢享夀八十有三葬於新塋立表以志惟伯父諱字子孫世次則具見於考君神道碑兹不重出孫忠自惟無以逺承祖考餘慶備員侯牧而祖得以四品伯爵焚黃蓋其隂德有自來矣某述其事既係以銘曰黃潦稽天涸可立待王氏源深流達於海宗𣲖之傳綿億萬載間居叢稿卷二十五
