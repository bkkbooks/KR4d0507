body:
  text: 間居叢稿卷十元蒲道源撰跋跋郭治中所述瓜爾佳行省事狀古之豪傑功烈見於當時而聲猷未盡彰於後世者多矣秉筆著述之士咸惜焉若桞宗元狀段太尉逸事以告於史官韓子為當世聞人作傳者非一然後慊於內故興元行省夾谷公乘時草昧負將帥之材膺爪牙之寄劉敵闢土奮知竭忠勳著本朝澤被梁益薨逝未幾而人罕有能言之者郭侯昔常受知於公而親事之耳熟其世家目擊其行事懼夫久而湮沒也私為識録出以見示其言詳而不蕪核而有證斯亦好著述之徒歟矧國朝褒恤勳舊而公之子孫復在顯位㑹録公之事狀稽顙請命於朝下太常定美諡非此文尚奚徴耶余夙懷斯志而適郭侯之先也故跋其辭如此云跋張府判關中諸公送行詩後凡稱譽於人者無徒諛得稱譽於人者無徒悅則為兩盡其道蓋譽而有試則所譽者必稱情悅而能繹則所悅者必有益僕觀關中士夫餞平甫張侯之詩而竊有感焉夫張侯為政於漢中再朞矣其和而斷嚴而恕廉以成其公學以廣其用正已格物急吏緩民厭服於人心播誦於人口然後知前日稱譽之辭不為諛而今日施設之方亦由其能繹矣雖然張侯必能充而大之俾功豐而德𢡟垂光而流榮此關中士夫平昔之所望而僕亦有與焉於是敬書其後而歸之跋趙伯儀拜參政詩序後夫居公卿之位人以為當然而非幸亦無愧矣蓋所謂當然者或以勳舊或以資望或以德量有以厭服乎人心故詩曰緇衣之宜兮敝豫又改為兮苟或不然則所謂幸爾故詩曰彼其之子三百赤芾斯二者榮辱之所係也參政趙公忠愍公之冡嗣也語勳舊則忠愍服勞王家矣語資望則三為良刺史皆有善政矣語德量則公寬𢎞重厚汪洋不見其涯涘矣如是則公卿之位捨公而奚適公拜大參之命漢中部士咸以詩賀其家世昆弟之美在官政績之善已見於前序矣愚為明其所謂當然而非幸者以為在公實無愧在賀者實無諂也因跋於作者之後云跋送劉直判卷比來南音說相談命過漢中者不啻車載斗量之多率皆揣摩附會以求售而聽者益厭今劉生自别直判年最少藝最精論人禍福差可准信為出數字使識者知所區别耳跋李景韓字說世稱韓昌黎學者仰之若泰山北斗則世之慕望者宜衆矣李生以昌黎諱自諱其慕有甚於羮墻之見翰學山木先生為字曰景韓又掇取昌黎文章事業焯焯者數事為生指南而著於說生持來且有請余曰此說至矣而復何言雖然昔李氏子蟠好古文行古禮通六藝經傳昌黎公作師說以貽之今李氏子愈頗好學山木公作字說以詔之二說並行於世生既以景韓為字又當以景韓為心從事斯說無愧於昔之蟠可也跋李希仁所藏王山木草書詩詞卷文章翰墨古人以為士之餘事蓋言其行已大方有不在是者然即其文以考其學問之淵源因其字以見其心畫之徑正則所繫固不輕矣內翰山木公總尹興元時余嘗得侍燕閒聞其稱中州前輩士夫名節風誼且評其文章翰墨之妙則公之自負從可知矣李君希仁修飾好事公書舊作以遺之未幾公以太子賔客召卒於位希仁出此卷請豫為跋余慨公之不復見矣為之撫卷太息書以歸之俾後之欲識公而不及見者觀此猶足以倣佛其流風餘韻云跋節婦孫氏傳余忝翰林末屬五年於兹凡傳婦之貞節持卷求題詠者不啻十數而撰列忠臣之事者或無聞焉抑朝廷清明四方無事未有所因而發其藴邪將廉恥道喪而無所勸激耶皆不可得而知也延祐三年冬元惡搆禍於陜西自取天誅時以忠義顯者僅聞一二其平居據髙位食厚祿者莫不委靡和附嗚呼君臣之義至明至白而臨事之際以嗜利保身之故昏蝕其本心顛倒錯亂曽不若嫠婦之所守是可嘆也已因讀孫節婦傳見其盛年失配貧能守義事舅姑撫諸幼艱苦百至始終一節凛然有烈丈夫之風可不謂賢乎今年將八秩其子平復以孝友聞天之報施豈徒然哉為平者倘能以豫言紬繹之則知忠孝不為兩途矣跋秋谷平章試院中所作詩洪惟國家武定文綏際天所覆靡不臣服然設科取士之制未遑及之世祖皇帝朝嘗欲舉行以議者不一而罷今皇帝龍飛之二年斷自宸𠂻詔頒取士之式於天下越明年鄉試又明年郡國賔興中選之士萃京師者幾三百人以試於廷制命文臣翰林學士承㫖中書平章政事韓國李公為主文甲乙而可否之公盡心其事於試院中作詩七言一章凡八句其所以頌熙朝之盛事勸士子之為忠以報方今之榮遇思得真儒實材以輔成太平之治且自退托於不能意無不備溫厚之氣藹然見於文字之外其造語之工有不待論也讀者當自知之宜刻堅珉以示永久題孫氏廬墓卷孔子防墓崇四尺墓為雨崩孔子泫然流涕吾聞之古不修墓蓋葬者藏也欲人之弗見非所以侈於外也後世孝子慈孫欲報其親而無由者於是負土以增其髙伐石以表其外至於廬墓之說亦非禮經之正蓋父母之喪居倚廬體魄既葬是日必虞者所以使親之魂氣依慿於已而祔於廟也而必廬墓者曰親在是矣是棄之於野也世衰俗薄執親之喪企而及之者蓋少矣其賢者或過之不汲汲以稱道則人將何以激勸哉孫君之行其殆類是歟雖然孫君讀書者其顯親揚名將有望於後日其於此不得不與商榷之跋鎮南王弟庫庫布哈太子為李才卿書孫真人所號海霞子卷國家升平日久仁漸義摩開文明之運今天子崇尚儒術出於生知璿源金枝之貴亦皆靡然而化及觀鎮南王弟為吾友李才卿所書海霞子手卷惓惓然以吾師稱雖其天資純茂而才卿乂以經義相導左右之使然詩所謂振振公子蓋本於關雎麟趾之化者有不誣矣嗚呼盛哉題伸蒙子林先生續孟子二卷亞聖七篇之書謹義利之辨明王霸之分知言養氣盡心知性擴善端闢邪說粹然一出於正度越諸子獨列於經韓子以為功不在禹下程子以為發前聖所未發其尊之也至矣豫觀伸蒙林先生伸蒙子書續孟子二卷其自負為如何哉惜其生於唐季屈於下僚不克展其志然能不染巢賊之汙竟罵而死合孟子舍生取義之說良可欽仰有非世之大言而無實者比昔揚雄氏凖易王通氏擬經不免後世之議然皆一代儒宗也孟子曰若夫豪傑之士雖無文王猶興伸蒙子其庶幾焉跋張蜿大用恆齊卷後豫觀恆齊衆作其叢引恆說備矣然不可不辨蓋恆與有恆為理固一然不能無髙下淺深之别易恆卦彖辭極言恆之義此天地聖人自然之恆也至於爻辭不恆其德或承之羞此設不恆者之戒而使之知恆之當守也與中庸誠者天之道誠之者人之道正相類語孟有恆無恆之訓正為學者言也蓋下學上逹雖非二致然有先後工夫次第苟能持守固有之善明辨篤行無少間斷自有恆以造夫自然之恆將見有益於身非獨為齊之美名也恆齊主人以為如何跋吕伯充侍讀序王信手卷廬陵王信記母氏垂絶之言以能復其姓懷劉徐撫養之惠而誓報其德此志未酬過時不娶雖雜居於市井而有士君子之心亦難得也侍讀先生恐其徒知報恩之為重而不知無後之為大許其已能而勉其未至抑其太過而俾就厥中斯可謂善誨人矣跋王賔客為畢監州作孝廉贊孝廉贊者今太子賔客山木王公為忠翊洋侯之所作也洋於興元為屬郡山木王公總尹興元日嘗謂余曰洋今新得郡長某東顧無憂矣然少須之未幾果以廉能報政暨公老謝事閒居閲數稔侯聲藹然如一日因喜為之贊余謂侯起家為郡守非有斬將搴旗之功為吏積勞之比特以孝誠動天而致耳其在官而廉亦分內事斯㫖在人為甚易然人罕能蹈之故謂之難也亦宜此山木公之文所以不容不作也傳曰君以此始必以此終則山木公之文庶乎為不苟作也跋梁氏致慤亭卷孝子仁人之心本於誠而禮則由義起者也上古之葬衣薪而不封樹略於祭可知矣聖人易以棺椁為之封識陳其簠簋致其孝思極情文而本誠敬載在禮經班班可考則義起之禮不既多乎秦漢以來日趨於靡墟墓之間刻豐碑列儀衛苟可以致其文者無不具然誠之道則衰矣茌平梁氏作亭於先塋之次於歲時展謁之奠將以妥靈於是顔曰致慤其篤於追慕之誠可謂至矣考禮猶病亭之非制且致慤之名本於祭義祭當於廟於寢者或者又以墓為親之體魄所藏祭有不容已者各有援據愚謂祭於廟於寢祭之正者於墓歲時拜掃之祭祭之權宜者祭無所不用其誠則致慤之名尚何間耶如是則向之作亭者非直為觀美孝子之心以義起者也今之求文者非取乎贊詠將以究義理之無窮也故為表而出之梁氏子名宜字彥中以進士髙等得倅邳州選教胄學昌大可必矣積善餘慶詎不信然題月山道人卷後翰林學士酸齊貫公以宰相子居玉堂僕時忝應奉翰林文字獲接餘論察其不受富貴羈束超然欲神遊八極之表已而果棄官浮大江而南其光塵不可見而音問不復通矣今李道人踵門來見余觀其貌清而不臞聆其言溫而有理袖出士夫所贈詩卷叙其本錢塘人受業於上真宫之趙尊師聞蜀之青城乃神仙之勝地欲居之遂道長沙而西遇酸齊公與談方外事以清識見賞字以月山叙之言如此夫錢塘天下之繁麗而岷山天下之岑寂也道人舍彼而有取乎此其出塵之想可尚矣余既異貫公之為人其所許可必不誣矣然月山之義道人亦嘗思之乎夫月之在天吾行亦行吾止亦止吾與月初皆無意也今西山之月即向西湖之月以我之無心值彼之無意隨其所在玩其光華食其沆瀣施者不吝得者不德至於一氣存於中夜合盈朒之有常體運行而不息雖吾身之渺然其長生久視未可倫擬然此心磅礴天地之間雖與之終古可也此道人之能事余可得而知也若夫修煉之極萬一至人授以飛升變化之術超萬仭之嵳峩凌倒影而下視挹浮丘而謝時人則余不可得而知也若貫公命號之意其出於此耶抑不出於此耶恨不得而叩之明月出山時草木含清華鶴鳴境逾靜猿叫驚復嗟氷輪欲飛去翠嶂還周遮沉沉開玉宇灝灝真仙家道人虛空白萬籟絶囂譁湛然方寸間兀坐思無邪息微殆以踵氣運猶轉車生明與生魄相顧不我遐丹元洗沆瀣淨書遺垢瑕况有龍虎鼎內外皆丹砂飛步輕培塿逸情渺烟霞隻影倒下山慎勿對俗誇跋興元總尹王信夫九歌圖後屈子作九歌蓋以忠不見明窘迫無聊天髙莫能訴地逈莫能容託於楚俗祀神詭怪之辭以攄憤悶先賢論之悉矣今畫家闕象為圖其詭異之狀使人因畫以證原之歌因歌以求原之心千數百載之下觀者不勝感慨今興元總尹王侯信夫藏此卷請余為後語豫謂侯際清平之世出牧千里得施澤於民歎古人之不遇而幸我之遇則當思其報稱者為如何哉既以告侯遂書於其畫之左跋姚安仁山水圖序余寓京師聞秋谷李韓公言昔嘗於奉元髙左丞飛卿家坐間有畫師姚安仁適至髙詢所為畫山水安仁應曰人言畫山水易事某甚以為苦每作一幅必往來胸中經營纍日然後敢落筆亦如文士得題而苦思也當其未得時局促無聊雖囚之桎梏無以踰此及其豁然有得方脫然而釋矣髙為之大笑觀其所作此幅僅三尺許渺然有千萬舉武之氣象其山川之開闔樹林之疏密樓閣之掩映景色之晦明石潤而雨冥水舒而空濶扁舟􅋈岸漁者畢出或聚而分或挈而往其天趣之入眼恍然坐我於滄洲烟渚之間則古人之所謂畫工之心苦并安仁所言不為過矣智君善甫詳雅人也持卷求跋余非真識姑以聞於秋谷及所見之梗概題諸左方跋惠顯卿萱堂詩卷物之寓天下者有時而壞理之在人心者無時而忘余於斯堂見臨原祖孫之心也臨原姓惠氏字顯卿事母至孝扁堂曰萱萱本諼字義訓為忘詩曰焉得諼草言樹之背蓋取其物能忘人之憂耳夫顯卿以誠悅親而為此堂也其孝為如何哉是宜當時之賢士大夫樂為詩文以贊美之顯卿既殁堂為風雨所弊詩文亦頗逸墜孫元輔為念某祖寧不惕然而動於中此蓋由理存於心無忘則物之壞者可得而復矣故堂起廢而仍舊規詩補亡而成巨軸繼志述事乃今見之雖然前日之萱顯卿悅親之心忘憂之物也今日之萱元輔思親之心泫目之物也憂樂雖殊為孝則一草木初何與焉後元輔者若子若孫則當以元輔之心為心勿替引之癸亥之九月余忝秋闈考試至奉元友人羅壽甫持卷固請題其尾為書於秦川驛跋何子鑑字說攻他術而不精者其極不過於敗事攻醫術而不精者其弊必至於傷生故周禮冡宰列醫師之官以稽醫事而制其食十全為上十失四為下顧不重歟醫學正何君子鑑自幼業醫以能充教職持其鄉先生與命字之說懇求余跋其意欲君窮醫之理如鑑之於物夫洞見五臟逆知死生豈可人人求之然自軒岐以來代不乏人古經論著具垂於世今君既能加精究之功悟幽微之㫖以下工為鑑戒而希十全之上工免於術不精之誚不負向來鄉先生之所期者此余所以刮目而待也歟跋王知府仲常致仕封贈手卷穹爵大官人以為貴識者未以為貴贈先封內人以為榮識者未以為榮何取乎可貴可榮者惟初終無玷進退有道而已苟不出乎此其貴雖焜耀於時其榮雖逮及其親而弗厭於人心者有矣而何以為榮且貴哉知府仲常王侯晉寧人也自厥考府君已居興元余是以深知其人侯初以材推擇為吏繇路升至省掾俱以廉能稱及佐郡専城與初為吏時謹飭無少異不汲汲奔競以求峻擢惟守分循資是以雖逹而不至於顯既守嵐將終更時當引年矣上章乞致仕制令授以四品勳爵內亦如之考妣皆贈五品此雖可賀然皆仕進者之常例余觀世之顯逹者非不多其穹爵大官封贈之侈雖動蕩世俗之耳目然概其生平辱不蓋榮者亦不少求如侯之出處無愧古人者有數則真可榮可貴而可賀者信在此而不在彼也識者必能辨之至其歷官之詳退休之美叙與詩皆備矣兹不贅云跋壽星手卷天下平治四海九州民樂其生即壽域也是以秋分之後南極星現而明畫家圖老人像及龜鶴等為壽星所傳尚矣興元某宣差公為一路長人有以獻之者俾豫題跋豫以為公當體朝廷意俾民安業於春風和氣之中不但如此卷退藏於密而已不知公以為何如跋李紹琮字說余弟德衡聚學於唐固間得李君紹琮者與之交愛其端重好義雅稱道焉余於是亦有半面之識一日以未字為請余雖諾而未暇因念李君年及艾而字未立在朋友間不為無過而豫弟與之遊竊深咎之既而德衡自雲南寄君集御史所作李君國珍字說一紙然後知其平昔非無此心但以人微言輕必求當世知名之士以發揚之余又竊喜焉今夫李君名字之義御史之文固無餘藴矣雖然余請拾其遺棄以不虛前日之諾焉周禮大宗伯以黃琮禮地其為國珍宜矣蓋琮之為玉因物以致其誠取地以製其象易曰敬以直內義以方外國珍果能用力於斯則御史所謂他日洗目而觀玩者庶其在此乎題宋張提刑禱雨詩碣右宋提刑張方之所作也方攝興元安撫當宋嘉定癸未擾攘之秋而能修城郭繕兵備舉百廢而一新之可謂有為之士矣今讀此詩見其憂旱禱雨燃炬宵行不遑寧處有憫農憂世之心惜乎舊碑零落今重刋於石非惟前人之志有以見乎後而凡為政者觀之庶亦有感於斯而興起焉間居叢稿卷十
