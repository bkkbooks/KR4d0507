body:
  text: 閒居叢稿卷二十二元蒲道源撰祝文祀三皇祝文𤣥黃既判迭生聖神立極立命萬化陶鈞嘗藥制疾以夀斯民德絶言象功無擬倫世免橫夭天地同仁施及歷代名醫是遵討論推衍得其本真遺經具在惠我後人春秋䖍祀牲酒畢陳報德不腆誠意惟臻伏羲開天立極畫卦造書人文始陳實為醫祖神農耒耜之利民乃粒食嘗藥之功萬世永賴軒轅神化通變儼垂衣裳問答著經醫教肇立三聖祭文宣聖祖堯述舜師文宗武充塞堪輿照映今古如日斯明如雨斯普萬世王祀斯文宗主顔子聞一知十服膺博約簞瓢陋巷不改其樂三千之徒公為其魁才為王佐舜何人哉孟子大亂之時列國分爭邪說並作楊墨肆行排斥異端扶持周孔巖巖太山萬仭高聳春勾芒神祝文天連循環時維立春盛德在木發生之仁乃出土牛送故即新式表東作爰屬兹辰敢設菲薦昭告於神願祈豐稔以福斯民風師祝文鼓動宣暢行巽之權有坼甲解凍之功無拔木偃禾之愆孟春上丑牲酒揭䖍願神孚祐以致豐年祀社稷祝文主社昔平水土萬世有功凡有國家祀典當隆仲春上戊詣壇致恭血牲釃酒以告神聰神其相之年穀願豐后土助平水土氏著勾龍有國有家報本則同功崇往古祀典則豐潔牲清酌以薦誠𠂻願神垂貺祐我三農主稷教人稼穡創始於神萬世粒食有功在民報本之禮率土攸均仲春上戊血牲薦誠願神孚祐百穀用成后稷為農之師百穀首植萬民至今賴以足食功配於社祀以為稷春中上戊牲酒報德願賜豐年俾民富實祀雨師祝文膏潤萬物浹於寰區沛然而來枯槁昭蘇聖明之世澤不闕釃酒割牲惟神是祈秋不作潦旱不愆期控此微忱神其鑒知祀雷神祝文復於地中主陽之機壯乎天上行震之威虩虩其聲物無不應上帝是臨實為號令首夏上申祀事孔明神其昭鑒宣滯發生祈晴禜城東門神祝文間者陽德愆候雨泄雲蒸蠶老且簇麥秀將登衣食所係夙夜兢兢收穫倘失饑寒曷勝翳尹土者德惠莫承致兹天怒降此咎徵災於厥躬庶俾自懲奚為罪罰枉及黎蒸雕瘵困苦天胡不矜願掃隂沴陽精皎升農桑有望歲功以興敬舉禜禮心齊意澄匪神昭鑒孰可依慿又天作霪雨害於嘉穀狼籍畎畝不能收穫大懼斯民上無以供粢盛供賦稅下無以畜妻子具饘粥惟是政或乖戾甘受其罰無延及於我民賜以晴曦俾成歲事則守土之大幸也又隂陽闔闢惟神所司或水或旱呼吸由斯霪雨為沴歷旬於茲農既力穡成熟有期實堅實好秋暘是資泥蟠水漬恐致年饑秕政所召甘罰何辭民實無辜神怒忍移願冀哀恫雲霾劃蠡太空無滓皓皓晴曦惠我豐歲俾民用嬉感佩神賜何日忘之又嗚呼天哀生人之饑貧是用賜之以牟麥亦既成熟矣而淫雨為沴不得收穫以食是雖賜之而不終惠之則生人之饑貧竟不免矣維神闢陽闔隂實所關繫敢齊沐䖍告望屏除隂翳俾太陽宣精牟麥得收以成天之所賜則惟神是依祈雨羣望祝文東嶽峩峩岱宗作鎮於東大生之號配以其東祠於天下誠無不通今兹之夏藴隆蟲蟲苗既枯槁民食將終維政之秕願灾厥躬下民無辜實可哀恫維神之仁上與天同願躋膚寸澤遍寰中槁苗勃興變凶為豐報神之德罄以丹𠂻崇德惟王顯靈岷江正位王爵聖烈博濟徽號克稱能伏龍而弭災豈不能興龍而致雨耶今以歲旱苗稼將槁敬詣神祠誠以懇請惟神賜以甘澤俾其有秋文昌忠孝大節奕世著靈惟兹漢中廟貌儼若歲逢旱灾遍走羣望是用齊沐揭䖍以告於神恭惟濟物之仁幽明豈間願惠甘澤俾民無饑而吏亦得以免責也惟神其相之梁洋土主常陽之沴月已再更粟將秀而莫能成稻既插而莫能榮菽可種而莫能耕倘十日之不雨則民無以為生慮將轉乎溝壑况能奉其粢盛惟神血食兹土正直聰明將與守土之吏同責任而非輕我今懇告以罄其誠神亦當請命於上帝沛甘澤以活斯氓城隍敬為天子於兹牧民城隍所依屬於有神幽明不同其責維均旱既太甚稻隰揚塵豐凶之决在此浹旬灾自我召勿移斯人錫以甘澤賴神之仁山河顯靈公維公佐漢祖以開基駐梁川而興利豈收功於一時蓋施澤於萬世嗟政拙而術淺視明神而有愧雖決渠而為雨奈旱魃之為祟俾溉灌之不足致良苗之枯悴惟堂堂之英烈貫古今而無異願力沛為膏澤惠我民之豐歲玊泉西山之麓泉湧碧玊神龍所蟠雲雨斯蓄粵惟我農既植嘉穀旱魃為虐如焚之熇豐凶之決浹旬可卜秕政召灾及民何酷我實有愧尫非可暴哀籲於神無厭其瀆沛以甘霖庶俾沾足􅦾山巍巍􅦾山為鎮梁州呼吸雷雨應民所求今兹之夏插秧未周值兹旱暵龜圻田疇秋種不入為歲之憂政之不德民則奚尤願神垂憫沛澤旁流吏既免責農則有秋木馬神女歲豐民飽神祀豐好歲荒民饑神祀曷保今兹旱灾害我畦稻神忍坐視待其焦槁願降甘霖應此祈禱社稷於惟社稷民命所依今兹旱乾陽亢其威秋種不入秧插而腓前頗得雨其澤甚微杯水車薪收功則稀我實不德維神是祈願沛甘霖俾民無饑春秋以報醑潔牲肥風師秧既插矣陽則焊之雨欲作矣風則散之敢告於神願徐按之待雨之來則同贊之哀民無辜勿久旱之雷雨師天之號令職夫宣震天之恩澤主夫膏潤旱槁我苗憂此田畯失今不雨俯仰將盡政有不德厥罰冝峻反移於民逆而弗順求哀於神庶可救振砰然而催沛然勿吝祈雨􅦾山神祝文惟神開闔隂陽手執化機常暘之沴厥月於兹農欲插秧田皆圻龜數日不雨必失農時失時無穀歲且薦饑粃政所召罰其敢辭民實無辜灾禍忍罹齊心致誠敬謁神祠冉拜乞靈明鑒俯垂一勺之水甘雨是隨尚期豐報以答恩慈謝雨巍巍􅦾山作鎮梁川曰雨曰暘靈德昭然惟歲夏旱秧不插田我用是懼亟往揭䖍焚此心香挹彼原泉朝叩夕應日不再還一勺之水散為敷天憫農之窮恕吏之愆施豐報薄心實愧焉願神終惠書此有年王侯謁文廟文兹辱君言畀以郡寄視事之始祗見學宫惟我先師臨之在上不負所學隂相是祈謹告祀文昌聖父文惟王乾坤育粹神妙難名慈裕溫恭聰明正直篤生聖嗣簡在帝心畀以文昌隂隲下土越惟某等允荷生成報蔑涓埃愧深俯仰幸逢華旦謹率同盟爰舉舊章式陳明薦神其昭格介以繁禧祀文昌文越惟兹日載逢聖誕體神之孝謹延聖父聖母於正殿式昭具慶之禮焉洋洋格思鑒此誠意七曲聖父祝文惟王精粹降靈中和育秀神功不宰至德難名積慶纍仁篤生聖子忠孝大節奕世顯靈簡在帝心文昌是主永扶洪祚隂隲下民時届仲春恭逢睿誕某等祗循彛典式薦明馨尚冀同盟永綏福祉又惟王道妙凝成神功不宰篤生聖嗣養極尊崇睿誕載臨式陳明薦仰祈昭格允副凡情闕以闕聖母太后家慶配祀尚饗又惟王慈仁惠和克配化育聖嗣光啓益大前猷敬父之誠導迪民性春序將半初度載臨謹率彛章式陳明薦尚其顯相斯文寖昌及此同盟以介景福肅共昭事永永無窮又惟王乾坤純粹降育元精篤生聖人尊為神父奉觴上夀明祀有常某等謹率同盟敢伸燕賀願因家慶錫福我人祀七曲帝君祝文惟王乃聖乃神允文允武忠孝大節功被生民桂祿攸司文昌宗主血食西蜀靈應昭然某等謹率同盟恭修明祀洋洋如在錫以純禧又兩儀育粹百行備躬乃聖乃神允文允武七十四世忠孝一心英靈在天輔弼文教桂祿二籍隂隲下民某等實囿鈞陶敬共昭事載逢初度式薦明蠲洋洋格思鑒此誠意又聖不可加功難擬議文昌是主桂祿攸司忠孝炳然萬世儀軌某等夙知欽仰俱囿生成遵用舊章式陳明薦尚祈隂隲敷錫我人梁洋土主祝文惟王正直聰明血食兹土顯自唐世以及於今冊號稱王威靈赫若捍灾禦患民所憑依某等謹率同盟少伸報本割牲釃酒薦此芬芳洋洋格思尚期顯相國安人樂神化益彰敢不欽承綿綿罔替解府推祀土主祝文惟王聰明正直血食梁洋福善禍淫奉若天道某忝司推讞防慮未周致兹重囚逸出囹圄追捕靡獲乞靈於神未踰月旬繼踵就執惟彼大憝不逃天誅幸此庸踈得免吏責隂相所暨我其敢忘釃酒割牲再拜祠下洋洋在上鑒此微誠秋谷平章遷葬祭文二后土惟韓國太夫人王氏之柩權厝於此歲月滋深樵牧無虞賴神保佑今兹改卜擇吉啓攢不震不驚尚祈終惠渭川大河欽承朝㫖典護韓國太夫人王氏靈柩遷祔潞之祖塋經涉渭川大河賴神保佑俾波濤不驚晏然而濟國朝醮事預祭風雨師風師天地槖籥行巽之權兹因醮事香幣揭䖍停颷止烈休徵應焉以介皇福成此勝緣雨師潤澤萬物助天發生國有薰修是用薦誠願祈隂相勝事圓成肅則時若永祐皇明又兹者國有祈禳大修清供雲行雨施維神是司恐值隂雨行事或妨敢告明靈願祈孚佑時若之應尚無爽期白塔寺翻修正殿興工祭文紺殿重修齊厨創搆興作之始恐干神祇畚鍤方陳先事而告願祈隂相俾無震驚穿井祭神文禁籞之中卜鑿雙井既差穀旦畚鍤肇功用汲寒泉依神受福祭通惠河神文維神主司靈源不溢不竭安其波濤利我舟楫何以報之牲酒肥潔神其鑒兹永永無斁謝雨祭金華五龍神文維神珠宫貝闕水府沉沉無求於世金華之隂我以灾旱吁嗟往尋罌負勺水幸神肯臨應不旋踵惠以甘霖祈哀乞憐罄我之忱濟人利物乃神之心有牲既刲有酒既斟匪以報德尚冀時歆官民餞送幡纛鐃音倘有懇請願賜如今祈雨祀金華五龍升潛以時雨暘隨禱今歲夏旱不能藝稻下濕頗苗隨亦焦槁遍走羣望日愈杲杲金華五龍深淵自寶靈應昭然傳聞父老挈瓶求泉敢計逺道安置琳宫預期灑掃惟神克誠豈薄蘋藻嗟我邦民殍死莫保望沛甘霖天瓢傾倒滿集溝塍路餘潢潦我民送神幡幢華好繼自於今敢忘洪造雨師某奉天子命牧於兹土夙夜思所以遂民之生而才智不及又加以旱灾境內之麥槁而耕者有之苗而不秀者有之春種之物入土不生者有之稻亦待雨而秧而旱勢愈隆並走百神未之有感抑某有罪而當罰耶抑誠之未至耶某若有罪民則無辜誠之未至今則再懇願為三日之霖大慰羣生之望敢不精潔其心以報洪造風師歲以旱烖並走羣望雲集氣交雨欲下降而風伯奮怒吹使離散大懼獲罪於神小民耕種失業是用懇告惟冀息威虛徐之力不至鳴條俾甘㴻得施而有豐年之望敢不豐潔以答神庥雷師掌天之號令震驚百里助靈雨之勢今以旱灾祈懇百神未有感應亦由誠之不至而罪之不自知也是以有叩於神願震旱魃之妖助雨師之施俾民生穫遂豐歲可期敢不敬修祀事以答嘉貺謝雨祭文近以暵旱禱於有神舉意云初即獲嘉應優渥既足枯槁勃興哀此窮氓舍豫有罪敢不答謝以表微忱釃酒割牲仰祈昭格尚冀雨暘時若錫以豐年終始生成永依大造祭太歲諸神文惟神執天之符持地之紀慎守方土各值干支某伏為祖先未有祠室夙夜思念不遑寧居乃於東北相厥攸止方白日吉立柱上梁伏願不震不驚介以景福維隂有以相之閒居叢稿卷二十二
