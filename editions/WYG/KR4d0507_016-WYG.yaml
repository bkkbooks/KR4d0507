body:
  text: 閑居叢稿卷十六元蒲道源撰碑東海神廟碑延祐元年春三月二十有八日皇帝御嘉禧殿傳詔以東海廣德靈㑹王廟増修告成其諭翰林文其事而刻諸石臣某猥以應奉文字為職適當直筆謹用撰次之伏惟皇元奄有四海懷柔百神列聖以来於海岳之祀惟寅惟毖率以嵗之春分遣使者馳馹賫香徧詣其祠而禮焉將發上齋潔臨軒舉香䖍祝而授之其所以致崇拯之意為民祈福如此其至也世祖皇帝至元二十有八年冊加東海廣德王為廣德靈會王今皇帝皇慶二年春二月光禄大夫翰林學士承㫖臣僧家以故事奉命行香於東海神廟及令詣登闕所謂海市者既至以天子命敬詣祠下爐烟氤氲誠意昭格畢事仰觀殿宇有風雨侵剥之患循視庭際缺廊廡翼衛之嚴因慨然曰上之敬禮於神也如此而廟貌淺陋弗稱置而不言使臣之罪也夏四月還圖所見海市樓觀樹林城郭出沒滅變之狀以獻奏請修廟制允其請遂命臣某徃洎州守臣某等以積嵗所賜白金及縣官宿有材木瓴甓修營之經始於其年之五月落成於冬之十一月完舊而増新者幾四十楹複殿迴廊齋廬庖舍靡不悉具繚以周垣邃以重門扃啟以時規制整肅神用妥靈人愈生敬可謂盡事神之禮隆太平之盛典也竊嘗考國家定鼎都邑東漸之地視南北西三方為近故京畿凢有水旱依賴叩禱為尤切修廟之年春以久不雨恐無麦禾命集賢大學士臣托歡翰林待制臣蔡文淵奔走掲䖍以告其應如響於以見上之至誠可以感神神之靈貺可以佑國繼自今億萬年之福祚與東海之水浩浩其無極也歟敢拜手稽首而獻銘曰於皇聖元包括海宇上帝鑒觀俾作神主敷天之下咸秩無文矧兹東海有廟其濆其神巍然儼正王位弗完厥居我是用愧制命使往暨而守臣闕考室輪奐一新像設孔安􅆄蠁黙契雨暘時若物無疵癘惟海有容衆流歸之惟聖有作百禄綏之於萬斯年天子是衛於萬斯年明闕罔替光禄大夫中書平章政事多爾濟公功德碑皇天眷佑有元必為之篤生賢哲之輔以豫擬其用或出於世家或生於草野如公則出於世家者歟公之先三世忠孝相繼皆有功於西陲兵威既張邉聲無聳存享隆爵沒膺美諡故山西之禮店為公鍾英育粹之地公自蚤嵗以集賽入侍帷幄小心惟謹及出而從仕居風憲即有能聲陞行臺刷振風紀繼登外省之貳又持大體以鎮静為務其材無施而不可朝廷簡注公乆矣以甘肅省控制西夷宿重兵命公為其省平章以飭治之至則軍懾民愛糧儲器械靡不豐備邉境晏然泰定戊辰冬前相姦臣煽亂檄省起兵為援其黨將應之且藉此欲勦掠以自植公持不可曰方冬沍寒不宜妄舉其黨欲害公公不為奪㑹天命人心有所屬天厯改元詔至公獲免禍前日累卵之危遂為泰山之安嚮非中流砥柱之力何以及此兹豈非天生賢輔以豫擬其用哉明年春上悉公誠召至上都入覲奏對詳懇即以中書右轄授之趣還京省視事時所在兵革之餘加以飢饉民不聊生流徙失業公竭其心智多方規畫任為己責是以克濟艱難天子嘉之拜光禄大夫中書平章政事公益自信不疑遇事無所委曲阿附始與同列議論稍異兼恐不勝寵任遂辭歸退處南安山墅讀書自適上察公無他起為江西平章政事又起陕西皆以疾固辭優詔允其請蓋進以禮退以義聖賢之明訓臣子之大節視夫世之貪冒求進阿諛苟容者不啻霄壌嗚呼非宫車逺駕必再用於中矣今皇入纂大統圖任舊人公猶未耆艾則知公不久遂其閑適後日功業之盛又如何哉將見特書屢書不一書而已世人見公之進用以為喜不知其懼負荷之重以為憂見公之退居以為樂不知其頃刻不忘君亦以為憂也昔范文正公有言曰士當先天下之憂而憂後天下之樂而樂也公庶幾焉且公武弁而好文富貴而下士聞善必稱見賢必舉蔑驕矜之態存澹泊之志雖其具美非闗國家之大事不復贅云公里之趙某者致其父老之意以褒城主簿張翥者具禮為先容謂某當與執史筆之末求文以紀公之功德其言曰世之寳珠玉者必曰某玉某山之所出某珠某澤之所生矧以吾公之賢乃有國之所寳者歟鄉里不書其本末俾其名焜耀於世人其謂何某辭之曰公之功德書於太史見於後世奚假予言翥来請者凢六七且歴一嵗固不容辭某亦採於衆論無一人不曰今之賢相於是乎書且系以聲詩俾鄉人歌詠之其詞曰大哉皇元極其全盛二祖開闢傳於列聖炎海氷天日本月氐皆為郡縣不止羈縻泰定末年世運中否苟不得人孰扶其圮􅋲􅋲朶公藩屏西邉事出意外明炳幾先時維姦臣挟乃冲幼心有異圗檄兵自救公獨不可以身殉之天厯詔至獲免於危世祖曾孫武宗之子克堪顧天萬國仰止知公之誠徴為弼臣委以庶務平章繼陞同列之間議論稍異釋負旋歸遂予宿志丘園婆娑讀書自怡天子念之眷顧不衰倚重闕屢被中㫖畏滿忌盈力辭以此嗣皇方興公年未艾雖欲優㳺帝心簡在此邦蕞爾崧岳巍然生賢則同實可比肩公既大用寜客居斯何以慰我邦人之思伐山取石求文紀實以耀無窮俾知偉績前儒林郎西鄉宣差雅克特穆爾遺愛碣并序凡政澤於物者深則民懷於心者久此古昔循良之吏為人建常生之業而不止一朝之恵是以功著當時名垂後世今豈獨無人哉我侯誠無愧也侯輝和爾氏名雅克特穆爾閥閲名家以至治三年繇平凉府判官轉蒞兹邑跡似左舉終更父老至今思之有流涕者泰定初興元路尹佐皆闕憲司檄侯攝路事先是路官較廣濟倉粮短少十數石蓋以倉敖板踈漏監倉者弗之覺後方見取以補短少數幕賓素銜監倉以為自外入者抵以侵盜罪繫獄侯閲案牘曰條章有東西敖相補法此奚不可幕賓至以醜語詆侯侯弗顧卒以漏粮補而監倉得釋郡人歎服元統三年夏西鄉主簿鄧某遣縣吏具禮以書幷侯行過善政事蹟為一通来致邑民之意抵余求文書意若曰某無似承乏於兹師侯成規惟恐失墜不石掲之何以示後之為兹邑者余以鄧簿嘗從余學不能拒其請繼又新尹某至亦以禮来謁其請如鄧竊惟世降俗衰不忌疾人之善者鮮今兹令與簿能不没前政之美懇懇欲為播揚以傳諸後者為尤鮮余亦記往嵗有府屬陳言秋稅以糓代米民譁然不以為便令行數輩請余求為一言時侯方居省幕余不得已為書糓代米有數不便輸送力倍一也燥濕莫分二也有急散與民舂變復為出納其闕不無三也儲積無所科擾四也侯得書即罷之民至今稱快從善如流於斯可見其間又有言平凉之績尤偉余以為彼民以與碑刻之矣不復載至於去此登省與臺之事異日當有國史書之此亦不録且余忝國史屬時或上此狀亦當請於長筆於冊以侈我朝之得人今閑居田里西鄉之民往来者諗之言如来請者因樂采民之意為之頌辭曰昔侯之未来兮我沉疴而未蘇逮侯之既来兮我吐氣而方紓爾利我興兮爾害我除晨往於田兮夕安爾廬徴科不暴兮鄉罕追胥今其去此兮為我永圖制常生之業兮父母奚殊羌肺腑之感恩兮其孰能知予鑱貞珉以昭列兮圭其首而方趺播侯名於四逺兮尚能考諸匪直我心之獨安兮子子孫孫不忘厥初閑居叢稿卷十六
