body:
  text: 閑居叢稿卷十九元蒲道源撰序送任士行從調京師序夫達而在上窮而在下世固所謂命也然不能盡人事之當然舉而付諸命是猶不耕耔而望穫也其可乎昔子張以干禄為學聖人告之以謹言慎行所以抑其好髙慕逺之氣姑使之反諸身以植其本而已至於使膝雕開仕出疆載質亦未嘗偏廢也士非天授天資警敏達於時宜讀書請業聲譽甚洽又以今日語言字學闕輩激昻北㳺至於果用是以闕名天府得雋而歸為廣元郡學闕以悦其親之心以慰其友之望闕大夫以闕夷闕咸易觀而待可闕其謙卑謹愿之意常見闕人闕以是多之秩滿從調京師闕曰闕入京也君嘗以闕鼔闕之氣今闕有請也余曰吾子向言行之美詩學之富不階資序舉步之初猶足得志况今齒命士之列闕盈科而進陟級而升固其宜也闕然千金之璧大賈所見收合抱之材良工不忍棄子亦曳裾公卿接跡豪俊之武必將有鄭公推轂文舉飛薦其達而在上何待龜而後知耶尚宜自朂俾凡吾之植其本者不怠則後日之見於用者亦無窮矣送南鄭尹李仲堅序闕之士所以名當世而垂無窮闕乎官秩之崇卑也昔陳仲闕長元德秀魯山一令而流闕時為公為卿者反有愧焉明府仲堅之尹南鄭亷闕明恕施設措置深得百姓心故其在官之日和氣藹然休徴亦至實有古循吏之風秩滿言還郡侯牧之長㳺從之舊下逮田里父老牛童馬走稱道咨齎咸惜其去或謂余曰世之得美仕者必積以嵗月之考而居官之日善蓄其後闕待選之力干謁求薦然後如志今君不屑為此奈何余曰仲堅平昔讀書則夫所謂求之有道得之有命者豈不知耶昔衛石駘仲卒有庶子六人卜所以為後者曰沐浴佩玉則兆五人者皆沐浴佩玉石祁子曰孰有執親之䘮而沐浴佩玉者不沐浴佩玉石祁子兆衛人以龜為有知也今朝廷之上良公卿之多豈無一人如石祁子兆則仲堅前步之逺又豈待蓄力求薦然後如意哉矧余所謂名當世而垂無窮者有不在是也君其勉旃於是大尹山木公及漢中之士咸以詩贈余取邑氓之意以補一章云我居之晏兮我賦之均明府之去兮其如我民天之雖髙兮為聴則卑君之善政兮天奚不知歸轡遙遙孰能畱之好音時至慰我懷思送陳洪道後序夫以外觀人而不求其内不足以盡天下之才而適以滋天下之偽不幸有端章甫而非士服黔婁而實賢者苟不能辨之不幾乎寳燕石而棄荆坑之璞歟陳君洪道内之有者也幼丁多難𨽻跡道編為老氏學不惑乎方士之言誦儒者書樂就夫有道而正其趨向之端操守之篤可尚也嘗謂生際太平身無羈累與其塊獨窮居曷若周流四方意行而身隨耳聞而目擊者乎於是今將舟適荆呉陸走兖豫拜曲阜聖人之居謁亳都太清之境以償其平昔之願吾黨之士榮其行叩清商之音而餞之鏗鍧累幅梅隠翁以師友之厚序冠之首辭㫖曲備兹不復贅然猶恐人之視君不求其内例以為黄冠者流也故畢其説賀趙伯儀總管拜參政詩序嘗歴考名臣載籍其宰相執政父子繼世而為者有之兄弟同時而命者有之至於父子兄弟俱為者則罕矣非積德累功之厚天未厭其報者其能若是乎竊惟忠愍公以勤勞忠藎受知世祖皇帝擢為執政俾相親王直道不囘夷險一節至以身殉上聞震悼天下惜之公五子皆録用参政公為長以德量勝三為名籓皆有政績稱頌及移興元總尹某始克拜識焉端莊魁岸儼然可畏即之則愷悌樂易如春風和氣中接物治民皆根於此信乎為良二千石也今上即位登庸勲舊擢公中奉大夫西蜀四川行中書省参政公之弟榮禄公再以德望為國柱石由御史中丞拜亞相今領太子詹事其他皆為朝貴清望官一門冠佩之蟬聮棨㦸之交映嗚呼盛哉此豈非積德累功之厚天未厭其報者歟公既拜命視諸平昔無錙銖驕溢氣見於顔面蓋其位愈崇而德愈謙寵愈厚而心愈約傳曰文子其中退然如不勝衣其言呐呐然如不出諸口所以為賢大夫也余以是知参政公之福禄未艾宜矣吾黨之士可進而賀矣於是乎書送趙参政之蜀省序参政趙公寛𢎞重厚凝然有公輔之量公為興元總尹五朞矣在官一以安静不擾使人樂其生為務不徼近功取赫赫名故初終如一然興元民貧役重公毎歎息有不可專革者今天子即位之元年黜陟一新由是公自嘉議大夫興元尹陞為中奉大夫参知蜀省事凡邦之士君子莫不歡忻踴躍喜公之得柄用而里巷細民亦莫不齎咨戀慕恐公之遽去或以問愚愚謂細民專以懷恵宜其齎咨戀慕如此其士君子非不惜公之去然志其逺者大者兾公坐鎮蜀省俾國家無西顧之憂然後闕簡㧞疇咨入調元化比迹臯䕫使天下被其澤則興元斯民之利病公向之欲為而不可得者庶乎可為矣斯豈庸人所易識哉公行苟知詩者咸有所作請題其首因盥手為書之𤓰爾佳時中孝行詩序并詩人之行莫大於孝故聖人著之為經先王順之為治教由此立俗由此正大哉孝乎堯之時師錫帝舜乃曰克諧以孝自漢以降有孝亷之舉我皇元治教之美比隆唐虞德音屢下未嘗不以旌表孝子順孫為務綱常之道感發興起者不無其人𤓰爾佳名時中沔國忠靖公之孫宣慰公之子生於武弁閥閲之家乃能杜門不仕動循禮法孝養慈闈不離左右滫瀡未嘗有闕親或微恙躬奉湯藥順意承顔曲盡愛敬既久鄉里知之朋友信之衆具其美狀聞於侯牧牧審覈其狀上於省與部宗伯以為合著令下守土者旌表之僉曰韙哉是孝也為人子者克盡其職當朝政者不失其賞補益風化誠非細事或謂公雖以孝行稱未至如頴叔舍肉季路負米剖氷求魚行傭供母之竒節僕曰不然夫處優㳺無事者其異罕聞當顛沛患難者其節易見人有膏粱紈綺之資不以濟其欲汨其心者寡矣而君宴然自守不慕乎外使其親無毫髪憂愁不足之意豈易得哉設若不幸而同於古之患難安知其不出是也雖然慎終如始則所當念傳曰孝者所以事君也異時求忠臣於孝子之門尚或見之故叙其事以為贈仍繫以詩八十怡愉鶴髪親子能承順一家春斑衣堂上歡顔舊華屋門前表額新通國此時稱孝行清朝他日訪忠臣我知是舉誠先務薄俗從今復變淳送洋州逹嚕噶齊序并詩昔周之成王命君陳代周公尹東郊其命辭首曰惟爾令德孝恭惟孝友于兄弟克施有政蓋人能孝於親然後能忠於君而施於政自兩漢而下猶舉孝亷為郎後世設科取士尚德之舉寖微然民彞終古豈能冺哉我皇元治復淳古德音屢下未嘗不以孝子順孫旌表激勸為務今洋州侯伊蘇岱爾者果能以事親恭順父喪居廬負土成塜孝感致異監司連帥上其事大臣以名聞天子嗟異詔國史特書旌表起白衣授五品職而勸奨之侯既之洋部感激知遇砥礪亷隅求民瘼而藥之郡以無事嘗出郊勸課相原隰之宜築堰瀦水溉田千餘區昔之蒿莱化為秔稌民倍屣其獲食用饒足感侯之惠像而祀之碑而頌之又以其餘隙招延儒士擇民之秀者時講肄焉駸駸然古循吏之規模矣豈非移孝為忠之驗歟侯之始至與僕一見如舊識雖相去百里政聲所及如在境内今得代言還摭其實而贈之雖然侯之所以顯親揚名者固不待僕言矣其慎終如始若君陳之事業有辭於永世者尚其勉之故序而繫以詩仁居四德先孝誠百行首為仁本於孝施政亦何有韙哉洋郡侯至性自天牖事親生盡瘁送死慎無苟哀哀蓼莪思墳土抔以手淚枯廬畔松孝感格髙厚大臣以名聞帝曰咨汝某方之儔類中此事誠寡偶表閭乃當然信史垂不朽擢授五品官銜署長太守列官益奮厲大恩寜忍負養民䕶萌蘖除弊去稂莠律身公且亷貨利非所有遺愛徧州氓播頌傳衆口立祠儼生像奉事猶父母一朝得代歸涕下垂白叟六年稔知君顧我敢輕友惟兹秉德心終始願恒久無或瑕玷㣲令人議瓊玖賀𤓰爾佳中立副使得子序源泉之水疏導之則流愈長盤根之木培壅之則枝愈茂理勢然也中立副使𤓰爾佳君乃忠靖公之孫宣慰公之子也簮纓世胄閥閲名家而能脱去綺紈膏粱之習與賢士夫㳺一日過余言曰某年踰不惑傳嗣未見而祭祀之際顧復孑然未嘗不怵於中堂上慈親嵗時宴樂興言及此色為之不怡雖朋友間亦為某慊孟子以無後為不孝詎不信然自恐得罪於造物以致是凡濟人利物之事必汲汲焉為之行路之中有溪出己錢二千緡為橋以濟病涉者兼覆以屋且使得憩焉其亦善之一端也未敢以是為足今天幸相之舉一子息胸中之憂渙然氷釋子以為何如余應之曰夫人之後有無雖闗於氣數然君之祖宗積累如此君又承之以不怠則予泉木之喻蓋以此也雖然無所為而為善者始勤而終亦固有所為而為善者始勤而終必怠夫已之為者既有作輟之殊天之報者必有厚薄之異君其勉㫋俾此心勿替將見後人之蕃衍昌大有不期然而然矣送録事司鈔宣差序并詩能吏之政乆則民信信則服而百事舉其弗能者久則民翫翫則弛而百事廢興元録事司之長鈔君其為人聰明而不苛質直而有斷自始至及代嵗歴四考紀綱之立如一日或有告不出成案殷積必待其出始能決總治之府所委事視他官為多司事畢舉吏民皆敬愛噫非人之信服於君由君之操為有以信服於人心者如此兹非能吏之政歟今國家用才咸録其長僕因君之行特摭之而表於餞章之首云太剛則折柔則廢寛猛則云要相濟羨君不學天性能綱紀始終無少替漢城為政十餘年畏愛人心一日然飛黄騰踏合萬里久縶於此真堪憐君行我亦赴史院分手應難數相見更期勉力效前修他日附書循吏傳李節使松溪圖詩引古之名流勝士寓意於一草一木豈偶然而已哉陶翁之喜菊周子之愛蓮子猷之植竹和靖之賦梅蓋以其有隠逸之節君子之德風致之雅標格之髙而此數君子者其心術踐履流風餘韵至今猶可想見茂卿李侯質實剛方老成忠厚自為御史日風節凛然聞於四方及守洋郡得識芝宇予始觀其容貌髙古有昻霄聳壑之姿暨聞其持守不渝有嵗寒後凋之操今移守鳯其州當往来之衝而侯老矣起歸與之嘆以其自號松溪冩為圖以見示横琴於膝坐古松之下環以溪流見之令人塵慮都忘然則侯之有取於松蓋與昔人異世而同符也若夫松風之翛然溪水之泠然寫之以七弦寥寥乎㳺心於太古之前其一唱三歎之意賞音者尚能為侯賦之送國子伴讀王時清歸覲序前二年春僕以代祀嶽瀆謁祭西鎮次隴之汧原其邑長王侯以職来候從容言及其子讀書國學僕以為秦隴俗尚武而王君乃能若是心甚敬之及還京師有生持詩叩門求見問其姓名復曰王時清知為王君子也其貌臞然而清其言藹然而和觀其詩警㧞可喜自是數與相見往往於其師友間又聞其純謹能文章一日以歸覲告援贈言之例為請余謂之曰國家自設胄學以來名卿才大夫多出其中班班可數今則索然未之聞也豈教養之法不逮於前耶將人才之盛衰有時耶抑有其人以未庸而不顯耶皆不可得而知也今上方嚮儒復科舉取士法而二三大臣亦皆仰體將順汲汲焉以求才為務子歸矣省覲之餘無懷土無廢業愈自奮勵厚蓄而時發之上不負朝廷樂育之盛意下以副賢尊期望之本心俾胄學無乏才之誚將必有成矣子其勉旃時清曰唯遂書以為贈行之序云送喻提㸃西歸詩序今之為民者六老佛之徒實天下之幸民也蓋其為民無賦役之供王者之係恣其所之無不如意然其間往往有超卓通世務者其徒相與推為綱領挾是而㳺於公卿大夫之間而取重焉提㸃喻君可道其一也君在漢中居老子福地號玉井洞天白雲觀者凡兩職其教適朝廷以二教不必設官例免閑居一日辭余北㳺因謂之曰子得非以中原古聖賢之遺跡山川人物之雄秀京師天子所居宫闕之壯麗衣冠之都㑹民俗之富夥車馬之填塞欲㳺觀歟君曰是固然也然吾則有為焉昔吾與秋谷秦國公有里閈陪從之舊其先正韓國忠獻公吾童時所拜事者公捐館不得預弔哭之末今聞將𦵏庶得一往㑹送焉又不意秦國勲烈如此欲觀其風采氣度視昔何如與為終老之别耳余聆其言美其意皇慶二年春余以史館召至京師既相見勞問徴前言皆信且喜所寓密邇時得與話以忘其羇旅之思延祐改元之三月告予曰某不佞得秦國公眄睞前掌教宗師錫以法㫖紫衣予凢從而登寳殿祝釐者三列長春拜醮者二今宗師復以提㸃之名見寵於吾儕中斯亦足矣將歸吾棲之白雲觀閉户日誦老子奉香火以無忘聖君生生之德余何求焉余謂君真幸民中之尤幸者然其来也能因不失其親其歸也有知止足之戒是可尚也已翰林諸公咸有詩以贈以余為鄉人而知君也俾題其端云贈目科髙敬文詩序人之有疾幸而得不死不幸而遂至於廢者莫如目蓋疾於四支有所偏廢猶不害於一身之全至於喪明雖良平不能施其知賁育不能致其勇行則倀倀焉坐則兀兀焉相違左右顛仆隨之吁可哀也有能已是疾者是使漫漫長夜之人復青天白日之快覩其為德不既大矣乎髙君敬文祖汴人兵後占籍威寜業醫專目科挾其術㳺京師病目者輻湊其門日無慮百數君一一視候究其源委或針或藥咸適厥宜貧不持一錢者亦殚其能善其藥以療之獲十全之功於是名喧都邑公卿貴家邀致極多所酬亦腆君善攝生飲食淡薄葷辛醯醢絶不入口由其能以己之所得者教於人故其所治必愈由其薄於自奉故有餘力以蓄善藥由於急於濟人故勤益至而技益精嗚呼使知讀書以得位則其益於世也為如何哉翰林諸公美熟其能而且好文也詩以贈之予特為書其治目之功切於人而君之為醫利於物者冠於篇端云張祖母楊節婦八十詩序天之所以畀乎人人之所以全其天二者相須然後可以言福吾於張宅祖母楊氏見之祖母自歸張氏端莊婉順年三十不幸失所天劬勞立家專一教子屹乎頽波之砥柱凛乎嵗寒之松栢其節有如此者閲四十年閭里髙其志上其事始得旌表於門至是年八秩矣耳聰目明行忘持杖怡愉雍睦子孫環侍春風生於蘭室暮景駐於萱庭可謂有壽善康寜之福矣子恭甫愽學能文以其兄提舉君早世不忍去母左右終身不仕孫亦知讀書長子壻吉寛甫今為湖南憲使次子壻呉君祥亦佳士門楣之光表裏輝映寛夫之子校書郎希曽類楊氏家庭之實來請曰外祖母初度在邇觴豆之餘無以致殷勤者希曽昔忝翰林從事敢匄諸公篇什以為介壽之獻幸為我序之余謂楊氏向丁艱苦而能淑慎其身以有今日洪範九五福以攸好德列於一惟如此然後能全其天之所畀者不然雖有壽康亦不足録諸公聲之以詩則太史公之所謂沐浴膏澤而歌詠勤苦者斯亦近之矣閑居叢稿卷十九
