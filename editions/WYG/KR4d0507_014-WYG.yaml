body:
  text: 閑居叢稿卷十四元蒲道源撰傳西軒王先生傳西軒王先生名得輿字載之濩澤髙平人金時應童科兵後居興元占籍甫壯盡去餘習植志慕程朱之學言必中理行必踐實門不妄出人不苟交容貌儼然望而可畏治家教人必先於禮周旋揖讓雍容可觀至於書籍筆硯巾屦几杖取用頓置無少紊亂嘗曰有物有則家人及門弟子俛焉遵守無或敢違人或甚而譏訕之先生不為沮而少貶愈篤自信既乆翕然師尊之朱氏小學四書先時教人者未之及惟先生之教必本於此然後及六經於是教者學者必以為法興元文學兵火廢久先生力請於官復之力雖官至於規模經畫皆胸中豫定者及成京學不在論而他郡莫能甲所友皆天下士自許魯齋而下咸候問相及達官貴人求謁未嘗趨走承奉必矩步徐行弟子儐相既見主賓肅和言簡而意浃退皆嘆服作燕息所曰怡然左山商孟卿寄詩以程頥楊震許之青崖魏太初作記以為程朱語録中人讀者不以為過衣冠儉潔嚴整終日無惰容提舉興元學校朝制行授文學掾以目疾辭晚年從容禮法和氣藹然不肅而成居興元僅五十年家法如一日二子旡疾旡妄旡疾興元文學掾旡妄僉江東道肅政亷訪司皆孝居者侍側以無憂逺者寄禄以充養讀書享福至七秩有五而卒氣未絶猶口誦太極圖語其平昔操存可知也二子尋卒一孫惟昌亦仕為州佐一曽孫曰理亦同進士第為州倅家稍廢替於前然至今言家法者咸推重王氏云贊曰猗歟西軒可以正君善俗而無其位可以師表一世而無其職然雍容於仁宅之中憂辱不及於身非先生之不遇也而斯人之不遇也梅隠何先生傳梅隠何先生諱坤章字朝瑞蜀之臨邛人嘗聞諸邛諸鄉先生云其父字伯原不仕然信義為鄉里所服自少言動不苟如老人里人目曰假老人先生幼頴悟年十六七即以詞賦有聲又能治毛氏詩及㳺學與會試屢中儕輩莫能抗其鋒二十餘隨天兵北至興元時有使賫詔收儒之在俘者先生私集南冠之列當出者誓曰吾黨皆士族此行如濟則已不濟寜赴江而死安能為囚虜耶既前才思敏㨗所應立成辭㫖精妙讀者嘆服且以筆力之餘助其思遲者衆皆賴之土豪争以禮請為授居止俾教子弟宅邉有大梅樹枝柯特異因自號梅隠以定居焉性頗嗜酒不飲即眊矂至三四酌後目光瞭然議論蠭發少不如意箕踞切齒土豪屏氣蓋其平日見其有過則至誠責之復為掩覆救䕶之此所以服而不敢校也帥府王郎中辟為儒學正先生作文非惟敏贍且不欲襲人後詩類唐人其警策處與杜牧之相上下性尤勤五更即起焚香瀹茗讀書與諸生講誦畢出應人事諸公皆喜其至率為置酒抵暮歸無虚日其為人剛毅而本於慈祥豪縱而不踰禮法怒罵而不為惡語篤於故舊敬老恤孤天性然也至於論事明白務盡道理解紛釋難聞者唯唯使得從政不言可知晚年復營卜築於漾南或命僮佩壺登髙遐想悠然獨酌人莫窺其涯際春風和氣天理粹然農夫樵父語亦無間人愈敬慕向日之豪邁消融殆盡所著詩文有集未及刋行娶王氏女有賢行不厭清苦先生所知至具饌設不以貧輟某從先生學憐其可教以女妻之以某年卒年六十一日屬纊不亂子一人居仁克承其家嗚呼斯人也尚可得哉傳其事雖萬不究一蓋亦道源區區之心也贊曰使先生命偶而得立於朝則有汲長孺面折廷諍之風使見用於禁林則有立馬草九制之材使得任為侯牧則有抑强扶弱之政今但止於為世道之通儒也惜哉教授陳先生傳教授陳先生名吉甫字德卿蜀之梓潼人在宋時以治尚書取鄉薦為人外質而内文終日危坐無一語毎作文暝目少頃筆翰如飛凡一篇出人無不嘆服參政李德輝辟為興元文學掾時侯府表牋應酬祭禱文字皆委教官暨諸生講説㑹試擬作先生沛然有餘朝使至盛稱興元所上表廟堂稱善於是先生名益振紀綱學事二十餘年凜然人莫敢犯有宿儒恃當途力旦朢不旅進拜謁文廟先生責以大義遂屈服得施於政其兆可見平生布衣大帛為帶然雅潔不垢汙年六十一而卒一息尚存之前念念於斯文未嘗少廢教授生徒百餘人道源以丱角居後今老矣歎後生不復見前輩典刑而先生又無子恐遂湮沒畧舉其槩為之傳云賛曰質行文學無愧古人一文學掾又終厥身是以有興嗟於乏用有抑鬱而莫伸時歟命歟記清輝堂記清輝堂者張氏别墅之燕處而大叅左山商公之所書也維張氏之先世居長安之鄠邑自其顯考府君為典領陕西河渡官始得邑人尋氏之故地相其隆然而髙者為堂而居四望開斥終南太白圭峰紫閣屏峙於其陽澇水趨渭珥抱於其左夹岸修竹古木綿亘掩映心樂之即棄官閑居為佚老之計課僮僕耕穫供與其鄉人宴飲費或對山把酒臨河觀魚倘佯㳺息年八十四終語所謂仁智壽樂之説於是驗矣初左山公開府治陕時間徃還終南鄠杜館於兹堂愛其山水明秀為字堂曰清輝書以授張氏子今為興元總判張侯平甫也大德庚子夏六月平甫解組東歸屬余文以記之余以為鄠杜之間古人所謂陸海膏腴之壌也夫供耳目之娯者不兼於養生取衣食之資者或乏於清賞今張氏之先人以其餘力修治此室禾黍桑麻之富足以供養生山川林麓之竒足以寄清賞以遺肯堂之子俾之出而仕入而居不求於人自足於己可謂能善後矣余雖未獲登侯之堂想其烟收雨霽風日澄鮮嵐混翠於碧虚水縈白於青田雲霞繡錯草木油然不離燕處坐臻勝槩則清輝之名必不我欺矣抑又有説焉夫石韞玉而山輝水藏珠而川􅆺此山川之精粹不可掩者也和順積諸中英華發於外此充實之光輝不可掩者也左山之餘意安知其不出是乎侯歸矣天其或者俾余獲濟登張氏之堂當為侯數日留遍訪古人之遺跡以慨乎千載之下南望靈臺靈沼以企仰文王之至德睠晉侯為秦俘所舍之地而弔其羇旅無聊之魂北顧陳平之田而思漢氏之分祚出竒之臣也渼陂南塘緬懷少陵㳺歴題詠之所猶髣髴其當時也然後極山川風物之美紬繹櫽括濡毫伸紙而賦所謂清輝堂者其必有日矣最樂堂記天下之樂有二理與欲而已理無不善其為樂也安欲流於惡其為樂也殆由是言之所謂最樂者非天理不足以當之夫民之秉彛好是懿德求之在我善無不具苟能動静語黙樂循乎理仰不愧天俯不怍人窮而獨善飯䟽飲水樂在其中陋巷簞瓢不改其樂逹而兼善致其君於堯舜比其身於稷契使澤施於人名垂於後則其樂豈不安哉若乃徇人欲之私耳耽鄭衛之浮哇目恱燕趙之姝美㳺田以騁其志貨利以充其欲戕生敗德靡所不至樂不旋踵禍已及之豈不殆哉是知最樂云者其必有以辨之矣總判忠顯也先帖木兒早歲入仕已如老成事母孝謹奉己儉約莊重寡慾不忘語笑其發於言有濟人利物之意公退焚香兀坐讀佛書以養心性自以為樂雖所悟在彼然究其用心亦善矣今太子賓客山木王公時總尹興元為同僚嘉君之志欲導之正取漢東平王蒼為善最樂之語扁其堂曰最樂君求僕文以為記謝不敏弗獲因謂之曰夫徇欲之樂君既以氷消於懷矣為善之樂又非止崇塔廟飯緇黄以求福田利益也蓋亦不越乎天叙之五典天性之五常而已宜講明以求其歸踐履以求其實孳孳為之日有不足使其天理流行見諸日用及其久也怡然自得非爵禄而有至榮不芻豢而有至味凡天下之樂孰有加於此哉則山木名堂之意庶不外是矣傳曰知之者不如好之者好之者不如樂之者君其勉旃遂書為記云惟一齋記蒲君家漢中之城固齋居之室字以惟一取書德惟一動岡不吉之語函書屬記辭意懇至且宗姓也不容却因以所聞告之曰惟兹德者天之所賦吾之所得五常之性是也然必於人倫日用之間精察篤行終始惟一使不悖於厥初之正理則此中正和平仰不愧天凡所作為無徃而不吉苟私意少萌間斷而二三之甚則拂逆天理尚何望吉哉雖然惟一之見於書凡两出皆君臣授受訓戒之辭自其心德而言上下皆通主於自修而已故無所嫌今以下文觀其處一之意雖少異究其實未嘗不一致帝典所謂惟一則指心言欲精察夫道心人心之間使道心為主而人心聽命蓋惟精者即大學之致知中庸之擇善惟一者即大學之誠意中庸之固執者也而咸有一德之惟一蓋以德言欲其有恩而不變專守而不雜此所以為少異也若以中庸所謂至誠無息為物不貳而言則两惟一之極致未嘗不同蓋誠然後能一一則必由於誠未有不誠一而克有其德亦未有德不誠一而能動者書曰惟尹躬暨湯咸有一德克享天心此言誠能動天者也詩云維天之命於穆不已文王之德之純此言文王之誠有以合乎天者也大哉誠乎非全天德者其孰能之而程子以為其要只在慎獨蓋不能慎獨則間斷而不一矣是皆聖賢精微切要之訓古人所以一息尚存此志不容少懈正謂是也吾子平日讀書有感於斯取而扁諸齋室顧禔而服膺矣尚何以余言為然其請也勤終不可不有以副吾子之意故吾願以中庸之誠及慎獨之説以進於左右庶塞輔仁之責焉君名尚德廣安郡侯之孫少尹之子世德之美其来尚矣今新任彭州判官云悠然堂記梅隠先生卜居漢中之南鄭古漾之濱築堂與南山直凡燕居讀書欠伸之餘其攅峯叠巘争竒獻秀若踊躍而赴者因字堂曰悠然太子賓客王文貞公實書之蓋取陶集悠然見南山之語竊嘗謂天壌間物之最鉅者莫如山舉目而昜見也而古今獨許詩人勝士專其美者其必有説矣易曰形而上者謂之道形而下者謂之器形器衆人之所知道則非妙於理趣者不能識也今夫山岩壑之幽邃蹊麓之險夷樵丁野老日陟其間莫知所以樂至於觀其莊重之態則有静壽之理焉視其大小之差則有尊卑之位焉其或雄峙怒挐峭刻舒肆雲烟之㸃綴草木之葱蒨千態萬狀可喜可愕其目前之畫本胸次之詩材也宜先生愛之而不厭則堂之命為悠然者殆以此耶雖然此特其粗者爾愚嘗見先生讀書窮理不屑仕進其學根本於六經浸滛於百氏容清而􅋯氣完而舒或振履而歌或舉觴而娯不見有毫髪勉强不自得之意不幾於曽㸃氏之識道體悠然直與上下同流之氣象歟則其獨得之妙又豈可以見南山之意而淺觀之哉先生嘗命作記未及而先生卒今史館無事始克為之惜其義則無從而質也先生姓何氏名坤章字朝瑞自號梅隠早嵗收功塲屋行業為鄉里所推重云萱春堂記奉元喬松年伯堅為興元文學掾一日訪余作而曰某不肖自惟母氏以勤儉相先人起家年六袠又六矣先人棄藐孤撫育教誨以及於今粗克有立寸草春暉何以報稱欲承顔膝下以盡菽水之歡復諭以養志俾得㳺宦四方從諸公之後於是以萱春名所居之堂庶表愚心欲母氏之忘憂也願有以記之余謂萱之見於經者其義在詩伯兮之卒章詩萱作諼詁訓為忘蓋當時婦人閔其夫久役於外詩而思之曰焉得諼草言樹之背言諼草食之能忘人憂背北堂也主婦所居後世遂喻母為萱抑亦斷章取義云爾余觀喬君為子之意則善矣將託一草之㣲以為母氏忘憂之名乎抑以為忘憂之實乎語曰父母惟其疾之憂言為人子者當以親心為己心則凢所以保守其身及使其身不陷於非義者不容不謹矣孟子亦曰悦親有道反身不誠不悦於親矣蓋子之誠孝真有以乎其親之心不期於悦亦悦矣苟為不然雖温凊定省之勤牲牢脩瀡之具親之憂亦不能忘矣頋予於喬君交淺未能究其行己之大方然嘗聞其掌學事也學廪嵗積為錢既贏或疑其貸借有私焉部使者究之則一鏹無預然後釋然稱其公且亷於以知其不陷於非義以貽親憂也苟能率是以持其身歸登斯堂奉觴壽母將見怡愉樂佚壽善康寜和氣春風藹然充於庭宇溢於里閭使國人稱願然曰幸哉有子如此可謂孝矣請以今日萱春記為張本云好古軒記昔周之成王作書告其有官君子以學古入官議事以制政乃不迷於時人材之盛輔成刑措之治歴世長久嬴秦惡諸生是古非今一切禁絶之亡不旋踵洪惟國朝偃武右文稽古為治逺侔二帝三王之盛而幅員之廣過之中外之臣多彬彬可觀薛侯君英雖精國語登仕版然温雅好儒人皆以君子目之所居軒以好古名賛詠盈軸西臺御史初春楊君為作扁字且求余言俾題於左余謂孔子以生知之聖尚自謂好古敏求及信而好古他人則當如何哉易曰君子多識前言往行以畜其德蓋前聖之言布在方冊凡吾之所以致知格物誠意正心施設措置之方性命幽微之理如萬物之生海涵地負莫不備具惟人所好隨取隨得顧所好何如爾侯果能從事於斯以古人自期尚不負今日作成顯㧞之意其所到詎昜量哉若夫法書竒畫鼎彛銘器供歡娯之美者而曰好古此耳則非余之所敢知也倘以余言為未然俟見書軒吾友初春翁叩之以為何如覽勝樓記居之有樓所以翫心於髙明宣情之鬱滯者也矧楊氏之樓又以覽勝而得名焉楊蓋闗西族以貿遷遂家江左之鉛山其字繼先者讀書治生两不廢業孝以事親敬以接友在儕輩中綽有令聞懼其尊人有鄉里之思築樓於所居次為節宣眺望之樂雖在人境而絶囂塵居闤闠而免湫隘寄身於萬瓦鱗集之顛放目於羣峰髻聳之外雨暘之晦明雲烟之絢􅆺捲簾隠几勝槩呈露時扶掖其親以登斯樓或􅆽酒觴客倚闌賦詩歡意油然百慮氷釋豈非翫心宣情之助乎雖然予有諗於繼先者夫樓之勝子既得而覽矣亦嘗内外而有得於己耶惟人稟二氣五行之秀本心昭徹衆理畢具體騐而篤行之發為孝弟忠信以之觀物則日月之所以運行山川之所以流峙草木之所以榮悴鳶魚之所以飛躍莫不目擊道存神㑹心得蓋有諸内而觀乎外闕是又不可不察也繼先矍然曰闕徒知以覽勝名吾樓今而後闕義願終有以教之是為記三皇廟學記皇元開壽域於天下設置醫學俾人無夭札之患以三皇為醫所祖制下所在立廟春秋以三九陽月享祀日亦如之公帑出錢守土者行禮如式始興元獨無廟至元壬辰前醫學教授董紹昌以己貲得隙地於城内西南陬請立廟於憲簽暢師文公責守土者創殿三楹四阿不侈不陋像設三位後之繼者復增大門兩廡皆朴素未暇丹雘逮今甫歴三紀餘而敝壞殊甚至順改元承務郎古渭燕侯字繼卿之興元推官任先是朔朢路官各於祝釐所在行香侯適分於此既至拜謁畢顧瞻嘆曰夫清濁既奠之後三皇氏建立人極以惠萬世醫特餘事兹國家俾郡國通祀廟號開天崇重可謂至矣而廟貌摧毁滅裂如此坐視弗葺其責匪輕紹庭居本路之末僚又朔朢𨽻此寕不怵惕於中時醫闕教官遂引其所謂提領馮獻鍾震共議力無所出以疏干諸好事及隷醫籍者助不以多寡不足則己出夙夜孜孜甚於營私而馮與鍾二子亦協力奔走佐之視棟桷之腐者易之瓴甓之缺者補之殿門不稱改為櫺疏之制而丹漆之琉璃其觚稜藻繢其栱棁礱石崇陛登降有儀運壌荑庭序立不倚殿及兩廡以達大門覆蓋圬墁縝密堅固不復有風雨之虞且命工繪歴代十名醫像朝拱於殿以備從祀截然粲然觀者聳異或曰皇墳之世祖尚質樸不必事華美侯曰不然簠簋豆􅇼古制當存而不可易盍不觀二氏之宇與都邑吾夫子之宫堦極其飾以示崇敬獨何慊乎此哉聞者不能難又直大門外置地一區周迴二百舉武創立講堂七楹榜曰眀本蓋取醫者治疾當明標本之義謁香畢率醫之長與其子弟升堂講究難素凡醫氏書嗚呼可謂不負聖朝好生之德矣竊惟侯之所職蓋專以推讞刑獄為務今乃如此則下無寃民從可知矣向役之半興元路總管通議公方下車美侯之績慨然割俸金以助之而闔府僚屬亦翕然同贊厥功遂集既落成醫學教授楊浩澤暨馮鍾二提領来請曰計侯之功不下於創始者欲具堅珉以紀其實侯不許曰此路長及同僚與諸君之宣力也今若從其言則是廟是學後之人何以考始末之自敢請文以刻之某亦善侯之用心於是為文記云鳳州新修三皇廟記天地肇判鴻荒朴畧不可紀述逮至庖犧氏神農氏黄帝氏繼作始有三皇之號書曰三墳夫子定書斷自唐虞三墳不傳於世而易繫述三聖人開天立極畫卦制器人文漸生通變神化以濟斯民與天地同功合德今醫家者流所祖蓋特以他傅所載嘗藥火食内經養生之説特三聖之緒餘耳我皇元以為報本崇敬莫大於此當視社稷文廟凡郡國守土官以時致祭以陽主生數數盛於三極於九祭之月日皆用三九廟曰開天以醫流主之鳳之為州𨽻興元路民庶鮮少地非夷曠然為入蜀之咽㗋文廟社壇前政既遵令式而三皇毎嵗獨設主僑祭於州廨甚非所以掲䖍稱聖朝昭報之美意今州之貳忠翊梁侯好禮竊念州官之正長雖闕其責豈不在予於是卜地於州之東北以錢償於民代木陶瓦命工蚤夜躬督經畫所費不斂於下又出己公田之粟以食役者而作之不日而廟成為正屋三楹三聖像設塑繪巍然且為大門繚以周垣扃鐍惟謹而州之判官苗將仕實賛成之厥功告畢以某嘗執太史氏筆遣州吏楊安詣興元介隂陽教授劉從政求文以紀嵗月辭既不獲因慨然歎曰夫世之仕者非汲汲於營私則事催科苟免譴訶終更則去則已足矣又安肯出己資與力任其責哉貳侯能如是則必知三聖功德及於萬世推是心也其於愛民而生遂之宜如何是宜可書又豈特紀嵗月云爾耶洋州三皇廟記皇元升平日久講求文物稱秩元祀於是設置醫學之官謂醫之祖出於三皇生民之命實所依賴俾天下郡國立廟享祀號曰開天其牲幣禮文一視儒官祭先聖先師例以歴代名醫從祀且以春秋重三重九之日取陽數也守土之臣率醫官及其生徒行事洋為州醫設學正其醫正蘇文廣始中於州闕興道舊治為廟權輿草創及何應申之在職也與其醫生等協力増葺像設供具漸次完備又以基址庭除廹隘班序周旋有所弗稱出己資五百二十五緡得鄰廟地三畆有竒而廣之又創樓曰拱聖庋藏頒賜聖濟搃録等書大門講堂庖舍恵民局計十餘楹至於祭服由中及外凡所湏物莫不備舉費皆竭己所有初不吝惜手植松栢雜樹百餘株必生成而後已若應申者可謂稱職而知報本矣来請文以記曰非敢以言功也願有以識嵗月某拱而言曰夫自天地始闢而後有人太古不可紀自三皇建立人極畫卦造書契耒耜棟宇衣服禮秩通變神化莫不粲然利益萬世故其神靈在天為四方之禋祀其緒餘則為醫家者流聖朝闕祀於醫特以俾天下郡國通祀以示百姓日用而不知者又盡其報爾今應申能體上之意嚮心之而不忘力之而不倦費之而不辭其成緒皆可書也因為言三皇功德之梗槩與今日報祀之之意俾歸刻諸石其廟經始於某年某月落成於某年某月云南安贍學田記皇元龍興朔方列聖相繼駕馭豪傑削平海内於時西土有若汪氏寔為虎臣忠孝夙著隠若長城可付大事於是寄以爪牙腹心之任俾便宜開府總率其屬以征弗庭子孫承業穹爵旋加其所以寵綏者至渥也武功既立文事亦修昔先子禮部君遊南安與其士夫㳺歸謂某曰南安廟學一新文士咸集甲於他郡皆汪閫之力道源未冠猶識其言距今一周甲矣厥後朝制遷徙不得專一儒先凋謝後學失菁莪之育漸不逮前今銀青榮禄大夫大司徒汪公克世其家臺省荐更乆居於外新荷寵錫歸榮故里竊謂古者司徒之職自唐虞三代皆掌邦教敷五典擾兆民職任非輕今公位是其於學校當篤意宜矣况公平日讀書與寒士角非他將種之比而德不孤立善以類聚後至元丙子夏御史朝列李公憲僉奉訓宋公適以讞獄至亦既覯止道合志協蓋宣明教化興舉學校亦其職也邇又欽承聖天子劭農興學詔㫖是宜敢緩於是發摘豪民所隠者學田為畆者百水磑一區歸我公闕司徒公又益以田為闕十日水經田中有可闕力以修充學者用自闕徒日益給膳者日三闕已也郡學愽士李維闕以相其事既已就緒闕僕求文以紀其實意闕事不鑱諸石恐後之闕書有西土乏人之闕而曰以公之與李闕學者如營己私將闕来者之不如今也闕先勇力朱文公嘗闕導之興二南之化闕而生秦人以猛驅闕戰鬭之心勃然而闕機其可不審而不闕老不文不忍辭故闕焉權輿之詩詩人闕禮其辭曰於我乎夏屋渠渠今也毎食無餘吁嗟乎不承權輿闕後之来者順齋記愚自幼讀書至於闕為端居警省之所闕室之北偏榜曰順齋闕而問曰僕聞士生闕以植立其志剛毅闕隨屹然如砥柱之闕齋以順殆恐委靡闕余曰客誠過愛相闕而失中也敢不佩闕愚有所見願卒陳闕大俯察仰觀日月闕四時之行百物之生闕為荒矣上而國家發號施令建侯行師苟不豫順則衆不服矣下而農圃寒耕熱耘晝作夕息苟不順序則生不遂矣微而至於物川泳雲飛秋蟄春啓陸行藪集巢居穴處無不順以生者况於人乎夫人之生有秉彛之性聖人亦循其自然以立道如禹之治水行所無事非如告子桮棬矯揉戕賊之也及其立教皆曰天叙天秩其品之大者父子之親君臣之義長幼之序夫婦之别朋友之信吾當日講焉使渙然氷釋怡然理順而驗於日用常行之間苟為不然則淪胥禽犢矣蓋順之字乃理之用也雖天地之大事物之微不可違者此愚所以服膺而不敢失今客規我以委靡隨人無乃孟氏所譏公孫衍張儀者夫儀衍俗稱為大丈夫而以妾婦之順事人此逆理之甚烏得為真順乎客聞之踧踖似有愧色拱而言曰僕夏葛而冬裘渇飲而飢食所謂居其中而不自知者今聞吾子之言則順之時義大矣哉客既退遂書為之記得雨記泰定丁卯春正月丙辰食時雨至丁巳食時止不暴不徐作止如一劚地驗其浸潤下無燥土民氣浃和見者相賀去年夏秋之際熯旱堰水既微稻不能插禾菽皆傷七月中雨槁者復生嵗得中熟雨雖来遲麥種得入土根滋苗盛及是優渥之澤豐年可卜矣翌朝醫學正何君子鑑至津津喜色生於睂宇既以雨為賀袖出幅紙立請而言曰先生記之蓋去年之旱洋川尤甚何君憫之具香幣銑步挈瓶禱於靈泉乞湫焉不惮百餘里之逺致於洋而禱祠焉果得甘㴻今又請余記余因仰而歎曰嗚呼生民之命係雨暘之時若不若也任牧民之責者必以此為休戚今何君不任其責而以人之休戚為己之休戚是可尚也故樂為書之新修二賢祠堂記天下之事其同異有絶然者固衆人之所知也至於事異而理同者非君子莫能識也夫漢唐異代文武殊途不同也二賢皆隴西成紀人均為李姓此同也至於俱禀英傑之氣負超卓之才其能蓋於當時而名垂於後世此不同之同也非君子孰能識之李將軍廣生於漢孝文時帝嘗曰使廣生髙祖時萬户侯何足道也其材闕天下無雙射必中而力嘗誤以石為虎射之控弦沒矢急則計百出守右北平敵人號為飛將軍不敢近邉但以數竒終不得封侯又不相能於衛青左其部曲死之日天下知與不知皆與流涕至今為之太息而李翰林白當唐明皇時以長庚之精號謫仙人天才放逸思如湧泉尤聖於詩帝置之金鑾出入翰林嘗應制進樂府援筆立成竟為力士以脱靴之憾沮而不用四海稱屈以為與才不與命至今使人不平使二賢生際一時必能相得何者史稱廣誠信於士大夫而翰林識郭汾陽於行伍薦之後以永王璘廹脅得罪汾陽請以官贖其相得可知矣西臺御史李某陕西憲僉宋某以讞獄至隴之成紀望邑城之南夕水之隂五龍谷山巘間其址隆平可愛詢云蓋李將軍故居邑人為之立石表其地宋為四聖院後廢鄰寺妙勝院僧了忍主之耕者嘗得箭鏃有二掌之巨上有漢字意廣所用也又獲石斧詳其制亦非近代之物瓦礫中僅存斷碑院額數字而已國初邑人為立一石表曰漢李將軍故居迂軒趙魯公世延亦立一石表曰唐謫仙李翰林故里竊謂廣之忠勇白之文章皆間生也合祠以享何間其世代文武不同耶朱文公守南康以石有卧龍狀創孔明祠後人亦設文公像有司以仲丁致祭其為先後並祠例也某等各捐己秩創立一祠設二賢像一竹皮冠書其主曰漢飛將軍李公一宫錦袍書其主曰唐謫仙翰林李公時銀青榮禄大夫大司徒雲溪公義其事割金賛成遂大書四字扁為二賢之祠仍以僧了忍監修今州判官朱恵董役落成有日移書於僕以屬筆焉但僕衰老文氣卑黹然盛意不忍拒以所寄事迹次第之雖不能發揮前賢偉績及諸公髙誼若夫天雨將降山川出雲跂而望之凛凛乎若二公之生氣猶存故係以詞曰世之相後兮千古一途曰文曰武兮其道雖殊二公英傑兮所禀則俱合祠以享兮神其樂胥後之来者兮堂下拜趨視此碑辭兮慷慨嗟吁閑居叢稿卷十四
