body:
  text: 閒居叢稿卷二十一元蒲道源撰字說王思進字說王生既冠婚猶從余學一日具禮前請曰某以幼命名不合於義類願先生與易之庶幾縁名求義以自勉是亦教誨之一端也余嘉其意謂之曰汝以我一日之長而揭揭然以從我也惡得不以所聞告子語曰譬如為山未成一簣止吾止也譬如平地雖覆一簣進吾往也夫為山九仭以一簣之虧則前之功俱廢矣雖坦然平地自一簣而往則後之功可望矣此非由乎人哉易曰君子以自强不息記曰有弗學學之弗能弗措也故聖人惜顔子之能進責冉求之自畫其意亦可見矣子其早夜思之必先立其志由學問思辨篤行以求至於至善如居偏方欲適中國問道所由行而不已安有不到之理若營營於競名躍躍於趨利苟目前之快自以為得進之冝則非余之所望也生能以是思之則他日成就詎易量哉生曰唯遂以簣為名思進為字云劉徳用字說劉氏之子始從學於余惟以小字稱近欲載筆習吏業具禮前請曰某幼䝉先生訓誨今年及弱冠而名字未立同儕稱呼者以為慊願有以進而教之余觀此生於其伯仲間頗醇謹可教為名曰懋以徳用字之盖取商書徳懋懋官之語懋者何勉之之謂也勉者何勉於徳也人能勉於徳則上之人亦以官勉之也昔子張學干禄孔子告以言寡尤行寡悔禄在其中矣人孝於親弟於長忠於君信於友行是數者以類而推修治勉勵必使有得於己則實行無愧令聞藹然求為時棄得乎徳用名字之意如此尚勉之哉解推官四子字說府推解君四子曰榮宗榮祖榮徳榮仁長與次則壮有室矣榮徳以下年且弱冠從余問學一日府推君過余請曰某四子名而未字敢請余不容辭敬奉其字榮宗曰伯華榮祖曰仲顯盖取古人所謂増光祖宗孝經立身揚名以顯父母之義榮徳曰叔章榮仁曰季元盖取書天命有徳五服五章哉易元亨利貞元為仁而居首之義夫字者所以尊成人之道而美其稱也能不恃所稱之美思惟其義以充其實則善矣榮宗更曰伯敬取禮大傳尊祖故敬宗榮祖一字曰仲修取詩無念爾祖聿修厥徳榮仁一曰季從取孟子仁義忠信此天爵也修其天爵而人爵從之譙徳操字說凡物之至堅者莫如金石金之堅火能鑠之石之堅水能泐之如是則堅果不可得而恃耶曰然也質之堅如金石者猶不可得而恃矧吾所謂道心惟微而物欲之熾有以害之歟譙生名堅從余學以未字來請為奉字曰徳操且告之曰子誠能於日用動静之間誠敬以為主求放心而操存之克去已私不為物誘講明義理固執力行及其乆也徳性堅定向之不可恃者至是而可恃矣古之聖賢匹夫不可奪其志千駟不足動其心確乎不㧞磨而不磷亦非苟然矣生懋敬之毋忽王克承字說執器不恪或墜而毁舉足不審或跌而傷况其大者乎是以君子無所不用其敬也王生學於余說語孟頗知嚮方年駸駸弱冠矣猶以小字行於夷等稱呼誠慊一日以名字為請乃取書說命中式克欽承語名之曰欽奉字曰克承且誨之曰夫欽之為言敬也書中言欽者極多堯舜訓飭其臣止以欽哉二字則其義可謂博矣盖人能欽必恐懼修省收歛持循内以承順其親外以奉承其上接承其友以至於一事一物之承無不克者生其勉之若夫美其名而醜其實者君子不為也非今日命名之意也可不謹乎劉伯受字說劉福自幼時其長者亦令從學今年踰弱冠鄊里之先輩共與進之欲美其稱呼請字於余取士冠禮永受胡福之語字之曰伯受盖受之為義如器之受物隨其大小而為之量人之修身以受福亦若是爾居家孝弟則得父兄之愛出門敬譲則致鄊里之和勤儉則饒財謹慎則遠辱凡此皆物之應其他可以類推矣伯受勉之哉宋宏舉字說亘萬古而不可易者三綱五常之道天地位人極立以是而已國非是不治家非是不齊身非是不修雖名曰人實何以異於物所謂三綱君為臣綱父為子綱夫為妻綱五常則仁義禮智信是也朱子小學題辭亦曰仁義禮智人性之綱綱者何維網大繩也盖綱舉則萬目畢張矣猶人綱常之道既立則百善萬行皆從此出矣書曰若網在綱有條而不紊信哉斯言宋生當冠字之年猶以小字行其尊人公亮以為請余以師道不可辭為名曰綱奉字曰宏舉宏者大之義盖取孔氏書傳序舉其宏綱之語其命字之意則在此而不在彼也生懋敬之哉周子敬字說周生㓜時嘗從予學年及冠猶以小字行介其同學友譙生來請名與字余以恭名之奉字曰子敬周生請聞其義余謂主一無適曰敬致敬於外曰恭體用相須表裏交正曲禮三千始諸無不敬洪範五事先於貎曰恭盖敬以直内則非虚敬矣恭而中節則非足恭矣自生所急者言之事親從兄持守謹乎孝弟待人接物一敦篤於誠信以至言動必恪有戰兢惕厲之心居處必荘無怠慢邪僻之氣使敬以直内涵飬於未發之前恭而中節周旋乎從事之際能如是則由家而達於邦國之乎蠻貊無往而不可行矣生既以是為稱呼之美又當充為踐履之實云蒲蕃仲植字說姪蕃字仲植其父徳衡所命也余為申其義以告之蕃為滋多之義詩騶虞小序有庶類蕃殖書洪範有庶草蕃廡植字與殖同用然有二義栽植也生植也合而言之惟其培擁栽植然後生意油然而蕃息滋多矣如人之涵飬有素和順積中英華自發於外韓子曰根之茂者其實繁膏之沃者其光􅂱仁義之人其言藹如也汝試以是思之樞機二子字說樞機物之動者也言行身之動者也動而中節無往而不善矣易傳曰言行君子之樞機樞機之發榮辱之主也書曰若虞機張往省括於度則釋盖動則吉凶悔吝繫焉聖人荅子張干禄之問亦不過言行之寡尤悔耳可不慎乎余故為二子立名曰樞者以思發字之曰機者以思度字之俱曰思者庶其時省而不忽也噫予既以是名而字汝矣又筆其義以示汝矣汝其思惟服行責之於身耶抑將仰人耶則吾不可得而知也鄭文質字說記曰夏尚忠殷尚質周尚文夫三代之俗所尚雖不同亦世變之降自忠質而至文猶四時之運不能不然也夫子生於周衰悼時文之勝歎史之闕文至有文質彬彬然後君子及吾從周之語夫聖賢之於季世末俗之弊如砥柱之於頽波盖有確乎不㧞者自常人則為習俗所移而不覺悟夫質勝則失於野文勝則失於偽二者不偏勝而得中則彬彬然君子矣鄭生名文質余以允中字之欲生本以忠信篤敬末以威儀辭章本末兩端無過不及以成其徳所謂君子哉若人之語將見其所歸矣胡昌齡字說胡宰伯充之子名禧字昌齡請其說於余余謂禧之訓福也漢書受禧祝禧齡齒也記所謂古者謂年齡齒亦齡也洪範五福一曰夀則夀為福之􅇰先者也夀雖天之所賦然能全其所賦則在乎人焉攸好徳居其一禧果能知此則戰兢惕厲始於身體髪膚之不敢毁傷終之以修身俟天而立命將見如士冠禮所祝眉夀以受胡福黄耉以受天慶盖不期然而然矣李思永思齊字說李氏二生一曰𦙍寧一曰家嘗從余學一既冠一將及矣俱未字其尊人倅君銘甫來請為字𦙍寧者曰思永取書其寧惟永之辭盖寧而至於永其為寧也大矣致永之道無他顧吾所以自修者何如耳書曰慎厥身修思永修身之要其目甚備臯陶所陳之九徳思惟而服行可也𦙍家者曰思齊取大學身修而后家齊之語夫修身然後可以齊家而修身之要不外乎窮理正心家既能齊則凢所以事上治人推之無適而不然其詳具乎朱子集註講明而力行之可也二生來前汝之伯父秋谷公起自儒素以功勲徳業為時名相為世聞人汝父倅君亦克樹立以振風猷又非若他人比生等是冝縁名求義勉强不怠繼繼承承俾不墜其家聲庶余今日命字之意矣二生曰唯遂書以授之王克新字說明徳無聖愚之分氣稟有清濁之異中庸曰自誠明謂之性自明誠謂之教夫誠而明之性之也明而誠復其性者也惟聖人氣質清明純粹不假修為如良玊美珠非塵泥所能汙其餘則不能無物欲之累善學者致力於克復及其成功一也故湯之盤銘曰苟日新日日新又日新而朱夫子釋之曰銘者名其器以自警之辭湯以人之洗濯其心以去惡如沐浴其身以去垢誠能一日有以滌其舊染之汚而自新則當因其已新者日日新之不可略有間斷也至哉斯言予讀書至此未嘗不三復警省焉今王生為學頗知嚮方易其小字曰銘以克新字之生能以盤銘而銘諸心思惟朱夫子之訓以為力行之方惟日孜孜無少懈怠則庶乎有日新之功矣李恕行字說學明乎體用然後可以言學盖有體而無用則道為虚器而不可行有用而無體則道為無本而不能立二者豈容偏廢也哉欲明體用之一源無若忠恕之二字故曽子指此以明吾道一貫之理子思引此以申道不逺人之義其立言雖不同然所謂盡已之謂忠推已之謂恕忠者體恕者用則不異矣嘗謂此心真實無妄推之以及於人近而事父兄接交友達而致君澤民無所不用其極矣夫子以是答子貢終身行之之問蔽以恕之一言豈欺我哉李生自入小學以思忠名今冠而求字以恕行字之生曽授讀朱子四書果能求書中所謂忠恕者講貫思惟以致其體用相須之義則不徒名字之美又將有以服行而有益於身矣龎士先字說文質不可相勝夫子既以先進於禮樂為野人何為復有吾從之語耶盖周衰文勝時人不之覺反以先進文質彬彬之君子為野人冝夫子發之以示訓耳盖質者本也文者末也有質然後文可得而施人誠能以忠信為本文之以禮樂猶甘可受和白可受采則彬彬然斯為君子之歸矣龎生名進字士先生方從余授業冝取語中如此條者熟讀審思庶知用力之方云劉元禮字說禮者天理之節文人事之儀則其行之也有尊卑貴賤等級之異揖譲進退威儀之節雖皆出於人為莫非天然一定之理各有次序存焉故書曰天秩有禮其此之謂歟劉氏子生温厚之家從余授學其尊人切切欲其有成也余亦懼其放逸而不循禮名之以秩以元禮字之生來前余聞聖賢格言曰夫禮者敬而已矣曲禮首言毋不敬敬則心有所主而禮可行禮行則事皆有序無往而不冝矣舍禮則何以為人故詩有相鼠茅鴟之譏生能從事於此居家以事父母出門以事長上接朋友又推而至於克去已私以復天理如顔氏所聞於夫子者斯乃下學上達之極致生敬之哉毋忽樂仲宣字說漢中職醫之長樂義卿家世詩書而業醫著名其子詣於黌宫執弟子禮既冠名以周翰而字以仲宣盖詩之崧高有為周之翰四方于宣之語詩之義以申伯吉甫為周之楨榦而宣其徳澤於四方也或者曰以是名樂氏子而取訓無乃不可乎余應之曰夫古之人命名字不必拘拘取義於身也亦隨寓以為稱呼而立訓耳盖子能世其醫而立其身為家之楨榦以施其衛生之術於人亦吾夫子所謂是亦為政之意耳又安知不能立志如周之申甫耶顔淵曰舜何人也予何人也有為者亦若是或者曰然遂書以為字闗彦修字說書曰慎厥身修思永慎者何敬謹之謂也夫修身而加之以慎者盖非慎則修身何所主哉闗生請名與字余既以克慎名之復以彦修字之修身之道雖散出於經書然大學致知格物誠意正心以及修身井井有序而修身之前先之以數者修身則其慎可知也至誠意章於慎獨之說尤致謹焉吁聖賢格言具在方䇿闗生能慎思而篤行之吾將見其身修為闗氏克家之子又豈特稱呼之美而已哉趙肯播字說興元醫官趙君奉先之二子長曰肯堂字克繩次猶以小字呼請更名與字名曰肯播字以克紹盖取書厥父菑厥子乃弗肯播矧肯穫使與其兄名及字義類相比而書中克紹字不止一見此盖以為子者因父菑而肯播則能繼紹前人之業矣無逸之篇不云乎厥父母勤勞稼穡厥子乃不知稼穡之艱難乃逸乃諺既誕否則侮厥父母曰昔之人無聞知趙生未至此不可不以此告生能以父母之心為心知所以謹戒則凢所以持身闕不墜前人之基業而愈光大之者生尚其勉旃王伯循字說子思子曰天命之謂性率性之謂道程子曰性即理也盖隂陽五行有理有氣人得其氣以為形必得其理以為性率循也人能循其性之自然無所往而不善矣惟其梏於形氣徇於情欲誘於外物昧焉而入於惡者多矣苟不致力於學反躬以求之則又安能具夫天理之可循哉王生名理年弱冠求字於余拜而且曰某非徒欲美稱也將以為終身之訓故為表其字曰伯循書其義以授之生西軒王先生之曾孫肅僉元亨之孫也誠能深惟其義而篤行之尚弗忝於世徳云趙時雍字說趙公濟之次子壻醫鍾氏踰冠稱呼無異於閭閻細民其友善者以為慊請名與字余以其居同里為命名與字且詢其兄之名字曰時敏字彦修因求其比類者名以時雍字彦和盖雍之為義和也書曰黎民於變時雍夫堯舜之時仁義浹民民從其化是以致時雍之美今子幸生太平之世何異於唐虞之時苟能從化而畏禁使宗族稱孝鄉黨稱弟昔周公曰爾室不睦爾惟和哉身行之於家推之於國人莫不皆然以協乎時雍之俗如是則不徒時雍之名彦和之字以為美稱也又當思其義而服行之然後為有益矣袁士貞字說袁生名順福從予學介其同門友來求字余字曰士貞取易坤象彖辭柔順利貞君子攸行語盖順之為義不咈逆之謂也坤豫備論之矣六經之中不可徧舉自其切於己者言之率性之謂道惠廸斯為吉不順乎親不可為子忠順不失足以事上至於接物處事莫非是理人果能此福將安歸故士冠禮始加祝曰棄爾幼志順爾成徳夀考維祺介爾景福雖然要不失貞固而已不如是則坤道既以順矣又奚待牝馬之貞安貞利貞可貞之贅耶苟不以貞而固則儀秦妾婦之道矣生讀書亦嘗講明其說尚敬之哉陳逢吉字說君子之獲福於天也非假祝史以求之惟盡夫已之所為而已故易經大有之上九曰自天祐之吉无不利聖人於繫辭復贊之曰天之所助者順也人之所助者信也履信思乎順又以尚賢也是以自天祐之吉无不利也今觀大有上九之爻履六五虚中之信而能謙退不居志從於五得履信思順尚賢之實自然為天所祐夫人能踐履誠信謙恭巽順尊敬賢者而親之其獲吉冝矣書曰作善降之百祥詎不信哉陳提舉之子名祐夙䘮父克自樹立葬其祖以下十餘喪可謂孝而有志矣今冠而未字鄉人以為闕典來請奉字曰逢吉且申其義云李伯修季安二子字說李君善甫家世業儒其子永與寧從余學性皆穎悟篤實可教冠而求字永字以伯修臯陶謨曰慎厥身修思永盖求永長之道必自修身始先儒謂修身則無言行之失思永則非淺近之謨伯修之義盖取諸此寧字以季安召公奭所謂志以道寧寧與静同義大學之知止而定定而静静而安安而得其所止則善有諸己而為學之次第至此無以復加矣季安則取是義焉夫伯修之修身思永季安之止於至善立言雖殊義則一貫盖修身必欲止於至善而至善必本於修身故曰一是皆以修身為本二子果能一是思之則兄弟之間相與講明而力行之則無愧命名與字之意異日卓然見稱於人使皆曰善甫有子矣李彦修字說李生從余學既冠矣猶以小字行為名曰敏字以彦修且告之曰若知名與字之義乎盖取諸商書說命之辭惟學遜志務時敏厥修乃來夫天之降才於民初非有殊特由學與不學而後分爾學之道必先遜志虚心以為受學之地苟不如此則孰樂告以善哉又務時敏孜孜而不舍則其所修者源源而來矣故論語首章聖人以時習為訓又曰我非生而知之者好古敏以求之者也至謂學如不及猶恐失之其義愈切矣夫口誦心維真履實踐多識前言往行以畜其徳以之為文辭則據經義之言也以之為徳行則合倫理之正也此厥修乃來之效也若夫綴葺剽竊為人而不為己若無根之木無源之水是豈厥修乃來之事耶今予既以此命而名若字又從為之說彦修其服膺焉鉉鐸二生字說鉉舉鼎之器也鼎之用大亨饗帝養賢聖人取象尤重焉虚以受實以出非鉉莫能舉曰玊曰金其貴可知鐸宣揚號令之具也金口木舌金剛木柔以相濟其聲和而不怒用而能乆振必以時書曰遒人以木鐸徇於路語曰天將以夫子為木鐸是也王侯思進新除廣元路總尹來訪坐定作而曰簣也幼從先生學名與字皆先生所命逮子銘等亦然今晚得二稚亦累教席下懼旦夕從於任所不能長侍左右雖未及冠而字似為太早計非欲速成盖願有以誨之俾服膺不忘也余不敢辭取與其兄銘類曰鉉字克舉曰鐸字克振呼來前謂之曰鉉汝當荘敬篤厚使有任重之質以成克舉之功曰鐸汝當謹信自持必時而動以收克振之効余老矣殘喘苟在尚見汝異日有成矣詩曰未幾見兮突而弁兮若等其懋敬之哉閒居叢稿卷二十一
