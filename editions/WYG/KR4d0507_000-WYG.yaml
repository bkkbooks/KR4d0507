body:
  text: 閒居叢稿别集類四元提要臣等謹案閒居叢稿二十六卷元蒲道源撰道源字得之號順齋世居眉州之青神徙居興元初為郡學正罷歸皇慶中徴為國史院編修官進國子博士年六十矣越嵗復引疾去後十年召為陜西儒學提舉不就迹其生平恬於仕宦大扺間居之日為多故其子機裒輯遺文題曰間居叢稿凡詩賦八卷雜文樂府十八卷詩文俱平實顯易不尚華藻黄溍為之序稱國家統一海宇士俗醇美一時鴻生碩儒所為文皆雄深渾厚而無靡麗之習承平滋乆風流未墜皇慶延祐間公以性理之學施於臺閣之文譬如良金羙玉不假鍜鍊琱琢而光耀自不掩云云亦言其文之真樸也葢元大徳以後亦如明宣徳正統以後其文大扺雍容不迫淺顯不支雖流弊所滋庸沓在所不免而不謂之盛時則不可顧嗣立元詩選引溍此文謂當時風尚如此可以觀世運焉斯言允矣乾隆四十一年十二月恭校上總纂官臣紀昀臣陸鍚熊臣孫士毅總校官臣陸費墀欽定四庫全書集部五閑居叢稿别集類四元目録卷一古賦四言古詩五言古詩卷二七言古詩雜言卷三五言律詩卷四七言律詩上卷五七言律詩中卷六七言律詩下卷七四言絶句五言絶句六言絶句七言絶句上卷八七言絶句下卷九銘箴贊解辯樂語夀詞春帖疏卷十跋卷十一齋醮文祝詞節辰致語上梁文詩聯卷十二樂府卷十三經㫖䇿卷十四傳記卷十五制表牋卷十六碑卷十七書啟卷十八序上卷十九序中卷二十序下卷二十一字説卷二十二祝文卷二十三祭文哀辭卷二十四墓誌銘上卷二十五墓誌銘下墓表卷二十六行狀
