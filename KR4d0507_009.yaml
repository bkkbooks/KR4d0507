body:
  text: 間居叢稿卷九元蒲道源撰銘九思堂銘君子之德成於克思其目有九聖人發之視明聽聰色溫貌恭言忠事敬疑問乃通懲忿戒得無非切已不思則罔思則中理李門振振昆季九人制名以此其數適均有扁斯堂永懷肇鍚銜訓弗忘兢兢是式勤齋作序意盡乎辭我愛助之配以銘詩積慶堂銘萟黍稷者可供粢盛植松柏者荆棘弗生相彼德人為善不足身及子孫並受其福積之伊何匪夕匪朝善豈他求大倫孔昭孝敬弟慈及物以恕罔計厥功綽有餘裕洞羊某氏有扁其堂我作銘詩永胤勿忘遵誨堂銘粵惟髙氏奕享修年何以致之為善使然父詔厥子子復詔孫惡不可為臨絶訓言善惡之分間不容髮去惡即善非秦而越璘也聞孫扁堂遵誨於坐於立有嚴斯對昭烈垂戒見於將終髙氏家法古人與同匪淑其身永垂後人引以勿替是為克遵致樂堂銘并序經曰養則致其樂南翁待制既事斯語又名其堂請文自警某不揆勉為之銘曰人之百行維孝為先曰愛曰敬匪強而然經紀其條各有攸當五者之中先則云養其養伊何反身而誠旨甘溫凊婉順和平極其情文斯所謂致無一毫憂以為親纍天下之樂我非敢知慈顔既悅我心孔夷在昔鄭莊賦於大隧母子如初融融泄泄底豫則辭養志者曽為法後世大孝是稱舜曽我師蔑莊之失卓哉周君終始如一猶切自警昭扁其堂曷愛助之書此銘章石硯銘湯池環於外金城峙乎中墨子以為守毛頴以為鋒余將望二子於此石之上以成夫文陳之功敬義堂銘為昭文大學士倉直卿作君子之德在坤六二其德維何曰敬曰義直內方外體用昭然交相涵養罔或一偏是為不孤亦無不利靜存於心動宜於事譬彼作室棟宇必隆植本端固屹然居中表以廉隅有截其址築堵引繩布庭如砥物則可見道器不離昭文扁堂我相以詩針順齋針禹之行水行所無事子思言道率性之謂順義之大於斯可知孝弟忠信以我而推天秩自然豈人所強惟理之歸大中無黨毫釐不察或為詭隨妾婦之道不衍則儀美哉斯室有銘昭若壽卿居之視此無怍贊秋谷平章真容贊并序某伏在田間恭聞秋谷平章秦國公有大勳於帝室詔畫工圖其容仍命詞臣等贊頌寵渥至矣竊謂君臣際會古今盛事太平之業實基於此某不勝欣躍亦拜手稽首擬而獻云烈烈秦公兩濟艱難隂孽既除天步以安事機之來間不容髮匪謀曷濟匪斷胡克四方奠枕有聞無聲曽是臲卼化為丕平帝曰休哉汝其豫相視昔凌煙其肖爾像氣宇魁然山河之英目光炯然箕昴之精巍巍廟堂願公壽考身任安危天子是保惟天子聖倚注方隆豈若畫圖置而不庸公其報國確乎自許肯效丹青靜而不語君臣一德罔替初終百辟是式聿覩厥容餘慶堂贊災而至於穫可以免凶荒之歲基而至於構可以為風雨之庇豈一朝之能然諒必由於馴致人徒見富貴之家既熾而昌殊不知祖宗所積享其餘慶叶木培而鬱鬱愈盛膏沃而燁燁其光惟積善可與論此則于氏若子若孫者又豈徒表於斯堂也哉解思齋解褒城少府張圖南始相識有為之思齋記者介儒學録薛秉彛持卷詣余求益不容辭詳其記之立言有不思而得思而不得思而害於思之三説余懼其歧而觀之駭於外而莫領其要重為之解曰夫塊然無知者木石也局於氣之偏且濁者禽犢也尚何思之有人為萬物之靈盍不思乎蓋以心之官主思故也大哉思乎其酬酢萬變之主宰而使之無過不及者也所謂不思而得聖人之純乎天也思而得之賢人之擇乎善也擇乎善而不失久則熟純乎天者可企及矣周公之思夜以繼日孟子稱之季子之思三而後行孔子譏之聖賢之言無乃相悖乎曰非也周公之思公天下也文子之思私於巳也考其行事可見矣使其思如周公之公聖人何惡焉惟其遲疑不斷私意反生流於不善此則公私之分其未有大不同者是以思之幾不可不慎也圖南既以思名齋又孳孳求其義則必知所去取矣敢以是告之若夫易之何思何慮無思無為此誠者天之道非可驟語者然則我之所當致力者何也曰思誠辨韓壇辨興元府南鄭縣治之南有所謂漢興壇者蓋沛公為漢王都南鄭拜韓信為大將時所築也其文具漢史漢之興實基於此後人名為漢興壇其遺址歲久崩圯蕪沒其隆然者即其地也舊刻石已不存尚有題漢興壇酴醿詩於石今移置於文廟大成門之左嵌於壁者猶可考也興元屬縣城故有漢王城上有韓信廟土人誤以為韓壇去南鄭兩舍之遠蓋漢王從蕭何薦信不旋踵而具禮拜為將豈有捨近而即遠况其城極高大非役徒之衆歲月之久不能成決非當日拜信之所明矣不可不辨夫壇之存亡固不係於治體之輕重然前代帝王英傑之遺迹湮沒亦為可惜御史李某憲僉宋某以公務至郡憚其將就泯沒大書韓壇二字深刻於石以識其處仍書其立石之歲月云樂語教坊致語皇慶三年正旦伏以乾龍飛於九五正仰君臨泰象進於三陽式開歲始堪輿協慶動植皆春中賀以德行仁對時育物大明南面陳考圖數貢之儀長樂東朝謹視膳問安之孝繩祖武益隆於帝業觀人文首復於儒科凡居覆載之間均沐發生之澤臣某等生逢華旦俯愧賤工今樂猶古樂願同四海之和先天及後天更衍萬年之䇿恭成口號以舉民謡玉階鞭響肅衣冠拜舞彤庭賀履端日月照臨開一統風雲慶會擁千官皇州已覺春風滿輿地都歸壽域寬願奏簫韶九成曲長承聖主萬年歡壽詞木蘭花慢想天開閶闔正元日受朝儀美出震居尊承乾繼統行夏之時梅花領將春到更祥煙浮動萬年枝麗日徐行黃道和風細度丹墀天顔有喜近臣知稱壽獻瑶巵道品物維新陽剛寖長百祿咸宜觚稜五雲佳氣但遙瞻百拜只心馳記得華封餘祝不妨借入新詞點綘唇旭日東生五雲宫闕光輝映百官班定拜舞朝元正春滿瑶巵萬壽同稱慶邊陲靜太平全盛永賴吾君聖秦樓月宸京裏玉巵為壽龍顔喜龍顔喜天開盛旦日膺繁祉蠻荒凱奏風塵弭羣臣虎拜同歸美同歸美山呼萬歲太平天子昌期遇天齊九五符乾數符天數今朝稱賀載逢初度金莖玉屑和甘露寶罏沉水騰香霧騰香霧祈君萬壽永承洪祚皇都曉堯階奉引瞻天表瞻天表麒麟不動御香輕裊電光曽記樞星繞升平自此開先兆開先兆堯天日月萬年長照龍樓燕千官拜表俱歡忭俱歡忭今宵帝座瑞光髙見觚稜引領心常戀南山萬壽殷勤獻殷勤獻皇天眷顧必從臣願春帖內府三對日月大明黃道濶星辰髙拱紫垣深一念守文崇謹戒萬年保祚愈尊安斂福錫民春萬國考圖數貢歲三朝翰苑史册日星垂萬世綸音雨露澤群生天章煥爛真難述地望清髙不易登萬古日星垂史册九天雨露渥詞林秋谷陽進吉亨欣道泰位陪燮理荷年豐祿厚願同人足食身安期與物俱春歲月從他頻往復乾坤於我自生成長思日用循天理儘足春風閲歲華源遠流長思世德身間年老結書緣辭祿豈無躬稼念讀書仍有獻芹心祖宗培植厚天地發生多齋居如對越廟祀儼生存疏重修漢高祖原廟抄題疏伏以漢祖勃興救生民於水火神靈如在垂祀典於古今乃眷此邦實為原廟丹青剝落不堪上雨旁風棟宇傾摧未免左撑右拄矧皇朝詔旨之屢降必聖帝明王之是崇欲議興修須當遍叩幸允千金之諾同施一簣之功復舊規模鼎新輪奐翻修城隍廟化疏伏以赫赫皇靈著自金湯之始綿綿清祀通於區夏之中然此邦廟貌雖存而昔日帡幪漸壞豈容坐視宜共翻修顧非一巳之私當集諸家之善資財樂施毫端無惜於大書綵繪翬飛目下就成於壯觀神其知止福有攸歸伏以城隍天下之通祀實號尊嚴廟宇漢中雖舊存尚虧修葺踈漏恐侵於像設傾摧難妥於神靈安能袖手旁觀用是發心緣化木植磚瓦未免更添工糧貨財豈容或缺倘樂從而無吝必隂相之有歸便請芳題共圖勝績重修關將軍祠抄疏夫生著勳勞歿有遺烈名存祀典實匪淫祠漢關將軍其無愧矣惟其事漢而一節不渝敵愾而萬夫莫禦威震華夏義薄雲霄賈勇於三分之時顯靈於百世之下史官有述血食是宜矧在聖朝益加徽號而文廟密邇神祠舊存風雨剝摧像設有顛壓之患道途經過顧瞻懷怵愓之心僣願修完仍須糾率凡我同志無吝特書修威顯行祠抄疏伏以正直聰明之謂神有功則祀雨暘寒燠之為沴無禱不從眷此古梁大哉威顯既榮膺於王爵實孚祐於生民惟習俗之欽崇必歲時而引閲至其出廟尚乃寓居議興創於行祠以安奉於遊像基符龜卜已逢樂施之人材欲鳩工未有可圖之處遍干題助共與圖成神力所加定聞風而羶慕衆資既集看指日之翬飛楓宸上祝於萬年枌社咸臻於五福修九真洞善濟侯廟疏伏以水有龍則靈發自真仙之洞時無雨則涸歸於善濟之祠迹昭著於文川澤溥施於旁邑歲華滋久蓋障弗完像設雖存丹青亦昧既感孚之若此豈酬報之徒然當議興修必須抄率揮金指廪要集善於諸家易桷墁墻及彰施於五色共祈隂相管取豐年􅦾山嘉應夫人廟結瓦疏闕望山惟南有􅦾遇旱求雨如闕歲久隳圯今復修闕頗成然瓴甓丹雘因循中輟功虧一簣終未完成士庶之心惓惓於此境內興祀侯牧主之雖懼僣踰不敢不告髙祖廟補修蕭曹二相國像疏漢髙帝基業漢中有功斯民則此實為原廟矣况聖詔屢頒必以聖帝明王忠臣烈士載在祀典者所在官司歲時致祭為言而髙廟非淫祀之比今廟中蕭曹二相國像摧惡弗支采色蒙昧不稱嚴事之意敢告鄉里好事君子少割資金以修完之尚義樂仁福亦知所歸矣與張南發先生集資團聚疏伏以人情無久睽不合之機天道豈終屈不伸之理切見學正南發先生頃因劫運莫保宗親父子烏分弟昆鴻斷轉為異姓各在他鄉侵尋遽隔於死生飄泊但餘於孫姪興言及此流涕曷勝欲圖團聚之方遍告周旋之力當仁不讓豈無揮金解橐之人感德既深當有銜環結草之報為景介福作還鄉葬親疏伏以幼罹兵革父喪藁殯於空山時混車書身世羈縻於異郡歎四十一年之久奈二千餘里之遙夢繞松楸淚濡茵席恐溘先於一旦遂永負於九原問道裹糧已愧宿㫪之乏稱家辦具可憐行橐之空凡我同盟必能多助使子貢脫驂而賻於傳有之見曼卿委麥而歸在人賢者俾諧襄事可發良心贈曰者汪得心求助疏廬陵汪得心逺涉荆襄薄遊江漢推占星緯逈起同輩之中文采風流可謂不羈之士但道路萍蹤之久乏資糧屝屨之供已割俸餘略為津助望揮金指廪有激昻之情俾逆旅窮途無憔悴之歎開庠疏伏以木須就於規矩始遂其材玉不資於琢磨焉成乎器人亦如此理實昭然某傳詩禮於親庭襲箕裘於世業欲開家孰以誨童蒙惟此鄉閭凡諸子弟如能負笈請為書名與蘇州人朱安求贖兄疏蘇州朱安士族也祖終於蘇之崑山令父終於和州教授繼母嫁人利其遺産安及其兄名恭者皆以計賣於人為奴隸同州劉楚樵憐安為出疏叩好事者得資贖為良安流寓興元復見其兄恭仍在彀中援楚樵例懇求數語為先容以干諸人而贖之余哀其簮纓詩書之裔不幸遭此當途君子暨有力賢豪倘興怵惕惻隱割日費之餘以拯之誠仁者之用心也興元路救荒勸分疏伏以職忝牧民豈可立而視其死歲逢艱食當與仁者求其生雖餓莩罔間於同胞况聖功猶病於濟衆是以古人盡勸分之道君子存周急之心爰集鄉耆以輸誠懇俾持疏語往叩富豪苟囷倉發其所餘咸推惻隱免溝壑至於此極庶格和平便請特書無煩擬議間居叢稿卷九
