body:
  text: 間居叢稿卷七元蒲道源撰四言絶句題鈍訥軒卷二首銛鋒不露鉛刀豈類盤錯儻逢方知利器文子呐呐嗇夫喋喋勿觀其言觀其事業五言題太原郭宅張節婦哭晝矢靡他撫孤勤亦至庶即此心安門旌非所事題息亭詩卷後靜中含動意息處已生機寄語名亭者功夫在謹微題東坡用蔗滓畫小丘寒木寒柯凋落盡斷壠剝蝕餘無心蔗滓畫有象榴皮書曉起偶書血肉軀誰主惟心要在腔難求還易放非敬莫能降題八景古塔摽峯亭亭古浮圖誰識山藏寺逺目見孤尖路阻無由至憨泉灌園泉有灌溉功憨名固不可主人智若愚辱汝暫同我棠店霜晴蔽芾逆旅側夫誰思召公可憐秋向杪初日映殷紅石門晚照斜暉挂林梢金翠射危嶺倚杖獨吟哦愛此桑榆景白雲隱岫溶溶拖匹練靄靄沒層巔無心舒復卷蒼翠只依然緑野芳春膏雨染郊原滿目皆生意裴公有新堂能與樂天醉莵村夜雪夢澤今宜麥六花平地尺有憶令尹賢不見新蹄迹野山秋霽岡巒界南服迤邐屏嶂列金氣極髙明嵐光正竒絶際戊午人生固願仕時有利不利與其進無成何如且藏器有為少日為貧賤非敢為人師朱墨置左右稍集里中兒幽亭烏紗一幅巾紋簟六尺牀無人竟日靜有風終夜涼六言題百魚朝鯉圖江漢朝宗于海巨魚于此周旋却有群鰍推長我知理勢當然漫題花下提壺勸酒桑間布榖催耕甚欲晴天行樂却因春雨關情戲簡德衡弟移菊我有淵明舊癖興來時繞東籬為問黃花何在盡隨緑草枯萎遙憶君家籬落霜枝露蕊爭新擬乞數叢秋景恨無一首陽春夢中偶得昨日潛居白屋今朝拜賜緋袍金榜天門烜赫玉堂地步清髙贈月樓相士眸子瞭然秋月胸中自有樓居髙明既已如此風鑒乃其緒餘七言與王同知久傳旌斾出咸秦引喙梁民渴欲塵今日承流真慰望須將膏雨入新春十二月旦日南營探梅次韻略得餘間便一來花神靳惜未曽開春風爛漫尤竒絶更費詩人探幾回讀宋四將傳并序余讀宋四將傳劉錡李顯忠死皆得正命魏勝戰殁亦可無憾獨嶽飛功業於諸將中尤卓然者竟斃於秦檜張俊之手重作二詩以哀之權臣通敵偷家賊姦將持兵養病醫報國丹心惟自許身終不免更堪悲提兵殄冦功垂就下詔班師事已非天遣封疆限南北區區空嘆失時機戲贈螢火庭院深沉月黑時悠揚金燼不勝吹鼻端粘笑兒童劣却道囊盛是古追仲夏望日郊行為王道人賦沿溪偶話道人家素不相知便煮茶塵慮兩忘談笑好西山已報夕陽斜乞芍藥聞道揚州絶品花牽風帶雨破天葩銅瓶淨滌求清供不插青裙兩髻丫和趙君鍚題王仲禮壁韻迅速光隂一旅亭功名不貸鬢毛青此身未入雲臺畫半夜披衣望列星癸未正月三日試筆休嗤㺯墨與團朱治世功勳儘有餘傳語管城毛頴士今年封爾作中書春日同諸友登城間上髙城發興新東風力軟不驚塵眼前有句何勞覔遲日鶯花一片春題王羲之鳯墅續帖吳山佳處梵王宫樓閣崢嶸出斷峰不見子雲當日字暝煙殘照但聞鐘次德衡弟送芍藥韻天然滋膩不須粧紅玉盤盂散異香收拾春光來慰眼恨無才思比王楊賀扈宰先人愚軒寒衣飢食靜觀書出處行藏與道俱若以世間竒崛看此軒端合號為愚生遲不及拜愚軒髣佛名公大老篇不役聰明喪真實如愚今日是家傳與扈宰心勞撫字拙催科用舍其如賦命何贏得在家勤教子知君天幸最居多為學工夫有等科初時下手果從何寄聲扈氏兩童丱講誦要精無但多贈山泉相者布衣睥睨幾公卿猶著山泉隱姓名肯為臞儒作竒顧知君詩律未忘情向人開口泄天機不管京塵解化衣歸去却將泉照影商量今昨是耶非唐知州梅圖畫圖髣佛見當時肯作秋山坐忍飢已為梅花成絶唱不應今日更題詩西湖風物縱依然詩律誰能續斷弦惟有孤山霜夜月照溪踈影記當年覔竹君家萬挺碧琅玕乞我休辭斫數竿蔣徑多添風與月繁隂缺處更宜看題侯子寧堯民樂社圖鑿井耕田生各遂簣桴土鼓樂何窮吁嗟澆俗慵開眼今日披圖見古風斯民仍舊秪堯民田里胡為蹙額頻消得東君輕著意放教草木一時春題陳伯敬清溪魚圖溜溜清溪玉樣清􅊏鱗如在鏡中行何人寫作橫披看開卷蕭然眼倍明波光炯炯見魚遊掉尾揚鬐百自由莫遣傍人混泥滓却將竭澤一時休次德衡弟九日以茰酒來貺茰如蠅子攢頭赤酒似鵝兒破殼黃饋我真成兩竒絶為君大醉作重陽和李敬夫雪中竹韻鳯尾搖空掃玉塵春蠶食葉靜中聞不須乘興訪安道且獨開樽慰此君十月一日郊行書所見新霜茅屋曉初凝旭日騰騰氣若蒸墻下老翁間曝背滿前匍匐弄雲仍送汪得心相者君觀廊廟人應衆我閲江湖士亦多説號得心誠可喜願聞所得竟如何欵門一笑見于思袖出名公字與詩莫問星躔兼相術只消晤語已堪竒次晏教授月蝕詩韻狡但為三窟計妖蟇敢肆一時貪誰知所養翻貽患遙想嫦娥亦自慙題金州望江樓江漢朝宗萬古流此身隨寓一虛舟勿云信美非吾土却為登臨感百憂次仇教授西鄉道中言懷荆榛莽莽暗前村間有花枝弄好春誰料山禽解生事一聲腸斷未歸人二年鞍馬真如夢一瞥風花又過春獨向荒山苦吟咏不知歌笑屬何人花枝不管人為客笑向春風滿意開忽憶尋芳年少事夢魂曽繞故鄉來題洋州土神祠海棠一點芳心肯破慳恨無紅錦護朝寒花如解語應須道多謝詩人著眼看寄弟德衡時為灌州判木瓜丸與川芎散腳氣頭風正所需聞説永康真地道頻頻能為寄來無賀瓜爾佳服膺四十得雄聞説驪龍百仭淵頷珠光彩動星躔一朝掌上殷勤看沃却塵心四十年有種公侯元自貴無災襁褓便相宜可人渾似鵷雛好會看雲霄奮翼時龍岩上人工紙羅扇楮先生掌絲綸事柄用還須召此君且為蒼生今日起相期解愠助南薰楮先生上凌煙閣便有驕奢紈綺姿賴得此君來柄用端能諷諌進良規題龍岩上人手卷子母牛老牛憐犢立欲乳阿童騎背箠且行我怒責童童不聽翳爾獨無母子情蝶粉翅翾翾喜㺯風三三兩兩占芳叢不知偶向橫披看疑是莊生一夢中墨竹猗猗誰墨此君姿數寸風梢具體微月落空庭看修影坡詩端解發真機韓同知求雪意圖詩青山縞素逺連空漠漠江雲一色同畫史翻嫌太愁絶故添茅舍酒旗風雪意圖詩助有神灞橋驢背總非真要知一片荒寒景試問華陽道上人題岐山令田修甫㺯璋卷華筵曽坐繡芙蓉張氏門闌喜色濃此日合為湯餅客岐梁相望幾山重懿氏鳯飛真協吉周人熊夢果徴詩從今便可令髙户興起田宗定此兒題山臞相士卷一雙眸子了生涯毫髮寧容貴賤差符藥有神兼濟世江湖無處不為家我真山澤一臞儒腐簡陳編與世迂自揣頭顱知分定作詩聊復贈山臞題李唐臣愚齋手卷役心用智損天真箇裏工夫自日新若把愚齋為實用先生豈是打乖人涉世圓機不解為傳心方䇿儘能知坐忘久欲希顔氏瞪目從教號絶癡題驪山溫泉數語盤銘照古今後人為戒最宜深明皇果愛溫泉好合洗當年嗜欲心總判任侯夢中任嘗為鳯翔縣尹相别區區理釣鈎磻溪原是昔時逰夢中晚節傳佳兆吕望何須嘆白頭題杜敬叔廣微子畫山水圖野水孤舟慘淡中無聲詩裏見元功却因今日廣微子還憶向來忠愍公題楊紫陽墨迹後世人賤目貴傳聞惟有桓談識子雲不見紫陽身後事半緘詩草播清芬題鄭州闕卿友于亭一家雍睦祖傳孫和氣薰陶薄俗敦可道鄉氓息爭産忍持訟牒過君門喬木枝多一本根春風三世蔚然存無庸專美張公藝百忍爭如孝友恩題節婦某氏卷四十年前失藁砧華如桃李古松心門今表節兒從仕孰謂皇天不鑒臨題伏生授書圖壽考天教作漢儒口傳秦火不焚餘朝生應命非心受終被申韓誤殺渠題繡牛圖農務閨情不一般女知稼穡亦為難金針不繡間花草繡出田家黑牡丹題韓滉畫移居圖民生窮蹙可憐渠東徙西遷定業無如我當年見韓相乞教畫箇井田圖題賈氏先塋手卷異時牧豎上荒墳淚睫承悲感雍門賈氏先塋還舊觀九原可作念遺孫題薑昭文端禮秋萱名號宜男巳自嘉秋深底事見竒葩若非兆應添丁瑞何不移開别種花霜露寒時亦有春四端統處孰非仁秋萱莫作尋常看也要工夫驗此身題閻氏知止堂卷茫茫岐路嘆人間君獨歸來晝掩關髙枕北忩方自適鳥聲何處亦綿蠻止義雖存艮象中更將大學與研窮果能至善為歸宿不枉從前賸費功贈傳神劉生人賦形神萬不同劉生下筆便收功能參水鏡無心處逈出丹青著意中題沙洲宿雁圖江湖渺渺樹離離陽鳥攸居歲暮時安集甚難驚散易等間漁笛莫輕吹題楊仁卿孝行卷廬墓烏數百巢家庭歸從墓次釋衰麻烏亦能知孝子家自是依仁非擇木漫漫别樹日空斜題王茂先雪景乘驢圖世間何地著詩翁多在荒寒雪景中無限青樓貴公子擊鮮為具醉春風題鄧勉夫鼠嚙瓜圖老黠無人始出潛徑來邵圃嚙芳甜世間此物不足怪君子當存納履嫌題劉氏滄浪書院劉君能與道同波書院新成學者多從此滄浪添一𣲖禹門行看決巍科題李息齋墨竹息齋生意發毫端寫出幽篁儘歲寒橫幅一梢應看足何須風雪擁千竿凛然風節伯夷孤氣壓軍中十萬夫此老於君情不淺掃除擁腫作清臞題孝子旌門卷孝忱初不願人知實在名隨理固宜莫道門旌今已了始終大節冀無虧題雄州胡潤甫力農教子卷秀民自古出於農為學能知為巳功不意士生三代後有如胡氏繼髙風題蒼玉亭卷冷光翠色入踈櫺歲晚相看眼共青靜聽蕭蕭有餘韻似能和我讀黃庭應制壽王平章身兼天下逹尊三應制操詞恐弗堪竊取嵩髙詩序意以為公壽足無慙贈人致仕養親其人曽為百夫長蓐食晨征夜斫營當年報國敢辭行餘生乞得非私便要盡區區愛日誠題茶劉先生卷舌本翻瀾氣一呵半甌茗飲起沉痾蒼生命墮顛崖苦却笑盧同漫作歌題解利卿義士卷我飫人飢安忍見彼貧此富貴能分推財散粟同胞者充擴仁心有解君贈卜士張知命人生分定有贏畸一定終身莫可移不是先生明剖析紛紛擾擾竟何為範圍天地一編書左右逢原取有餘獨善情知非巳欲更將疑惑與君除聞家書至索看非是何事鄉關信息真風簷不聽鵲聲頻世間多少陳驚座半紙書來也誤人題雀梅竹間雪蘂正開時群雀無情啅曉枝誰謂遊蜂么麼物春光才透已先知題牧牛圖牛背如船一笛風江村路渺興何窮悠然起我滄州趣不道題旌是卷中間居叢稿卷七
