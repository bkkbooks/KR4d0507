body:
  text: 閑居叢稿卷十一元蒲道源撰齋醮文天壽節金籙醮意伏為聖明在御教典重興誕播玉音俾修金籙蓋欽崇於𤣥範兼創造於鴻儀肇自禁中頒行天下臣某等適逢盛際同謝殊恩敢遵制作之科少效涓埃之報企延真馭庸集勝縁伏願皇帝陛下寖明寖昌時萬時億光増烈祖克慰在天之靈壽介慈闈永享如春之樂衍仙源之吉慶措黎庶於雍熙又伏以聖人有作基緖方隆德澤普施飛潜均被念微生之多幸惟大造之曷酬誕節甫臨仙科敬啓肅琳宇紫清之境誦琅函精白其心伏願真聖垂休乾坤叶慶鳳紀永綿於北闕奚啻萬年龍顔長覲於東朝共膺多福際於奄有樂此時雍又伏以天開有道之君丕承大統臣頌無疆之祝敢效微中適華渚之標祥肅净壇而祈壽敷揚妙典對越髙真伏兾誠悃上通純禧孚祐俾皇祚延洪於億載而蒼生永享於太平祝壽疏玉宇風清正少昊司秋之始瑤圖日永方聖人應運之新喜溢垓埏慶綿宗社恭惟大元今上皇帝萬嵗萬嵗萬萬嵗虹光啓旦龍德居尊得世嫡之正傳紀嵩呼之盛事與天同久壽奚啻於萬年如日方升光懋昭於四海願慿𤣥教永祝皇元地震祈禳醮意伏以地得一以寜安貞則吉坤以柔而動震為非常尚蒙厚載之恩幸免橫傷之苦敢抄衆姓同結善縁以今月某日云云伏願高穹洞鑒后土永寜聖壽綿綿鞏鴻基而有慶民生皡皡延蟻命以無虞尚兾道慈俯從愚志又即日三薰滌慮九頓投誠仰對元慈下伸丹悃伏為某大鈞播物下土微生叨居覆載之中蔑有涓塵之報切謂天地者萬物父母人民者二儀肖形今嵗地震凡三羣心戰懼豈有母不安静而令子不驚危或流行大數之使然或愚闇積愆之所致細循厥理莫究其端衆共發於誠心遂䖍修於大醮俯陳素悃仰奏朱章庶祈厄運之消以為含生之請伏願玉真保祐大道維持得一以寜無復動搖之患既厚而載永資生育之恩民俗阜安皇圖鞏固詞文啓伏以天地清寜物自然而成遂隂陽動静理不宜於過差豈期變異之逢尤切兢惶之至僉謀禳解謹事薰修惟真聖之俯臨庶凡情之上達敢傾葵藿祗薦藻蘋朝雞鳴而起既澡潔其身心雀躍以前敢敷陳其詞悃九門非逺諸聖孔臨願祈坤道之寜罔避天威之凟益隆眷命安國勢於覆盂相協攸居措民生於奠枕午皇矣上帝嚴午刻之對揚至哉坤元奈戍年而震動委躬伏地請命籲天欲圖功於敉寜兾施恵而憐憫蟻忱至切鴻造是依夕萬籟無聲帝座煌煌而在上羣情有請仙科歴歴以陳前惟灾異之不常甚春秋之所紀地維弗靖天道難明敢慿祈懇之誠庶獲底寜之助安貞之吉孚祐是圖散下民之孽致母道之弗寜至諴感神兾天心之悔禍已伸丹奏復竭素忱某等重念形判三才氣惟一貫但拘愚蠢罔致中和故於定位之間屢有失常之異蓋厚而不敢不蹐雖安而復慮復危合衆姓以薰修資善功而佑䕶伏願皇建有極德合無疆本朝凝鼎命之隆福延於下比屋免震驚之患人遂其生誓畢微軀永酬大造又意并詞伏念某安居覆載類禀隂陽自惟汚濁之微軀曷報生成之大德又况營為之際有干造化之和乃秋乙未辰刻地震灾異之書春秋所重身戰兢而若陷魄散逝以難收􅋊喘稍寜同盟是議不展薰修之敬莫伸禳解之方謹按科冲以伸愚悃伏願𤣥穹主宰大道髙真保祐生民維持太極天地位而萬物育氣底康平國家泰而四海清域居仁壽誓堅素志以答生成疏詞坤為母道願歸厚載之仁震則子驚罔效資生之報夙夜不勝於祗懼禱祈惟望於安貞伏願皇鑒有臨至誠無息地維綏静道符得一之寜聖祚綿長極配函三之永歛時五福敷錫庶民祝詞文廟朔朢祝詞四月朢日元命日月相朢而見彩正屬兹辰乾坤合契以呈祥載臨元命時既逢於協吉心敢後於祝釐仰惟禮樂之宗昭昭在上壽我國家之脈永永無窮又正月旦大聖人闡開名教萬世共由今天子整齊乾坤羣材樂育時方亨於泰道義爰重於履端仰惟禮樂之宗昭昭在上壽我國家之脈永永無窮又六月旦聖朝崇尚於斯文實超今古臣子陶成於大造未答涓埃敢因建未之辰切效同寅之祝仰惟夫子道百世以彌光佑啓我君壽萬年而克永又十二月朢天開聖治道復振於斯文澤在人心言自成於善頌時惟餞嵗臘已含春闡明東魯之風式尊夫子願獻南山之壽以報吾君元命每嵗六度降人間星臨元命諸侯一德尊天子日講彛儀詣孔室以寅恭想堯階而祝頌仰兹將聖如日月之不踰佑我至仁與天地以同久歛時五福敷錫庶民聖節乾坤合粹正篤生真主之期日月有明方大闡聖人之道敢勤頌禱永答生成冀皇祚之無疆時萬時億賴素王之顯相寖明寖昌又五月旦日闕蕤賓直斗杓之在午月逢朔旦效闕之同寅詣孔室以周旋覩闕而善頌於皇文教極日月之照臨闕人與天地以悠乆節辰致語天厯改元南至致語伏以天地發生必自本元之妙隂陽消長不離剥復之機節屇履長躬伸晉賀恭惟尊候茂對令辰願快覩於清寜獲闕臻於福祉其於頌述罔既敷宣南至節語伏以雷在地中肇應一陽之復雲呈天上式書五物之祥儀雖亞於嵗朝厯蓋闕於日至恭惟尊候履此令辰願從剛長之端茂集朋来之祉其於稱願罔既敷宣又伏以厯元所起載逢朔日之臨子氣方闕已應地雷之復天心可見雲物謹書恭惟尊候茂對剛辰願五福以咸臻隨一陽之寖長其於賀悃罔究頌言又伏以日至乎南已測土圭之景陽生於子初飛律管之灰物意漸蘇雲祥載紀恭惟尊候茂對剛辰願膺鼎至之禧以闕履長之慶其於申賀罔究頌言又伏以天開於子日至乎南惟願尊親履兹令序茂對微陽之復備膺純嘏之臨稱頌雖勤敷宣罔既又伏以雷在地中已驗一陽之復雲呈天上載書五色之祥律應飛葭禮嚴獻襪恭惟尊候踐此令辰茂迎亞嵗之休倍闕履長之慶其於稱頌罔既敷宣上梁文崇文閣上梁文闕方京師為首善之地若稽三代闕之原今上皇帝發政施仁仰繩祖武右文尚德創設儒科政府揚休期大猷之是闡中臺集議懼闕典之未興以為教胄子既有成均尊聖經可無傑閣欽承上㫖大發積緡官不科需用咸資於素畫農無妨作役盡募於閑民朝士程工梓人奏技前瞻離位後鎮坎宫切雲漢之昭囘萃菁莪之樂育致廣大也擴充吾道之規模極髙明焉振起斯文之氣象圜橋門之冠帶藏闕里之詩書擇吉旦而上虹梁協衆誠而修燕賀輒伸善頌以佐歌謠東百尺巍巍壯辟雍何止都城為偉觀要教萬里振文風南魚躍鳶飛理可探為學要須真踐履休誇晉士好清談西遙望晴山步武齊聖道巍然正如此管商功利本来低北士貴懷材兼抱德寄聲胄學衆儒英勉力進修毋自惑上時際明君與賢相潭潭栢府力扶持突兀今朝見新創下一一牙籖懸滿架窮經自可應時需焉用區區求學稼伏願上梁之後朝廷清謐禮樂興行洋洋藹弦誦之音濟濟登茹連之士上不負於天子仰答殊恩下可濟於蒼生以攄宿志四海底雍熙之治一時稱作養之功罔俾斯樓徒為虚器詩聯五言不覺星移柄空驚露濕衣霜林惟柏翠雪岸覺梅香山骨寒逾瘦林頭晚更髠火深灰善養湯溢水能平倒藤蛇赴壑怪石虎蹲崖客有懷金愧官無製錦傷詩情籠萬物文氣鼓千軍喬松鬚鬛古老竹子孫蕃折腰憐竹弱强項喜松剛氷消泉脈動雨足土膏肥羞作脂韋態真存鐵石心一誠能動物百偽謾勞心謹持三尺憲豈徇一毫私但欲修身俟寜容著力求七言行樂忍令佳節負光陰不為少年留雨聲不響樹無葉春信欲通梅有花老屋摧頽秋更漏空牀移徙夜頻興殘日壓山火鏡破晚霞照水金鱗開夢裏華胥真自樂門前黃菊任渠開松姿不管嵗来去栁色能隨春淺深勝人到底歸天定作德從来必日休午睡正濃茶有味宿酲未解酒無情商量歸計梁間燕告訴哀情樹杪蟬風烈但教摧杞梓雨多徒見盛蒿莱農畆及時皆墾治訟庭終日甚清閒墾田處處無閒曠比屋家家有蓋藏平生自謂金蘭契一日翻成貝錦言眼前徑路須教濶度外功名不用忙秋色但能頳棗頬嵗華不解白松髯名花不厭植千本惡草莫教留一苗轡攬豺狼應逺遁鼎成魑魅莫能逢髙風毎極吹嘘力皦日寜忘感激情在郡恰如無異跡去官便覺有斯人秋月幾圓離别後春風長憶笑談間物外烟霞春不老人間膏火日相煎豈是挽弓能中鵠須知誤㸃謾成蠅無才只得居人後有禍安能替子先笑談逈出風塵表文字長留天地間立身自致青雲上衣錦人行白晝中志帥果能降氣卒酒兵何用破愁城四六散聯恵我無疆嚮明而治飲氷茹蘗萆門圭竇施於有政中夜以興依水泛蓮蘭省玉堂江漢炳靈蕭規曹隨朝三暮四魚目鰥鰥乾坤間氣房謀杜斷枉尺直尋雞聲喔喔既有功而見知雖死灰之復然非特愛之欲其生則無思而不服奈晨星之將沒蓋惟仁者必有壽向非義也一介不取諸人莫非命也不容著力而求今則受之萬鍾何加于我豈有他哉惟務修身以俟韓琦薦士而或失之老泉顔子一瓢道則同於禹稷富弼知人乃見遺於山谷景公千駟名有愧於夷齊卧治淮南扵汲黯固無害也計安天下在漢廷為有人乎燭武無能為智者自知而止周公不復夢聖人尚歎其衰閑居叢稿卷十一
