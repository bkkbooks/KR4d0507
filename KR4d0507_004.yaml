body:
  text: 閑居叢稿卷四元蒲道源撰七言律詩上察司亷使二首栢臺聲望久聞亷驄馬西來得具瞻正笏垂紳存大體奮髯扺几走羣纎官無饕濫威風凛物有生成化雨霑勲業共推家世舊鳳池平地不須占自任當今捨我誰敢將直道進匡時事來肯避風波惡判重寧聞海嶽移相漢韋賢真有子興周姬旦豈無兒赤心報國遵家訓忠孝方能兩不虧憲副王公重到興元驄馬西巡又隔年袖詩兩度得趨前翰林風月文章手憲府氷霜政事權出語無疵皆白璧消閑何物止青編聲名霹靂驚天上已聽喧騰萬古傳送梁君章梁因兵失姑後得于興元景氏團聚後復回臨洮最憐姑姪鬢俱華兵後相望道路賖幾載睽離應有數一朝團聚喜無涯歸心又逐秋風起别後那堪晚日斜樽酒平安須滿飲馬頭西向是君家代送梁君章去嵗君章子先見姑賢郎去歳省姑還今日親行冒險難覿面共嗟成白髮認聲無復識朱顔瀟瀟牕外鳴疎雨厯厯燈前話故山終擬移家居漢上暫歸不用唱陽關史繼甫錄事司典史千載明時獲遇遭丰姿挺秀氣尤豪華峯秋隼精神𦂳溟海風鵬羽翮高政美自寛烟火禁才長聊屈簿書勞期君騰達興門閲不愧春秋一字褒趙和之壽慶源初發自玻瓈流𣲖深長未可涯教子義方無愧怍待人和氣亦謙卑良辰又際懸弧旦佳境渾如食蔗時五福壽惟仁者得垂蓮千嵗飲芳巵丁錄事之仕白髮叅軍赴任新歡聲喜氣滿城闉老成練事明三尺煙爨安居樂四民宴室香凝松入夢公庭訟簡棘生春寒儒共作斯文賀釋奠今秋已得人座上壽鄧明仲汗血權竒志已遒駸駸殆欲度驊騮可人玉樹丰姿秀與我金蘭氣味投一脉斯文知有永寸心天爵在能修祝君具慶年年好直着班衣到白頭閑居讀四將傳有感宋鼎中遷僅未亡奮然四傑擅鷹揚江東已幸開新主河朔終期復舊疆時相姦邪工沮撓中興事業竟凄凉至今凛凛有生氣三復遺編為感傷亢府判宅落成美哉輪奐照康莊盛事爭誇晝錦堂魏證枉教移帝殿姚崇何苦住僧房青雲路穩鶯遷好畫㦸門深燕寢香不特新居為可賀克家猶喜見諸郎覺和尚菴賞白蓮氷雪肌膚出淤泥伶俜寒影照漣漪曉風浮冷夢初醒夜月嬋娟清更宜未要露濃垂别淚先㸔水滑洗凝脂陶詩近體驚兒女大笑廬山逺法師壽鄧載之深喜安居託里仁獲從賓客賀佳辰眼前秀發班衣子堂上康寧白髮親和氣自應浮壽斚行年更為數靈椿直須釀取如澠酒剰醉梅花十月春郭某席間賦喔喔晨雞喚夢醒牕啣好月壁啣燈宦情嚼蠟淡無味世路登天吁可憎十載飄零都是客一廛寂寞靜于僧調羮事業無勞說深謝諸公愧不能察司陳知事次翁斫雲陳先生之子生遲不見斫雲翁嵇紹昻昻有父風設榻憲臺為上客揚旗詩壘作元戎讀書素負匡時志正已應多及物功今日朝廷用賢急早聞催赴大明宫和史儒首重九韻二首籬菊花開却為誰最憐不負九秋時興來惟用詩篇遣吟就喜將塵硯吹但有金英浮蟻醁從無玉斚捧蛾眉猶勝杜老傷流落謾憶茱萸賜一枝龍山故事始於誰歳歳登高定此時菊朶滿將頭上揷秋風從向鬢邊吹酒狂不管欹烏帽詩好還須讓白眉寂寞東籬兩寒蝶翩翩猶戀可憐枝餞蜀憲僉王元亨一柱西南儘力扶已教餘子愧非夫歸來衰絰終憂制豈料絲綸到倚廬疇昔憲綱曽整頓此行蜀道不﨑嶇春風驄馬經過處父老遥知識故吾餞曹侯之憲使任稅駕侯藩尚未遑已聞西憲促提綱眼前逕路從來濶度外功名不用忙麟鳯固知非搏擊豺狐未信敢跳踉旁人莫訝春風過凛凛威稜㸔肅將與學士劉希載二首時為採訪司至興元照人丰度絶纎埃黼黻皇猷得異才簡拔正為今日用巡行快覩使星來勝栽桃李清英滿力剗荆榛公道開願借飛仙一丸藥不憂弱水隔蓬萊向歆經術自淵源召入承明藉討論已為文盟執牛耳肯容晚學造龍門異時但慕聲名重此日能陪笑語温尊主庇民知有策更將諮訪答明恩和耶律奉使寄山木公詩韻兩公姓字徹穹蒼隨處棠隂蔽芾凉許國肺肝同皦日憂時鬢髮各微霜徳星共喜來京國太史應占聚古梁更有翰林同唱和鼎分文陣各堂堂上耶律左丞二首掃退隂霾日正中天心方責太平功臨軒遣使非常例為國披肝乃至忠萬里遼東驚鶴至一朝冀北見羣空豈容閑袖調元手黄閣還歸眷倚隆昨宵李郃候星躔此日軺車入漢川烏府舊曾稱鐵面鳳池到底是青氊霜髯憂國遽如此月眼看書尚瞭然六轡諮詢有餘暇錦囊定賦紀行篇送馬教授美解東歸學與時行不悖差况兼才器出名家太羮𤣥酒有真味璞玉渾金無㸃瑕一再話間官秩滿四千里外客程賖晚成看取文淵器莫對秋風重嘆嗟賀瓜爾佳副使弄璋二首忠靖公家世澤存况君積善更培根相承自合緜瓜瓞必復行㸔在子孫豈為中情憐絡秀已將英物許桓温北堂盼徹今初見肯避含飴哺育恩一念初萌病涉憂天教熊夢稱心求海中仙果原遲結掌上明珠豈暗投丹穴有雛還得鳳青渠留語果騎牛君以嗣故出錢為橋王青渠臨終以騎牛祝故及之君家湯餅初開局衮衮從今莫厭稠總判覩佛光于雞頭山次韻雞頭孤聳翠連空雌伏羣山獨讓雄須信地靈光有異定應人到意先通幽微更出三綱外真妄端生一念中懶我無由㸔竒特曉牕擁被月華東送趙君錫之秦州吏目十年為吏困無貲平昔操存便可知精悍不妨身短小笑談足了郡支持宗資主諾應多暇儀狄裁書且暫辭贈别一言君記取莫教人作腐儒嗤壽任壽之清逺堂中酒泛巵森森蘭玉照階除論年孰與諸任齒尚德優為一縣師芹藻漪漪春澤滿桑榆戀戀夕陽遲相望兩舍難趨賀謾遣書奴為致辭贈月軒日者胷中珠緯自分明月滿秋軒夜氣清靜處要將身體驗說時奚尚口縱横立爻演畫皆臻妙候色占年亦造精知我生辰宿南斗一詩何惜送行程送王茂先赴憲府選擢臨事剛明接物和眼中如子豈能多清流已許優充選公論方知久不磨疇昔稔聞仙注籍此行何異士登科離腸飲罷宜催發不用驪駒更緩歌挽任壽之前輩凋零嘆曉星可憐配月獨長庚梓州家世餘文獻華屋丘山隔死生年及耄期夫復憾葬從古禮足為榮緬懷清逺堂中像東望潸然欠一行餞楊同知任滿西歸道傍笳鼓記迎新又作長亭惜别人千里畏途成雅俗一言寒谷變陽春朝廷有意歸楊震父老無從借冦恂金印此行如斗大西還遥望使君塵寄張允濟憲史脫身府史簿書叢榮選西臺得鉅公立已立人施有漸讀書讀律用無窮高風舉翮孤騫逺何日掀髯一笑同莫惜橫霜案頭筆常題數字寄征鴻挽趙伯範亷副一門卿相自蟬聨攬轡君方志慨然忍見黃泉埋白璧不教清廟奏朱絃霜寒鴻雁行新斷日暮驊騮路莫前絮酒隻雞何處奠西風哀挽寄靈筵餞太子賓客王山木赴召三首龍飛天表廓羣隂小毖求賢正自今已分引年無仕志何勞新貴有知音詢諮國論須黃髮報答君恩亦素心休沐歸來宴私第免教手足歎商參星馳使傳趣曹裝北望觚稜上帝鄉豈為一身辭溽暑要令萬國變清凉燮和正藉鹽梅味事業終歸汗簡香疎傅功成還有疏桑榆留取日餘光大經大法幾能知愚陋從公稍質疑餘事從旁觀灑翰有時乗間獲聞詩寵恩固與人同喜别恨情知我獨私此去藥欄誰枉顧碧雲凝睇暮秋時和竹軒道錄見贈綆短何由望汲深清詩為我滌塵襟雖披風袂投仙藉時吐天葩照士林偶爾笑談成撫掌淡然𤣥黙久忘心南褒自謂棲遲客誰識希聲是太音冬菊開於盛寒簡仲章益友陳跡東籬一片荒歳寒驚喜見鮮黃叢依徑竹分將翠蘂鬭江梅讓與香只道卓為霜下傑豈知更有雪中芳陶公已逺名尤著可是兹花節愈剛次竹軒道錄桃接梅韻二首曽是𤣥都舊日栽半生夢斷却為梅蒸霞方艷依稀帶傲雪清姿取次開佳實要期和鼎鼐瘦株安忍伐條枚老仙月下頻吟繞豈為升章步斗魁奪胎換骨雪中開尚有妖紅淺暈腮芳樹合供和靖繞仙根原自武陵來風過幽户傳香信月挂橫枝作鏡臺褒拂好花須好語主人况是足清才寄挽李宅馬氏賢母半生自號未亡人素節高風孰與鄰教子不將恩掩義推財能以富周貧風霜共嘆庭萱悴雨露空餘宰木春挺挺諸郎如玉立向來懿範更光新節婦劉氏挽章二首栢舟高表照城闉素節孤風久更新雅羨松筠堅晚歳陋嗤桃李再陽春敬姜慟哭深知禮謝藴清言自絶塵今日九原同穴處我知應不愧良人夫天不幸早為憂白璧持身反見尤簪服從權期取信琴書適意復何求可憐桂逐秋風殞又嘆萱隨夜雨休留在蘭孫一芽好莫將天道付悠悠次韻答竹軒道錄見寄二首其一褒莊即事稻梁饒足水邊莊竹樹因依野外堂詩老歸來尤鄭重鄰翁歡慰絶厖凉犬能識主還相迓鳥解知名祗自揚久矣城居厭塵土解纓欲擬濯滄浪其二冬日即事消息應從日下來姓名知己徹丹臺門前朝士爭投刺爐畔麻衣但畫灰白髮莫言疎世味黃冠元自隱珍才閑中袖手搜佳句野馬誰知本是埃九月八日賦二種芙蓉二首其一紅芙蓉豐肌弱骨與秋宜宿酒酣來不自持豈為嚴霜成槁質要慿初日發妍姿燕姬入畫猶嫌陋蜀錦團窠未足竒獨對芳叢寄幽興子高真是遇仙時其二轉觀芙蓉露凉風冷見温柔誰挽春還九月秋午醉未醒全帶艷晨粧初罷尚含羞未甘白紵居寒素也着緋衣入品流若信牡丹南面貴此花應是合封侯贈杜亷訪豸冠諤諤盡英賢時論尤推尺五天身正豈容姦在側法行能自内為先迅雷掩耳嗟何及明月當頭照不偏正際元貞求治日可能持祿但圖全錄事司廨宇新成不費公帑不斂民眼中輪奐一時新編氓亦喜司存定胥吏何憂轉徙頻戒石有銘槐共古公庭無訟草留春從今宴坐觀心處餘庇須教溥及人賀楊世英治中新除兩省聲華著望郎歸來未許便韜藏青天寳墨下新寵白日錦衣行故鄉曽捋虎鬚非苟合得伸驥足更奚量四書儘有工夫在仕學從兹道愈光送李道錄德業清高體性純𤣥門三載博施仁祖庭稔聽聲名舊漢郡欣瞻氣宇新識量不同凡俗客襟懷還是謫仙人明朝跨鶴乗風去日月壺中且自珍壽李推官愛重寒儒禮蔑加情知孔李是通家精金百鍊元存性美玉重磨本不瑕眼底雲仍天有報樽中風味日無涯期君壽考如松茂老幹蒼髯閱歳華餞王某入省椽晉産英竒見若人紫髯郁郁照青春脂韋豈羨常情悦骨鯁須教正論伸不負相君平日顧坐令田賦此時均回轅早慰梁民望一簣誰能繼後塵餞齊節使入蜀去歳如京乞水衡歸來遷秩便專城自甘進取輸英妙天遣功名屬老成坐看蠶叢皆樂土肯教烏喙毒窮氓漢中遺愛人猶說更要西風送好聲餞王同知美解東歸眼中㸔熟幾楸枰出貳侯邦信老成悃幅無華忘吏巧設施有道合人情歸心梓里胡為切彈指𤓰期已及更筋力未衰時任舊且須黽勉助升平和李之晦書齋兀兀度朝曛載酒相過賴有君自為凡禽難比鳳更慙蕕草敢同薰七年旱渇逢甘雨萬里風清破宿雲芝宇瞻依慰平昔情知所見勝於聞贈康案牘之任年來案牘閲人多一見知君氣宇和久向蘭臺推俊爽且教蓮幕暫經過簿書事了無煩冗官長心閑得嘯歌休嘆功名尚卑薄為山覆簣即嵯峨臘月八日王縣尹壽時監修文廟遺愛曽歌令尹賢未容投劾徑歸田泮宫宣力猶如已吾道諸公肯結緣晚景桑榆春尚好嵗寒松栢老彌堅吉人為善天昌後兩地雲仍慶壽筵贈張亷訪回漢中時張見過騶從傳呼陋巷中忽驚御史駐青驄便教蔀屋光相照始信韋編道不窮感激肝腸明皦日笑談牙頰潄清風今朝攬轡人應去漫刺何緣再一通色目亷訪與張亷訪見過繡衣將指到梁庭丰采峩峩見典刑白簡久嚴晨案事青燈不廢夜傳經忽聞聨轡來卿月深愧衡門聚德星吾道自今増九鼎詩奴聊為表中扃次張亷訪見寄事君無意復還鄉此日明堂要棟梁鸞鳳豈能稱鷙鳥蟾蜍安敢望飛黃人欣霽月三秋滿目送歸雲萬里長更有新詩壓元白章程未可議張蒼題開成路晚景亭西邸葭莩意自闌不求榮利衆稱難靈椿丹桂皆天理古栢蒼松閲歳寒蔗本有甘因倒啖芸編無蠧為長㸔未能杖屨相從樂遥為先生賦考槃與蒙古教授馬良卿澶淵名族伏波孫時務通明氣質温兄弟白眉推秀傑公卿青眼合量論冷官隨分三年滿大器成名異日存未得相從見顔色寄詩徵取友人言雨中走筆書四集雲容鐵騎來俄然空際黶煤炱滂沱幾陣江湖合霹靂一聲天地開生意豈惟回草木煩襟亦為洗塵埃化工神妙雖難測也要調元得上才宋錄判仁卿祈雨有感潔齋徒步陟雲岑一作穿雲徒步陟﨑嶔閔雨知君用意深旱挹靈泉清似玉澤均農畆勝於金他年定卜為霖手此日端能簡帝心禾秀秧齊成樂歳民将歌舞替呻吟次王仲禮韻仲禮生朝大雪次日詩來荅之惠我新詩見至情風簷披讀眼増明祗知大雪袁安卧誰料長庚李白生先施固慙今日報後凋元有嵗寒盟知君賸有如川酒定為來遲舉罸觥贈王秀才歸葬二親秋風兩鬢已華顛兵後鄉書涕泫然桑梓歸期寒復暑松楸寸念日如年滯留莫訝來何暮拜掃誰知夢獨先親舊此行成㑹語巴渝江上月應圓耶律總管自西蜀還漢中儒館丹青氣象雄諸生咸詠浴沂風永懷昔日成功最如見賢侯在眼中未問甘棠思召伯且先泮水頌僖公舊轅蜀道重趨謁滿慰塵心喜曷窮賀何提領開惠民局岐黃至蓺久精研霄漢飛騰正妙年深羨一朝膺寵渥豈知三世得真傳民沾實惠仁應博親及光榮孝克全從此大施醫國手隂功陽報理昭然代題賀延安李氏八十二卷皇元七葉太平民八秩康寧見在身神理要教全五福妙齡稔說孝雙親曽刲臂巳父疾又䑛母目二載復明桑榆門巷偏留景蘭玉階庭更可人遥想鄜延萬家邑誰如李氏一堂春閑居叢稿卷四
