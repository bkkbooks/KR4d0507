body:
  text: 間居叢稿卷二十元蒲道源撰序節婦郭氏詩序生民以來原於夫婦故易之上經首乾坤下經首咸恆詩以關雎為正始人倫之重莫先於此世降俗薄富貴貧賤死生患難夫婦不克終者多矣典籍所載共姜守義敬姜秉禮下逮史傳暨劉向所録所以維持世教者讀之使人歎息不已洪惟國家激勸節義屢形詔㫖俗歸於厚史館餘暇有以節婦詩卷求題詠者歲不下十數間或厭之然以其係風化所關未嘗不勉應其請今蜀之成都縣曰雙流里人白應元妻郭氏年二十五而夫應元亡一息才五朞郭氏貞靜以植志劬勞以撫孤家庭肅穆如夫之在也舅姑怡愈忘子之戚也强暴莫能奪其操巧諷莫能易其心始終不渝皎若玊雪舅姑各八秩以天年終葬祭如禮年踰五十族黨信其義鄉人稱其德長社者率鄉之父老狀列其行事聞於有司有司上之蜀省得依令式以表焉其孤子申不遠數千里來求門旌之字於今之翰林承㫖唯齊劉公且請序其事於豫曰某不幸早失所怙今而粗立皆母氏能安其室育養教誨之力也恩無以報敢以其閨門踐履之實求當世聞人筆之詩文庶可以光於時垂於後僕竊謂古之貞烈其事固可傳亦幸遇當代名公之作者顧余曷敢當然以其母之節子之孝有助於綱常而不忍辭也為序於篇端云送趙君錫赴秦州幕序余憶兒童時與友人趙君君錫通家往還君錫幼頴悟屬對應聲滿座稱善既而又以詞賦有聲流輩推讓莫敢與角貨雖竒然時方不售年及强仕翰林學士暢公純甫以憲僉蒞漢中愛其才拔為府史以年勞被省檄遷德順州幕職延祐二年余自京師以代祀嶽瀆馳馹過家時君亦以秩滿歸漢中相見握手道舊而别今年春余由國學得告歸不幸丁艱屢見君其老態益新貧則無異於昔嘗慨史傳中士多不遇於時乃今於君錫見之君錫齒方壯工文藝時從仕者惟以吏進以是齟齬今設科取士之法既行則君錫老矣不肯俯首就場屋與少年者較一日之長其自德順歸間已數年不復有仕進意充然無少戚容真無愧古人之不遇者日余為翰林屬翰長有知君者力欲奏用以去位不果噫非命歟今復有秦幕之招貧與老㑹欲不行復不能不行且徵余言以憂戚辭不可余謂君平日讀書其於贊助州政療已民瘼奚待余言直書其所抱負出處以告夫未知君者慎無以碌碌州從事遇焉斯可矣雲溪草堂序古之人無時無處而不學亦何暇居安之求哉然學須靜也苟鄰於闤闠塵囂之間則視蔽而聽壅心煩而慮亂亦無以理其業矣陳君舜叟陜士之翹楚者客遊江漢持關中諸老書來訪余愛其容止舒徐辭令溫雅及一再見作而曰某不佞竊有志於學出陜城之西不數百舉武有田槖水之上構屋以為讀書之所旦暮之變其氣藹然目之曰雲溪草堂堂之前後左右樹蘭於畹種梅於岡菊以徑竹以軒取其草木之幽香隱德者而又瀕溪有觀瀾之石積土為舒嘯之臺研究之隙周行而登覽焉大河經其北太華中條雄峙環擁其翠可挹實天施地設之偉觀非敢以自誇詡也請為序引得以開發焉豫謂山水之樂仁智者有以取浴沂之樂言志者所不及蓋非以事遊觀而資佚樂也抑以察夫天理之流行而外物不可移奪也今舜叟雲溪之構動息有處節宣以時於以潛心焉於以放懷焉其視闤闠塵囂不可與居者則其所學或由是以進益與若夫天理之流行而外物不可移奪者將有得矣於是乎書義士李德鄰序引周禮大司徒以六德六行六藝教萬民所謂德者行道有得於己之謂行則驗諸行事之實而藝又有餘力而後學者也蓋古之秀民皆出於農必教之以是三物其成者以賔興之禮薦而用之故詩曰攸介攸止蒸我髦士夫德則尚矣藝則居其末故觀人之法于六行尤切焉謂孝友睦姻任恤乃日用當行之理苟於是而或悖則有刑以糾之此古昔人材之盛後世所不能及然天理民彛終不可得而泯者奉元之屬縣曰臨潼鄉曰好義李姓德鄰其名者乃今見之其為人也亦殆庶乎母王氏年踰八秩甘㫖􅎵瀡之養定省溫清之節無少廢缺其終也廬墓毁瘠哀戚稱其服宗族鄉黨目以孝弟人無間言歲饑散所蓄粟麥千二百斛折貸劵二千五百餘緡周恤之多有不可計里人上其事有司核其實旌門曰義士既又創驪山書院為屋若干楹延師以誨凡弟子之從學者割田二頃給其廩餼由是觀之所謂六行者顧不彰彰明甚矣乎今詔條設取士之科以行實為首則君為無愧矣惜猶拘於時文之末習弗得登仕版以展其藴推其有諸己者以及於人然天與我之良貴又豈以用舍為輕重哉余於君蓋未嘗識奉元周君文振以府史調興元見余極口稱道君之善丐序引欲求當世諸公之作贊詠其美越二歲徵其言信始克為之且以明夫古之士出於農而必考其實行云題牛參政秋日桃花詩序物有反常而當論其妖祥者有不必論其妖祥者蓋視其多寡輕重之差耳如隕霜不殺草李梅實聖人筆之於春秋是論其妖祥者及夫一物之少異不必論耳今參政牛公所賦秋日桃花是也夫桃之為物其始華見紀於中春之候其色夭夭其葉蓁蓁其實蕡然見詠於詩人之辭此其常也若乃嚴霜肅殺之秋或一二見於搖落之株其造物機緘呈露發泄雖不可詰猶老人之兒齒復生烏可人人而求之哉觀其如降謫之仙姝流離之姬妾使人疑似於武林之遊倣佛乎天台之遇政可供樽爼間一笑云耳蓋公於寓舍得此逰戲翰墨於詩其清新艷麗正如昔人論宋廣平鐡石肝腸而吐婉媚之詞者命余序之余謂天下之事有正有權又非特若此一草一木而已顧處之何如耳并以此書於篇端農桑輯要序虞書六府一乃穀洪範八政首曰食蓋生民以為天有國之所先務不可一日而後也宣尼語冉有以富之而教言上之人使人勤力田畝是以仰事俯育無至饑寒然後暇治禮義風化可行由此觀之誠乃王道之始三代之盛曷嘗不以養民為致治之本與皇元建極神聖相承一以仁覆天下聖上欽明無逸尤知稼穡之艱以農桑委大司農丁寧勉飭猶恐行之未至爰命宰執擇能吏楷正農書溥覃率土教以種養之方期於家給人足與堯舜命后稷以播植其揆一也主者頒於郡縣城固達嚕噶齊赫嚕公時領農事謂同署曰此聖天子惠養元元之善政天日煥然使民家有是書則耕者盡地利蠶者富繭絲不待春秋巡督而勸課之效已具於目前矣豈非事簡而功著者乎縣尹康公簿尉文竇二宰共成其志資以俸金鳩工鏤梓不踰月而告畢僕忝聞議論之餘輒序於後作牧之良有司皆以誕敷帝德左右斯民為念則於萬世太平之治未為無小補云薛景仲梅坡詩序夫大鈞之播物貴而為人微而草木其間美惡未始有異也故屈子之蘭周子之蓮皆以比君子良有以哉薛君景仲世本儒素隱老子法中天師留國公甚愛重之書梅坡二大字嘉寵其號蓋梅之為物儕蘭蓮之氣味友松柏之歲寒西湖之詩以咀其華商巖之羔以取其實踈影暗香之妙語有非凡草木之所可承當者今景仲清標凛若道氣藹然留國贈之非溢美景仲受之無慙德當其風月之夕霜雪之辰曵杖梅坡集古人咏梅之作擇其尤者譜其聲而歌之其於神仙何逺之有景仲以為如何梅坡手軸諸士夫多係以詩且求豫文俾題其首送學正王秉彜詩序歐陽公謂胡先生門人皆循循雅飭其言談舉止遇之不問可知為先生弟子識者以為知言而程子亦云安定之門人往往知稽古愛民矣則於為政也何有夫胡先生之誨人固為有法而為其弟子者亦可謂善學矣矩庵先生教授關中士夫翕然從之其名德雅望著於朝端播於當世而愈自謙抑退然如不勝衣見之者無不心服興元儒學正王君秉彜佐學職於兹三年矣恭恪巽順形於辭色始終如一詩所謂溫溫恭人惟德之基者余因以異其為人及詢之乃出矩庵之門信矩庵之教無愧於胡先生而秉彜亦有肖於胡之門人也雖然余猶有望焉夫秉彜之發於門者既已如此而存諸中者余固不敢以蠡測蓋學之為道必表裏交修本末備舉不可偏廢則願以歐程之言合而觀之若夫循循雅飭不問可知者秉彜之所已能學問思辨以為稽古之實舉而措之愛民從政使如有源之泉有根之木流長而葉茂則庶乎得矩庵之全體矣泰定丙寅七月初吉告豫有奉元之行求以言贈書此遺之以待他日之徵也遂以為餞章之序云送䝉古楊天立序士之所以得行於天下者惟忠信篤敬而已蓋能盡己之心以實無僞厚而不薄恭而有禮以此接物以此處事何適而不可哉聖門教人亦本於是而已舍此則必為詡詡强笑語沾沾而取容初未必不悅而合也久則真態呈露不復可掩人鄙賤之不齒於正人端士之流矣天立楊君以國語字學二其教官於漢中五年於兹無穀祿可守不見其有戚戚容路侯委以事不亟不徐辦集得冝所至無一人怨之形於言貌非忠信篤敬能如是乎其遠大器業從可卜矣一日辭歸以贈言例為請僕謂如君所操守尚何以言為然不欲虛其請姑以其所能者為贈願益加勉焉又以告夫未識君者試以斯言驗之然後知余之不妄許云送總尹王信夫東歸序并詩古之循吏至今首龔黃及觀其傳初不求赫赫名但民便安其政而已興元總尹王君信夫下車之始首來訪余言發軔於國子生以余嘗為國子博士雖前後不相值執禮如師生久而觀其為人不立崖岸不設城府一於誠而無他其治民也如良醫之療貧子之疾惟審諦其脉證弗衒鬻其藥劑疾已無所求可謂古之純篤君子今之循良之吏者歟同僚有掣肘齟齬侯不與校旁人視若不滿意侯曰我若爭胥吏必受困但和以濟吾事可也歲旱侯視堰水湍駛不能措手乃相傍地開渠以殺其怒有一役者於土空避役適土崩不救遂藉此欲搖動侯卒無所得至今修堰因所開故道以成功他類此不可枚舉及各終更彼則氣焰銷鑠手足呈露或遵指斥隱忍不敢喘侯則淡然如平日百姓皆曰吾之父母也其古之龔黃亞匹歟余素不喜溢美諛辭必試而後稱今稱也不於侯其誰歸遂詩而序之下車首相訪執禮甚卑謙布政國恩渥持身家法嚴細民歌愷悌黠吏服清亷掣肘雖遭忌公心不避嫌方安千里寄已作四年淹舟送歸程遠杯兼别恨添交遊分去住踪跡異飛潛矯首天南北書來慰我瞻題憲使李行簡樂閒堂詩卷後序并詩憲使李公行簡與余有鄉曲之雅故余知公為深始公起身即踐清要繼為侯牧理財賦其善政良算無愧古人逮升憲使則能鎮靜南服未及引年一旦謝仕而歸杜門却掃以蜀為樂土遂定居為終焉計去城一舍而近買田營墅遊息其間自號樂閒天歷戊辰遭時弗靖蜀帥張兵威脅衆令附已凡浮沉宦海者多為詿誤獨公淡然與世相忘已久無􅊏毫染汙此真樂閒之驗也公又有佳子弟養志之餘蒔花植竹築亭引流以廣其樂閒之趣則斯樂斯閒天實相之公得專之交舊又信而紀述之以成巨軸命其子不逺千里寄示意欲尋樂閒之盟於我可無言以與君同好也哉獨恨未得陪杖屨以涉樂閒之境姑賦其中所有四詠以供杯酒間掀髯一笑云九折流杯池九折我流觴九折彼叱馭勞佚雖不同亦各有天趣清真王㑹稽命客賦詩句不如醉忘歸天下何思慮翠香亭幽塘首夏時田田叠新翠不用薰水沉清香自入鼻高辭鵷鷺行來看龜魚戲雖知子非我其樂初無異晚香亭霜風正搖落金質緑為裳繞籬三嗅之掇英泛我觴主人與此花歲晚節愈昌陶翁已千載尚友不相望曲肱亭聖師樂何事富貴浮雲同君今解組歸寤寐思所從恍然若有得卧聽竹窗風狗苟蠅營者知誰是夢中題興元路長桑嘉依家藏樵枯子所畫羅漢卷浮屠氏之阿羅漢蓋學佛而未者故其降龍伏虎浮杯擲錫入定觀想積精之至皆得佛之粗猶孔門之有七十子余寓京時於祕省得觀唐僧貫休所畫十六相詭異殊甚今興元路侯牧之長宣差公事佛甚謹僧樵枯子遂作手卷以獻之雖非貫休比亦得其倣佛公俾余題其左豫於浮屠書罕讀不盡究其說為下一轉語曰過去未來非我知開卷觀之即見在主人彈指起敬心便是應真無挂礙既題復歸於公使藏之李録事祈雨有感詩序誠者真實無妄之謂非有甚高難行之事而人鮮能之興元録事參軍李從仕蒞職於兹其應變捷給承奉委曲皆所長至於不督責而政行不話言而民信拙於表襮守其慤實蓋質之近乎誠者然也元統乙亥夏五月旱氣藴隆吁嗟求者未臻感應豐凶之决近在旬日君聞南山之陽幾及絶頂有靈泉焉於是齊素囚首徒步陟其所而懇於神乞升勺水貯於罌迎歸城中安置道宇寢食不復歸夙夜為百姓請命精誠之至翼日雨至始則霡霂既而滂沛越三日逺邇饒洽稻之秧者可插禾之槁者復興種之播者悉出土之埆者可耕化饑饉成飽飫改愁嘆為歡娛上分侯牧之憂下慰黎元之望四民鼓舞美君之功雖充滿勃鬱於心不能形容發揚於口假能詩之士以贊君之萬一仍請豫為序引余謂至誠可以通神明貫金石全體於誠者固不得而見至於一事之誠而能動者苟非君之篤實其孰能之可不謂誠乎衆曰然遂以此序書於篇端云洋州太守周子仁送行詩序日余伏田里教誨童稚雖無干仕祿意然天下凡名公巨儒必問其家世及行已大方與所著述文章於人於是知金源末庭試為首冠王公百一者我世祖隆盛時置諸翰林為學士承旨鴻文大冊多出其手厥後其子字子維者亦繼直禁林父子輝光焜耀相照余以皇慶癸丑忝被驛召為翰林末屬去公時已二十餘年得觀所謂視草者於是公父子聯珠合璧之文皆在焉得寓於目所恨不獲望見眉宇侍執几杖延祐庚申余以母老得告歸繼丁重哀閒居十餘年不復出一旦於興元總尹王君信夫座間始見武康守周君子仁觀其言動容止有故家流風餘韵心竊異之未暇詢焉君他日詣府計事執禮來訪酒一再行遂傾底藴道宿昔然後知王公承㫖乃其先世之姻婭子維則周出也自洋之士夫來訪者語及君咸曰君非獨此而其守身清慎撫民愷悌天性使然余益歎服焉屢㑹情愈密忽告曰某瓜期已迫將歸矣可無言以相贈歸裝雖輕倘獲不啻為九鼎大吕之重矣蓋余自識君所與談絶無塵俗利欲語非論京師衣冠之世族即商確文章行實之源委或繼以憂民困窮而自歎其莫之能恤也嘗謂若人譬猶太廟之琴瑟雖不作而拂拭其弦徽亦可以適人意如三代之鼎彛雖不用而辨别其欵識猶可以慰人心君之歸併挈以往寧不使人惜之而悵然於懷耶諸士夫咸有奉餞之作既成以余冝題其首秋江競渡詩序秋水時至百川灌河雲濤際天望而可駭於斯時也非决性命而叨聲利者孰肯寄身於一葉之危以僥幸於萬一哉庸詎知不有超世獨立之士憫笑於其旁耶今觀秋江競渡橫幅雖畫師所作意未必出此然感於豫心者不能自已河東陳君某喜讀書恬於勢利以貧而仕老為興元總幕職不汲汲求進蓋非競渡輩之伍以此卷求題評謾書數語以歸當公餘無事明􅙘淨几披玩紬繹想亦有所合於其心也夫閒居叢稿卷二十
