body:
  text: 閑居叢稿卷三元蒲道源撰五言律詩壽趙經厯崧洛居中土人才自間生星躔動芒角金氣與高明芹泮規模好蓮帷議論清黑頭長健在洗眼望雲程贈韓知事近喜紅蓮幕人才又一新青春能奮達素節豈緇磷自恨摳趨緩多慙邂逅頻詩成供莞爾聊欲話情真餞洋州長官監郡初交篆洋人遽索詩以兹無厭斁知昔有施為喬木百年在甘棠再世思青雲前步濶穏駕未為遲將至中山中山何處是隱隱望孤城逺靄青林暗斜陽白塔明韓蘇名不朽遼宋恨應平策馬長途晚風沙老客情題禇鑑先明逺亭危亭擇竒勝登賞寄遐觀隱几月華入出門天宇寛面墻嗟壅塞坐井笑欺謾表裏須同致休成兩様㸔餞禇鑑先臨行方識面未暇細論心但見求詩切從知好徳深宦㳺應已久鄉思自難禁莫把牛腰卷歸裝當槖金偶書入樹秋風早驚心節序遷晚雲兼去鶴凉雨靜鳴蟬得句因新意耽書是宿緣平生愛冲澹何事亦華顛閏七月十五夜月玉宇明如洗銀盤爛不收今年非閏月此夜即中秋名實難相副隂晴豈豫謀及兹清景好且為一樽酬中秋雨次前韻掛鏡光何在懸麻雨未收不成千里共虚度一年秋剪紙無仙術藏樽有婦謀却將前日句飲罷自賡酬乾州學正牟中行訪叔于蜀勤子闖幽石欣然識面初蜀天留季父秦地敢寧居正想成歡際應忘厯險餘明年歸有約還為赴新除月蝕詩次晏耕叟教授韻滿盈不可恃消鑠暫成昏人心一時懼天眼萬古存妖蟇尚逋劍餓虎方守閽言高無乃罪括囊取諸坤不寐不寐情尤耿聞更夜向深撫牀驚鼠嚙欹枕厭蛩吟擾擾無窮事悠悠未了心華胥真樂國合眼試追尋挽鳳翔馬氏賢母馬嘗出粟濟大德荒明德服大練文淵生女賢至今雖已逺末裔尚依然子訓嚴逾愛閨儀後若先嵗荒蒙惠者洒淚遍新阡洋州儒學正劉敏道得代歸設科時未暇學校餼羊存亦以循資例聊為入仕門羨君由此進求贈尚奚言勿以筌蹄㸔頻將舊業温題人慶八十詩卷身是七朝民年登八袠春伴行鳩杖瘦介壽蟻醅新祿養孫能逮家居志得伸遥持玉堂詠歸詫晉州人題國子生張行修歸養卷不待陽城告歸心勇决餘祗縁親向老豈為士懷居此是真知學應勝謾讀書朂哉儒事業天報定無虚送拜特穆爾之天台治中西域雄豪逺南州惠愛多繭絲非雅志襦袴聽新歌仙境閑追訪民情自浹和會因龎驥展回轡接朝珂和秋谷平章上都寄示韻公論何嘗冺浮言枉自侵明公之出處善類以升沈導日功非淺回天力尚任於昭有神鑑偏燭老臣心獨樂今司馬忠誠世所推帝心元簡在史事實優為此自隂存數餘非我敢知願公攄素志黽勉荅明時晉寧房秀才下第近閲賓興士多君氣質淳鷁飛雖暫退蠖屈定求伸勿羨囊中穎還輕席上珍三年姑少待鳴即看驚人題漢州多勝亭金雁亭邊景難將一字褒江山雖衆美人境亦相高解紱栽籬菊開樽擷澗毛令人生逺思聲利等秋毫題王仲寛餘慶堂卷諼草開偏耐蘭芽植已稠安榮欣此日積累繼前修惠迪宜逢吉勤耕乃有秋堂名非溢美微意要深求送滎澤張縣令人說張明府胷襟自八牕脱身曹史局試手子男邦樂易民情悅公亷物議降㑹聞滎澤政前後號無雙題陜省都事薛君英好古軒卷聖賢去已逺義理存諸言篤信有斯人簡册開明軒食寐或忘廢朝夕恒討論好而至於樂踐履尤可尊題莊氏見山樓白眼憎俗物紅塵逺市廛高居得如此雅興自悠然翠挹慿欄外吟成拄笏邊相看兩無斁誰似主賓賢題劉孝子卷生喪明業隂陽失母有父人說劉君孝供需只五行可憐書月蝕何害性天明血淚既哀死甘腴惟養生清時公論在門表足光榮送劉宰之官温縣昔日亷能簿曽聞去後思懸知温縣政不負冷官師製錦心優解鳴琴化易施民安即循吏何用更求竒送胥秀才赴雲南教授詔下開文治君歸得教官讀書酬雅志旋斾詫榮觀勿以居夷陋當思稱職難方知誤身者初不在儒冠送人赴教官逸姓氏學職無卑小能𢎞亦在人升高須自下温故可知新勿慕囊中穎還輕席上珍他時看成就一振舊衣塵送劉彦讓山北憲史俗吏固不可腐儒良足嗤明經先植本讀律貴知時還自士林秀陞從憲府宜更將清慎字座右作箴規送人之憲史逸姓氏讀書期有用出仕愧無名擢自儒林秀陞陪憲府英持身先玉潔用法貴衡平萬里雲霄路權輿在此行山西宣慰司扎巴經厯辭御史不就顔色未頗識聲華今藹聞栢臺辭要職蓮幕賛竒勲惠及山西道才空冀北羣更兼忠義節仰答聖明君題江南醫者王道人卷荆國來芳裔草廬為序文清修真不忝許可固宜云玉筯臻神妙金丹脫垢氛地行仙亦樂何必躡青雲題節婦賈氏傳刲股已親病髧髦垂我儀九原如可作百歳以為期皦日言猶在秋霜節不虧子成門有表天道豈無知九月十八日黄菊始開時且禁釀謾成示德衡弟苒苒秋事杪幽叢花始黄直須凋衆卉纔許見孤芳重露洗金質嚴風吹綠裳陶翁如有酒何日不重陽走筆與德衡弟茗椀忘言處相㸔俱白頭情知天下樂各向意中求鳥語彼能解花開春自謀寓形霄壤内俯仰亦何憂陽月十日旦起示薛生深得閑中趣何求身外名晨香生凈想午茗滌餘酲習氣書難捨風光句偶成天公於我厚自用豈宜輕食苦蕎糕穀中偏早熟濟歉未渠厭農舍勤相饋盤食得共霑羊肝堪比色蜂蜜已輸甜苦盡甘來語於兹亦可占偶記少時小年能綴文詩彼美誰歟子嶄然早見稱綴文當世有惟汝小年能稚齒為星鳳清姿秀玉氷聨章成脉絡緝句合規繩穎悟過長吉推揚自少陵可憐東魯客頭白短檠燈閑居叢稿卷三
