body:
  text: 間居叢稿卷五元蒲道源撰七言律詩與蒙古經歷幕中郁有古風還畫諾須教刺史間但得胸襟清似水何憂簿領疊如山四書至味沉潛外三歎遺音雅淡間大器晚成天意在不勞驚訝鬢毛斑與金州唐節使少年交結盡名流氣壓元龍百尺樓曽出竒謀清朔漠更教遺愛及西州百篇囊有珠璣積一話胸無芥蒂留早晚漢城催報政定將興學占先籌餞張南發兵後求姪孫淚灑鴒原惟一息魂消鳯嶺更諸孫崑山焚玉劫灰冷合浦還珠天理存跋涉可能嗟嵗暮團欒猶及見春溫當途果有成人美愛助須教薄俗敦賀扈宰樂山亭面對終南第一亭光芒時動少微星心間老去稀華髮眼淨朝來望翠屛拄笏雅知多爽氣移文何用託山靈欲參靜壽無言答萬古相看只麼青晉卿參軍美解悃幅無華語最真慈祥融作滿城春官期已代寧堪客鄉思難裁正為親秦嶺雲寒凝别恨鄜州月滿望歸人劇談曽美茲風土傾蓋他年定有因送謝書吏入察院年來覿面記凡三傾寫今回得細談吏習豈容甘窘束聖經似欲苦竒探置身清要期無負著迹廉能自不慙擬託梅花泥行色驛胥門外報征驂與張彥雄典史簿領生平已白頭漫漫宦海嘆沉浮久拚袖手間中過未肯馳心分外求自昔事人惟直道祗今起廢得賢侯不虧公賦舒民力贊畫須看第一籌白鬚一莖戲示德衡世間涅白成緇易髭鬢還能黑變皤萬事塵埃常作惱一莖霜雪總嫌多倩人欵鑷真堪笑顧我耽吟已被魔五五青春猶見此不知衰老更如何和雲南張參政韻一泓止水湛天君妍醜須教物自分明月照開蠻徼地清風吹破瘴江雲絲綸方重當今選竹帛終垂異日勳擬藉墨卿修刺謁自慙庸陋豈能文盤盤襟量見夫君涇渭清渾次第分道德餘光禆日月才名晚節際風雲救時雅負姚崇志奉使曽竒陸賈勳會看德星明絶徼不妨清夜候天文雖居畎畝不忘君行止難將一語分貧陋自甘門挂席明光誰奏賦凌雲宦遊海內寧容迹翰墨場中擬䇿勳函丈今朝接餘論我知天未喪斯文同知禱雨殊應去冬新歲旱堪憂賢倅精誠力禱求設次致齋先潔己出郊徒步為迎湫一犁甘澤應無負萬頃來牟看有秋老弱免為溝壑慮定將何物報吾侯麥針塊底渴春膏旱暵經時土不毛致此精神何愧怍沛然甘澍解焦勞寸心巳自孚天意一飽端能及我曹欲贊賢侯霖雨手賦詩自笑乏風騷石節使漢中改葬二親子平情事未能忘得告歸來辦斂藏問具直須如古制興哀猶得似初喪便教閣雨深知孝不待移辰始克襄明日宦程又回首聲詩聊為發幽光與徐伯𢎞廉使柏臺蘭省見清規廉問西來未及期憲府宏綱方日舉秋官召節已星馳寸心天地殊無愧千載風雲自有時山澤癯儒雖乏用尚能歌咏得賢詩身退明時重挽留肯將富貴自為謀才名應是世間傑心志當先天下憂雕鶚擊強猶易見鳯麟呈瑞更難求此行台斗終須踐海內沉疴庶有瘳與郝僉事人物當今比數中故家喬木逈難同釋寃正得真卿雨疾惡方驚伯厚風忠義至誠知不負文章餘事亦能工此行足慰斯民望但惜匆匆馬首東小齋容膝為誰開賸喜分司使者來此日寵光生白屋他年盛事記烏臺清風亹亹聞餘論霽月溶溶絶點埃甚欲搜枯伸謝臆斐然成句不知裁仲章分送雙鴨以詩為謝飼雛分食顧鴟盤黑白成花見羽翰作對恍疑王令舄能言新出陸家闌穿籬正恐比鄰惱蒸瓠寧供好客餐思我且寬庖宰限階前短足任蹣跚次耶律奉使鎮南樓詩韻雄視坤維有此樓恍疑八表繼神遊山連秦蜀相鄰際水接襄樊不盡頭隂闔陽開增偉觀月明風冷怯清秋百年豪傑登臨處詩興飄飄隘九州壽西軒王先生七十當代聲名重泰山天教後學見衣冠老來已向從心悟間裡何憂致仕難松柏交隂同種德子孫承候數傳安一杯滿為先生壽宗主文盟閲歲寒金州王節使惠茶王因論鹽法至府一緘雲翰識謙和紫餅相兼厚意多惠我喜從金郡牧報辭愧乏玉川歌風生曉鼎清詩興日永晴忩戰睡魔豈止吾儕得真况更期良法論鹹鹺趙參政寄墨子墨客卿新見歸尚書賢相舊曽依人間鈞寵憐寒陋天上台光接少微九鼎鴻毛真借重一圭玄玉爛生輝情知造物留椽筆勳業猶能為發揮壽山木王國賓時總尹興元早擅雄文直禁林晚年隨處種棠隂一言恕得聖賢印萬物生同天地心華髮元龜惟舊德紫泥丹詔聼新音道山日月春長在且為梅花滿意斟與曹總管魯齋授受得精微已際風雲見發揮平昔功夫該體用只今事業信光暉吏民與我傾心久人物如公屈指稀前日泮宫聆一話情知吾道有依歸餞雷豫鼎湖龍去已踰年聖德神功付史編四海遺文須紀録一時妙選及英賢才華合起明光草聲價曽依幕府蓮東閣官梅春正好肯稽王事少留連送金州宣差當代雄豪磊落人一州蕞爾豈容身恩懷氓俗猶親子禮貌儒生若大賓飽看江山三載滿促歸勳業一時新我言有證非諛頌曽問甘棠戴白民餞趙總管之蜀省參政江漢承流近五年榮升執政入西川三朝再世忠誠著雙相一門昆弟賢德量廟堂應不負勳名鐘鼎更須傳春風到處隨旌斾坐覺坤維已晏然賀大參趙公榮升蜀省先公忠孝有天知昆仲青氊復鳯池榮捧白麻瞻北闕前驅畫戟鎮西陲賓僚共仰今朝賀父老難忘後日思收拾五年寬惠政忍教寫入送行詩鞏昌城隍廟古槐樛枝壓屋修葺莫可郡同知禱於神次日樛枝已剪移置地了無聲聞郡人美其誠感徴詩文以識之遂求豫作因賦以寄古廟庭槐已十圍樛枝壓屋礙修治公輸雖巧技莫展别駕至誠神自知靜夜不聞聲與臭平明忽見剪還移威靈豈但驚凡目要索詩人為賦詩御香至文廟莫將灰冷歎斯文星使來添寶鼎薰晉邸祝釐皆有謂泮宫行事未前聞要慿明德通三聖已見祥煙結五雲但説天功非已力二君不解代殷勤贈武康楊吏目茂卿簿領邅回兩鬢絲三年州幕嘆衰遲耽書癖於左氏傳覔語工似唐人詩休憚朔風行役苦要看晚節復榮時寧馨好在長安久想為親來出董帷送桂時可教授排雲閶闔叩天聰名動朝紳一日中旅困五年非敗北水流萬折竟朝東喜聞鱣序恩初沛須信麟經道未窮却似當年新及第馬前惟欠杏園紅劉君舉迎母陜西就養鶴髮慈闈暮景長豈辭王事不遑將簿書曉出趨西省􅎵髓時歸奉北堂餘日固知當愛惜孤雲無用更倣徨他年厚祿回鄉里要著萊衣捧壽觴贈日者朱月潭朱子胸中五緯學古潭霜後一輪秋談天有口逢清賞印月無心異濁流淅玉不堪江漢住挑囊又作錦城遊臨行苦要新詩句為問飢來煮得不題趙秀才鳩錢贖伯團聚卷父兮生我已歸泉伯也為俘未出樊地下有知寧瞑目天涯無奈只銷魂可憐孝子能承志所幸東人不寡恩故里團欒燈火夜此行真足慰亡存寄德衡弟同僚子安賢友我亦聞弦解賞音未瞻眉宇識君心脂韋肯與時情混鐵石應知歲月深千里神交同晤語三年吾弟辱良針得朋久向西南望何日相逢話續今九月同李子文羅壽甫行城南溪上溪水泠泠玉佩聲沿溪路轉忽川平襟懷鬱滯得開豁腰足痺頑時散行幾樹霜紅明夕照數峰煙碧倚寒晴兹逰勝友相酬和殆與秋光欲鬬清與阿齊同知時任興元氣如闕貌敦龎胸次玲瓏三八忩曽盡小心參禁闥合膺髙爵二侯邦民知愷悌情先得吏見廉明氣已降宣化承流何所似溶溶新緑漲春江送瓜爾佳權府赴並州同知平生踐履用功深中歲名場見陸沉萬事已拚間不問一官能與老相尋涇源盼盼焦勞望漢水悠悠去住心後日征驂杳西北更期珍重保千金送張知事任滿回奉元蓮花幕下盡儒珍談笑風流獨數君歸路不妨乘欵段簿書何足較紛紜與人有約泉邊月同我無心嶺上雲此去終南定髙卧好音時遣數相聞送經歷王元亨赴憲幕任西軒老子笑顔開喜見鵷雛眼底來可是官程還有限又教行色苦相催刀圭小試趨蓮幕書檄旋聞赴柏臺清譽如今塞朝野誰云吾道乏人才賀張尹新除舊西鄉簿除書捧讀謝恩歸脫却荷衣便著緋百里陽春能煦物九霄郎宿更增輝徴科有道追胥少聼決無私訟牒稀食祿固知男子事可能榮養及庭闈與張録事先任平涼經歷吏能曽試幕中賓此日參軍姓字新百雉肅清應奠枕九衢生聚少遊民政寬定使征徭薄公退何妨笑語頻近歲疲氓遭歉惡可無竒術弭吟呻李子文得雄子文集名南溪類稿掌上嬌嚶玉雪肌怪來黃色喜生眉固知仙李盤根大却笑蟠桃結子遲稿類南溪應有託樽開北海更何疑他年擬賦髙軒過定説君家總角兒次韻張仁甫見贈窺竊陳編苦肺腸何殊鼠雀解偷倉自知日計成鳩拙况與時賢敢鴈行推激過高增愧怍陪從未久見循良泮宫鳴道須前輩如我空踈分括囊與李總管時之興元任卿月分輝領郡章手持天誥出鵷行五雲佳氣觚稜逺萬里先聲姓字香密勿久參經國務慈祥小試治民方他年史筆標循吏未信龔黃獨有光次韻王仲禮上已約出郊雨不果朋友如君氣味投相尋一笑果何由暇中值雨惟思睡貧裏逢春只辦愁行樂忍令佳節負光隂不為少年留且看明日開晴霽拄杖從公到處遊德衡弟久患目疾昨送決明因有詩謝用韻以答久厭虀酸滑帶涎此花功效敵黃連槐芽細細初供摘菊蕾青青未鬭妍風味更宜濃煮茗醺酣休説內裝綿我今唱和須留著付與他時小姪編與汪同知汪左丞子蔭興元同知三葉勳臣秉節麾生來官爵不憂遲二車豈是淹留地弱冠聊為仕進基未報君親心最急正當民社學兼資更期養就凌雲翮復取青氊占鳯池獸炭山林斤斧日童顛陶穴還將烈炬然已許寒爐供歲計更遭豪客損天全火牛爇尾終難遁霧豹焚身亦可憐爭似繡簾金鴨好晝間長吐一絲煙題王提學曲肱亭八詠南褒意未厭又看新榜照危簷不嫌疏食供清淡時復華胥寄黑甜霽月光風非俗物仁山智水得珍潛夢周老我今無復希聖工夫敢自謙呈王西軒先生耆舊風流不數人喜於函丈接清塵只應賀監知前世肯倚王維認後身萬古長庚常配月一言寒谷便生春割雞已枉庖丁具聞有禎祥到渭濵送趙經歷美解東歸蓮幕雍容六見春簿書叢裏得抽身筆端有藥醫民瘼囊底無金濟客貧事與向時嗟勢異誰於吾道最情真一詩不盡暌違意側聼除音入耳新送陳洪道有序在第十九卷風骨翛然野鶴孤逺遊應笑泣窮途藩籬不限終聞道冠服雖殊內本儒曉揖清風趨孔里晴占紫氣入殷都歸來胸次應瓌瑋未敢相看作故吾上張僉事面目春風鐵石心堂堂人物重當今久聞珥筆司彈劾喜見登車出按臨白璧溫純無少玷朱弦疏越有遺音不徒汗簡留名字清譽先傳滿士林送劉載叔歸鄉葬親天涯陟岵斂兵餘淚眼驚看季父書二老重泉成夢後孤兒萬里得歸初欲封抔土心尤切難報終天痛曷如愛莫助之應重感一詩何惜送征車别總判忠翊任侯悃愊無華更老成恬然隨分即功名太羮玄酒有真味古磬朱絲非俗聲漢郡每懷深仰德燕城不意遽趨程再瞻芝宇知何日聊藉荒詩敘别情彥實道録職教漢中滿代剝落浮華一味真三年道侣敬如新此時正際棊收局平日方知德服人已辦內丹輕歲月更將外物等埃塵歸歟重訪師門舊閉戶蕭然説養神劉邢公慶九十應制父子華顛一品崇古今四海罕能同賢良不羡齊轅固齒爵兼儕衛武公羊出太官嘉會腆鳩蹲靈壽眷恩隆小臣應制詩何取但願年年拜下風養老優賢聖主心三槐劉氏慶源深邢公黃髮封宗國萊子斑衣長禁林珍從忽聞恩有及寵驚自謂福何任定將拜賜宫壺酒壽斝今朝滿意斟壽秋谷平章碩材扶護賴玄功已與明堂作棟隆江漢炳靈雖借重乾坤間氣自難同勳名真似韓忠獻壽考當逾郭令公更為皇家建邦本異時緑野樂無窮此日殷勤薦壽尊祝辭富貴不須論春融定見叢稊發陽復端由碩果存臧逹忠言宜有後栖筠相業會傳孫桑蓬準備為弧矢佳氣蔥蔥集慶門周南翁待制奉母歸鄱焚黃仙路瀛洲已快登兩封一贈死生榮庭闈垂白康寧福丘壠焚黃感愴情鄱郡江山如有待潘輿里巷共歡迎告歸莫作懷安計逺大須期異日程贈茶劉先生東海人有疾者飲以茶愈故名安期曽授棗如瓜更有通靈石鼎茶能使膏肓奔豎子却愁名姓動京華新泉活火隨緣計明月清風到處家仙道由來先濟物豈甘朝市博煙霞題曹溪應真圖妄身當日已成空幻影誰教落畫工折葦浮杯皆佛事降龍伏虎盡神通朋儕十六緣塵外世界三千變現中我亦逢場聊戲墨何須直待嗣宗風挽天師留國公留侯華胄復封留學貫天人孰與儔爵以上公膺寵數年違中壽返仙逰百靈長護家傳劍一代空驚壑徙舟耿耿輔元心未巳玄宮應共祖師謀妙齡驚悟讀儒書正一宗傳不怪迂感雪呈祥銀錫印退潮為害鐵書符無心更欲居浮世有子還能嗣逺圖玉仙翁成約在夢中騎鶴上清都題祖生求母詩卷盜起黃華發禍幾祖生五歲失慈闈淚如積雨幾時盡目斷孤雲何處飛三十年中勞遍訪數千里外喜同歸始知天理符人事孝感曽無間顯微題某氏生封母明時盛典世難逢慶集慈闈喜氣濃子歷官榮供祿養天教壽嘏及生封鸞書優渥頒恩數象服尊嚴稱德容積厚報豐知未已嗣今申錫看重重送李元章赴縣宰任東溪玉潤見名郎稔住京華仕太常已慣在庭觀禮樂仍須試邑課農桑持身有道廉為本恤衆無他惠是方陜服古來稱召伯異時遺愛似甘棠間居叢稿卷五
