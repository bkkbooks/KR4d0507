body:
  text: 閑居叢稿卷八元蒲道源撰七言絶句題墨梅圖春風不解惜瓊英可是招魂有客卿記得小橋曽度處數枝和月浸溪明省識當年玉雪顔只宜索笑不宜攀晴空展對罏薰坐著我孤山籬落間題張驥良母貞節卷盛年志節凛氷霜晝哭人嗟似敬姜白髪見兒登仕版天教寒谷變春陽孤子煢煢丱角時孀親皦皦矢心辭祗今蓮幕持贏禄歸與蘐闈獻壽巵題節婦馮氏卷今代共姜儘有餘髙風各自表門閭倘非馮氏真全節莫信中庵肯為書孀居教子廿餘年昆季持身亦自賢享却桑榆無限福異時仍不愧黄泉題保定許顯孝友卷嚚傲雖遭若未曽償逋同爨更難能愛親所愛懐同氣不愧旌門孝友稱題敬齋卷主一惺惺實並行不聞不睹更存誠莫教自巳無干預謾使齋居被美名題瘦馬圖誰寫驊騮草野間身行萬里骨三山絶勝秣飼無他技枉占君王十二閑題卜士髙君卷易畫分開偶見竒天機物理自然知髙君解向身邊看不待逢人已决疑題王氏友山亭五首直諒多聞固在人豈人不友乃山親能知死馬骨猶買始識名亭用意真寂寂幽居得友難亭中舉目但青山友山題扁卿須㑹政要良朋與徃還儀形峻潔氣渾然相對無言意巳傳靜壽聖師曽喻指我當乆敬亦忘年嵐翠參差曉霧開政如朋自逺方來澹然相對坐終日有信無言兩不猜論交自昔號為難為雨為雲反掌間萬古屹然長靜壽情知取友不如山題熊氏節婦卷婦居中饋尚奚名夫死方明節著貞但使操存果無愧何妨熊氏未門旌題威州劉君卿石屏卷萬古千秋乆秘藏不辭剖腹露文章也同月石風林様只欠歐蘇為發揚石含天淨畫難如雲母裁屏不羨渠説似與君君自解靈臺方寸有詩書題翰林知印沙君寳畫馬詩卷後沙求畫馬於趙子昻趙但書畫馬詩贈之詩妙無窮畫有窮翰林詩與字皆工沙君失馬乃得馬逺勝當年塞上翁星翁劉秋江得隂陽教授歸江湖奔走復京華袖有星辰到處家今日翩然歸計好一官真足慰生涯發禄今年固自知亦由實學動當時要君開却談天口博我吟成餞路詩題李氏三世惠貧卷大樹垂隂尚庇人癡兒殖貨只謀身李侯三世皆修徳不惜推財施與貧題致嚴堂卷風樹纒悲歲月深孝思忍淚已沾襟奉常惟有精誠至少見平生罔極心題堯民圖蕢桴土鼓與尊翁媪嬉逰不出村秦漢以還風俗薄卷中别是一乾坤題猿獐圖挂枝不值穿楊技食野如逢祝網仁莫較畫師工與拙且看物我一般春題廣居堂卷安宅由來葢本仁擴充直至四無鄰莫教食頃賔還去方是堂中一主人題王欽甫小影卷已將名爵等犧牛贏得閒身百自由不待相逢接談笑畫圖看著也風流題王景先祖母丁氏八秩卷家世簮纓配吉人中途姑婦共艱辛枯桐天與孫枝茂翠䕶萱闈八十春題王氏節婦卷之死無他念我儀何須門表使人知氷霜寸念通神理報在承家楚楚兒題龍沙圖北俗惟知射與馳婦無蠶績亦禽嬉分明題作龍沙卷難誦豳風七月詩題太一蓮舟圖乾坤身世一蓮舟萬頃滄波自在流仰看浮雲曲肱卧兩忘物我只天㳺趙文臣總管竹雀圖翠筠叢薄不成竿弱羽群依共歲寒安得攙雲千挺玉煌煌五色映停鸞題趙文臣總管壽星圖霜髯風袖一臞仙白鹿銜芝若導前㳺戲世間人不識光芒上應極星躔題姚文獻公草書真蹟草書不暇是怱怱始識前賢翰墨工此特於公緒餘耳人猶未易繼髙風題江臯雪霽卷山川玉潔映朝暉人世鴻濛果是非只許詩家占清景漁簑偷載一船歸贈葛雲卿府推蘇子曽書外祖程豈知衰俗有雲卿門閭髙大非由外端自胸中積累成一成難變獄非輕寃死何由得再生明允頼君全活衆天教多子更官榮題李明之右丞鶴至卷鳯覧徳輝方肯下鶴因孝感固宜來須知人好烏亦好况此休徴不用猜父生母鞠報能全代死開矇事灼然不待仙禽鳴且集孝聲乆已聞于天題宣和鶴圖冠衣丹素儼成行猶帶宣和御墨香謾使乘軒并入畫翛然不管世興亡題邵幼知博士天香亭艶質司花賦予偏更教濃染御爐烟光風亭上春三月鼻觀先參一味禪題樂成亭卷可樂當思處樂難業成宜作未成看莫教錯㑹顔亭意政爾兢兢恐宴安謙齋御史尹石首日斫竹藩花圃竹復生求詩藩圃枯莖變碧叢主人監邑便乘驄死中底事回生意要表平反治獄功無根分與朽株鄰有節還驚嫩葉新他日截為鄒衍律吹教黍谷變陽春題劉仲遵卷政惠三年遍及州秪將清慎繼前修憲僉有眼明於月肯使廉汚混一流題陳侯卷後河陽政績説陳侯興學仍居第一籌滿軸聲詩頌遺愛清風吹送到皇州題周南翁悠然閣閣表心期栗里翁周君此日仕方通要知意趣何如耳蹤跡無勞較異同東籬疎矮菊鮮鮮舉目南山堕眼前不是主人心自逺便登髙閣亦徒然張子文求畫白頭翁鳥詩畫師著意寫殘秋幽鳥拳枝亦白頭老我不禁䨇鬢雪枉將心緒發詩愁問渠幽鳥亦何愁拳著寒枝也白頭應是畫師心獨苦要將筆意寫殘秋題節婦畢氏傳哭夫哭子志秋霜白髪蕭然老敬姜留在蘭孫一芽好門楣節孝爛生光題楊氏承顔堂記楊安仁祖母患目及瘍安仁為䑛目吮瘍疾遂愈前畢氏即其祖母也祖母何縁疾頓痊惟孫以孝格於天堂名底用承顔扁自警存心始是賢題孝子髙仲信卷心憂母病瘠於柴惠及貧人肯恡財孰謂髙君不知學仁民端自愛親來題晉士圖酣放都將禮法讐共誇晉士最風流清談自許成髙致誰識翻為禍敗由酣放都忘禮法拘清談更欲慕𤣥虛餘風種下中原禍開卷令人罪厥初題錢忠懿王帖錦繡山川畫不如風流猶及二王書能歸有道全生齒底用求名翰墨餘題梁方大濟生堂卷悟入醫流術已精理求仁體講宜明直須二者相為用始是君家説濟生題周伯淳孝友門卷煌煌旌表耀清時貞母能生孝友兒道與君陳張仲合誰能有筆繼書詩題續氏邵節婦八十卷夫天已失極天存神理扶持壽亦尊四子傑然能樹立果能禄養報慈恩題浩然踏雪圖淡雲㣲雨句方成閣筆諸公嘆且驚不遇還山當自佚何如忍凍雪中行六花一夕縞山林破曉乘驢向此吟莫怪先生太清苦詩腸芒角自難禁探梅圖嫩寒清曉到山莊不為梅花有底忙寫出詩家真况味畫工亦自不尋常贈石泉宗相士山骨潺潺綫溜穿汪洋渟蓄可涵天道人兩眼明如此莫怪佳名號石泉贈相士沈西湖暗香浮動月黄昏人去猶餘妙語存可是沈君能具眼西湖今作謝公墩題燕氏推財𦵏兄卷死䘮之威見孔懐此時世利等浮埃滿腔天理皆呈露不是安排旋作來兄弟難求財易得衆人知此不能然傷心千古燃萁句始識燕家季也賢題王氏某慈孝卷王君乃祖晉休徴嗣世於今有令名繼母却非朱氏比一家慈孝總堪旌送薛知事哀歸官滿人歸氣褎然素冠悽别獨渠憐填胸憂戚難為語長路秋霖慎著鞭異時登陟望孤雲心目遥存鶴髪親今日歸途見雲起親兮何在淚盈巾題木犀卷花外無香憎麝俗木中有理似犀通不知造物誰雕刻玉質金相箇箇同萬粟綴成金𤨏碎一枝折破碧團欒不因香臭分真贋誰道分明卷上看題班媫妤卷禍水方將㓕火時齊紈置篋已為遲若非善對依長信縱解題詩不救危題党乆誠李陵别蘇武圖陵言臣罪上通天握手相辭淚泫然今日果於圖上看丹青誰過子卿賢贈相士黄梅溪雪裏香傳一信春水邊影照十分真梅溪説相無多子只這天機舉似人題張圖南松風亭卷半天謖謖老龍吟我欲將聲寫入琴曲几團蒲清坐處不期茶竈也知音題張圖南怡顔堂卷向來養志禮無虚具慶堂中樂有餘今日立身能不忝我知泉下亦怡如題髙梅隱卷根寄山隈與水濵香浮随處總知春百花頭上人元有明眼休教混俗塵蔡相士過武當山與山為友十年餘終日相看不忍踈乆靜胸中自生白閲人何異鑑磨初聞木犀香一株幽院獨開時到處聞風便可知不似餘花縱芬馥直須三嗅得幽竒秋風萬斛散天香想是瓊枝細簇黄世有丘園隱君子身雖未見已名彰追録舊賦梅花梢頭麥粒未舒芽鶴膝中間著數花竹外一枝雖入畫不妨分付與詩家與相士童靜觀水止端能閲鬢眉鑑空真可别妍嗤靈臺一片清無滓舉目天機不我欺題張湛張堪射獵圖一為馮翊一漁陽漢傳東京數二張畫史何從傳此本却將射獵掩其長自古通材擅美稱射居一藝不難能試看卷内閑馳意馬慢弓櫜矢釋掤讀近體詩有感東塗西抹眩妖妍欲趂春風事少年安得謝家氷玉質不將脂粉汙天然題十友圖東坡已下及佛印陳碧虛十友八為天下士二雖方外亦知名當年想見徳星聚太史觀天偶未精題蕭寺吳山佳處梵王宫樓閣崢嶸出斷峯不見當時子雲字霏烟殘照但聞鐘題白汝明秋江晚渡卷白號横舟岡巒迤邐水悠悠鴈落沙洲古木秋隔岸有人愁日暮急須濟我勿横舟七月十五旦偶題半旬毒熱未容當破曉風來得少康人世若教無苦樂天公安得有炎凉題林泉雅集圖山光明潤水潺湲人物熈熈自一天只道囂塵都隔斷不知已入畫圖傳樹林泉石帶幽居雅集山中樂有餘我願斯民真若此不從紙上看華胥贈相士月湖道人浮光靜影月湖秋擬效坡仙赤壁遊今日羽衣來見訪絶勝化鶴掠予舟倒影相輝萬象涵道人了此不虚談塵中落魄無人識偶爾逢時為指南題徐子方以詩并畫梅寄李晉臣卷後一枝踈影落横披名畫新詩寄所思二老風流今已矣卷中猶得見當時己巳上元太平節物自欣欣燈火鼇山閙徹晨今夜月華依舊好可憐只解照愁人己巳旱兵流民嘆流民雜沓到興元也與君鄉總一般若要大家均樂土只消時雨洗兵端贈相士林瑞峯少年猶耻競時名老矣何心更慕榮珍重瑞峯無枉顧好將風鍳待竒英贈相士西嵓曽向西嵓作隠居清輝夜夜照琴書只今留在神光目貴賤難逃一瞬餘贈相士宗月江道人閲盡滔滔者月印江心水自流我亦何心分貴賤難將槁項説公侯贈初庵乾坤随處一庵開不見端倪莫枉猜箇裏麻衣傳相罷更從無極説將來題陳教授山水卷群峰盡處見危樓水色山光不斷頭何日拂衣成獨徃倚闌長嘯百無憂山間暮色已蒼然少頃樓東月正圓清景怕無人管領畫家先為著詩仙至農家有感雨腐踈茅不蔽椽囷枵竈冷絶炊煙自言不復明年計趂納公租賤賣田偶賦坎井荒叢變態殊奔奔相逐更相呼應憐寒叟懸衣結不似明忩看畫圖賦柳枯樹生荑色已嬌低垂江岸映溪橋東君不惜黄金縷散作春風十萬條賦㯶瘡痍滿體髪鬅鬙縁木求魚見未曽獵獵忩聲風不定團團階影月初升賦金錢花繁叢滋引更連茹熠熠花開散五銖可是小園秋寂寞何妨為菊作前驅賦水仙花柔荑凌雪並梅芳玉質金相擅國香方悟西湖林處士合教配食水仙王翠翎叢裏擢寒英香比梅花一様清動得詩家黄太史為渠覔句播芳名賦宜男花黄作衣襟緑作裳美仍宜子勝莊姜莫將輕比閒花草解與人間助發祥賦玉簮花露浥瓊肌付與香么鵞引頸吸天漿錚然折取簮雲髻妨却幽閨罷曉粧沃葉偏宜聴雨聲碧雲湧地載飛瓊弄姿都道搔頭好粧罷佳人眼最明賦百合花曉看蒼玉觜猶呀漸破觚稜類削𤓰額上宫黄雖可愛一天風露氣尤嘉賦金盞花黄金杯面紫金心貯露渾於酒滿斟莫道尋常柔脆質長春不受雪霜侵賦石竹短籬新見出梢梢葱蒨都無尺許髙茜色芳葩工㸃綴莫教容易混蓬蒿賦金鳯花芳葩雅稱九苞名兩翅翾翾簇翠莖粧㸃曲闌聊寓目可憐取次落紅英賦葵花誠心一寸獨傾陽累萼重葩次第芳盛夏貧家成富貴煌煌旌節豎門墻賦青梅豆顆輕盈緑褪膚仙姿髙掛月清臞蔚藍天上新移種素艶清香世絶無閑居叢稿卷八
