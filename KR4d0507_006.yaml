body:
  text: 間居叢稿卷六元蒲道源撰七言律詩題曲阜張善甫隱君八十卷年雖及耄氣精明杖屨逍遙享太平九老圖中新行輩一編圮下舊家聲里仁幸自依先聖鄉飲應多拜後生况是階庭映蘭玉世間此樂足為榮送客省副使豫章冷敬先楚材晉用昔曽誇况復車書正一家有服在僚瞻日月何心歸隱老烟霞髙桅緑漲行期近喬木蒼烟故國賒文獻風流知未泯江西宗𣲖浩無涯題胡景清求母辭官歸養卷母子天性磁石針可憐海北與海南弱齡已為值兵散此日應勞泣血尋萬里雙親徐氏鏡百年一片壽昌心辭官詔許榮歸養孝行從茲照古今壽豫齊王大學士清時名德細推排海內於今數豫齊官歷聖朝凡四葉澤流家世自三槐人間勝日居仙府天上文星近泰階紅頰霜髯真壽相川增坐見福無涯政府曽聞力懇辭瀛洲雅志得逶迤正人一指為公屈吾道寸心惟上知智若蓍龜深自晦壽兼松鶴逺難期瓣香袖裏仍留在不為南豐更有誰送秦巖卿雲中遷安令妙齡秀發入詞林載筆優遊歲月深人謂祕書為有子我知美邑得無心折腰且就陶潛米試手須調子賤琴戢吏愛民為急務京畿咫尺聽佳音題關中某壽母八旬卷今代還推孟母賢天教無恙得長年八旬更數身逾健五福能全壽最先晚景天書加寵錫諸郎雲路盡聨翩殷勤朝貴題詩什與作關中盛事傳趙待制求贈梓人髙天祜前代公輸孰與儔髙生匠手擅名流斧斤如向風中運規矩還從法外求天上寶宫時幻出人間金帛價爭酬文章老我知何用休說能修五鳯樓赴召過益門鎮望寶雞數程危棧束蒼崖漸喜峯巒兩翼開人語乍驚成巷陌馬蹄方試踏塵埃隱如城郭周原峙渾帶泥沙渭水來借問寶雞何處是居氓遙指鬭雞臺初至京城寓居言懷道途奔走四千餘憔悴京城僦屋居曉逐時英登館閣夜因羇夢到鄉閭將衰敢望功名顯臨用應慚學術踈落月孤雲天一角眼穿誰為附來書題孔邦彥妻趙氏節行卷早年艱苦百罹逢夫也云亡子憫凶但有誓言維我特豈無膏沐為誰容天留歲紀今踰七春滿孫枝又見重素志初非望旌表要期無愧若堂封題達實特穆爾大夫所藏王維畫寒林曉行圖野景荒寒霜意邊踈林僵立勢參天定應畫妙王摩詰故著詩清孟浩然驢怯小橋鞭不動風掀危帽整還偏官閒老我叨君賜紅日三竿尚晝眠題某氏壽母八十卷鶴髮慈闈八十春眼明紩線自能紉賢郎秀發五枝竇家法嚴齊三相陳金母年齡天上籍玉堂人物坐中賓都城盛事皆傳說亭育端由聖世仁題節婦某氏卷閨門雍睦禮無虧婦德鄉閭足可師一旦我儀天遽奪百年心事死為期養姑親爨尸饔日教子挑燈旋績時晚歲雙珠儘光耀華旌不負柏舟詩和秋谷平章示內弟韻自攜書劍出茅齊納納乾坤入壯懷雷電龍淵隨變化君臣魚水喻和諧闡明公道皆誠服杜絶私門勝力排却是人間要霖雨山中未許去藏乖又治民敬事凛如齊先聖微言要永懷異議只從三尺謹同僚休失八音諧官閒農務宜敦勸訟簡衙兵勿用排自此修程無滯礙端由輪轍不相乖送李彥長西臺御史閻靖軒壻來遲缺拜靖軒翁欲識翁甥復燕鴻偶爾臺評能見用翕然士論快稱公騰章㑹聽言時弊攬轡行看振古風秦蜀瘡痍一昭洗始為不負讀書功送孫和伯西京宣慰副使度外功名本不忙忽傳有詔拜龍光一門爵邑神川郡兩世春風晝錦堂此去條章宣上意向來父老識文莊渾源喬木人曽說難似君家得久長送京師學正鄭棐下第還家博帶褒衣氣吐虹褎然欲試讀書功禹門方逐魚掀浪宋國俄驚鷁退風不見色間形喜愠果能度外置窮通請看赴海源泉水曲折雖多勢必東和國子博士劉損齊喜雪韻謝庭桞絮起因風模寫雖工恐未雄三白兆祥皆帝力六花施巧竟誰功仙家逈出塵囂外治世都歸粉飾中莫謾相撩吹入鬢秪今衰颯已成翁題具樂堂卷為陳尚賔修撰賦金昆玉季樂如何恭友相承意不他既識天倫為最重應知日用莫非和堂中我自塤箎奏世上誰猶布粟歌試看春風紫荆樹今年花比去年多題祁真人寫真卷神觀超凡本是仙一塵猶有世間緣聖君賢相逢嘉㑹𤣥教宗師嗣正傳他石屢攻增瑩潔洪罏百煉愈精堅虛中已悟無為理歸路松風正灑然贈醫官靳善長術精能獲十全功名列賢王薦剡中為相為醫分職異活人活國用心同逶迤禁籞追先逹度越時流齒上功莫作區區方技看似聞吾道亦深通壽額森特穆爾承㫖分茅胙土世臣家開府門崇纛與牙曽歷紫樞參宥密復居玉署占清華棣聨芳萼輝相映梅趂和羮味已嘉擬頌岱宗稱壽祉向來魯頌不須誇送河南省檢校某之任聲譽喧傳表著間暫辭東閣未容閒傾心汴省來何暮分手都門去莫攀但得胸襟清似水寧憂簿領疊如山㑹看檢校成功了早晚絲綸聽召還賀秋谷平章得子玉作隆顱貫伏犀天教後得且先迷慶源固合來茲計外族何殊出自齊子姓幼能知指李軒名今已驗生稊直須辦取如川酒要為明珠洗却泥天上麟兒入眼竒恍然記昔夢熊羆始知仙李流芳逺不恨蟠桃結子遲積善在公宜有後助歡於我可無詩肯堂氣質雖云美養正工夫在此時送文璋甫陜省都事之任華胄遙遙潞國來照人儀表亦雄哉文章自昔雖能事勳業於今要碩材陜省謀謨資密畫秦民瘡痏重堪哀知君胸次多竒䇿和氣春風力挽回壽程雪樓學士天生元是玉堂仙遊戲人間五百年南斗文星應合避北方學者未能先燕毛鄉飲當居上鷺序朝儀合在前多幸不才䝉薦引斐章為壽得夤緣挽忠菴劉萬户嘗竊父於獄戰殁於雲南仁不遺親義急君公兼勇知膽輪囷挺囚竊負誰無子陷陳先登我有臣瘴雨蠻烟雖戰殁秋霜烈日與爭新立身大節惟忠孝豈意頺波得此人挽集賢文學士文天祥子字學山忠節前人著大名天教有子嗣家聲集賢聞望期他日過隙光隂了此生痛惜朝中餘舊友還歸江左但銘旌嗟豫雖未瞻芝宇聞說風猷亦愴情題溫州宣差德政卷名拜特穆爾溫郡賢侯識未曽剸繁治劇有竒稱撫摩凋瘵恩尤厚搏擊豪强氣益增君繼龔黃知不忝我非元白頌焉能政聲今已聞京闕㑹聽天書早晚徴賀王國元新屋官資富潤了生涯新敞髙閎氣象嘉棟宇已看施藻繪階庭正欲植蘭芽肯堂肯構知賢嗣聞禮聞詩亦故家善頌願師張老祝長教人屋兩俱華賀秋谷公贈崇德應奉詩韻趙子能詩雪滿簮知言秋谷最為深便教價重連城璧更覺聲如擲地金味向靜中時自得境逢佳處獨幽尋晴忩展讀興三嘆不意還聞正始音次張子文韻故人尺素嘆沉魚久客常情念秣駒五畝䞉知歸計好一生元向宦情踈近因信自鄉關至又報冬來雨雪無我亦悵然懷舊隱不須更待和詩餘挽龍虎山提㸃張滄州鳯凰詔下始霑恩龍虎山遙已斷魂人事限成今古域神遊跳出死生門定知紫府功應滿空憶滄洲號獨存好去江南一函玉翠崖深處斸雲根應制壽趙公王彥舉八秩二首四朝人物數耆英八秩開祥薦壽觥詩賀仰承天子命身閒仍占地仙名松椿定副齊年祝桑梓誰如趙國榮玉立賢郎亦卿列公生不枉得長生素履秪勤孝與忠青宫羽翼記前功年登八秩家居樂祿視三公帝眷隆內使宣恩同湛露詞臣作頌擬清風一時富貴知多少晚節能全孰似公追憶山木王文貞公因公初度有感憶公昔歲尹興元此日賔僚盛綺筵曽領梅華添壽斚更磨松劑寫吟箋音容已作今生隔言行終貽後世傳飽食却慚忘所自偶因欹枕淚澘然張編修子文年五十得子蓐方擇吉問醫師已獲驪珠慰渴思助慶將開湯餅㑹得官正趣簡書時年迎周易大衍數夢應斯干小雅詩客裏值兒初度日無菑長命祝嘉辭送白雲平章致仕歸白雲山道明國體學宗儒接武䕫龍贊廟謨日昃退休黃閣早雨餘歸去白雲孤千金趣賣為供具八詠流傳入畫圖命氏進階隆寵數常人出處似公無壽趙總管漢郡年前舉壽巵天教此日㑹京師容顔視昔初無異精力方今尚有為禀德我知真宰輔增光誰似好門楣四朝耆舊康寧在國論咨詢未可辭送吳間間真人𤣥德真人領教宗一時清貴齒羣公問安日報雙親健上壽天教八袠同饒國並封榮莫及莊椿齊歲福兼隆一門盛事誠堪賀不惜題詩在下風題梁協葬親後得子詩卷梁生昔未葬雙親夜淚漣漣腐席茵馬鬛成封泉下穩驪珠呈瑞掌中新子平既已申情事伯道何勞慮後人遙想成隂多宰木賢郎楚楚一時春送王某之千户任古來名將盡儒流右選君今得與儔况際武功皆帖服何妨文雅恣優游官資奚啻千夫長骨相終封萬户侯莫為此行增感慨貂蟬元自出兜鍪送田修甫甘肅省照磨識君倒指十年餘一味清貧宛若初自陜至京懷舊歷出臺入省喜新除一鞭明日催飛騎尺素何時定得魚客裏自憐還送客不妨握手暫躊躇賈致道監修京師廟學詩卷聖朝天下一戎衣文治方隆萬世基巳集大成新廟學更崇首善自京師元臣力贊應誰似工部賢勞不巳私欲識賈君奚取信後人請讀辟雍碑送郭幹卿歸葬與君齠齔漢中居入學聨翩共挾書一别到都談話際細思隔世夢魂餘松阡馬鬛封應切蘭省鵷行跡暫踈歲晚遲回傾肺腑我歸亦已卜春初題王世賢旌表卷死事兩函忠義骨零丁萬里負歸來泥行露宿悲寒野雨泣風號掩夜臺事母至終尤盡禮聞兄已乏復通財若人此日能章顯端使民彛啓迪開送謝敬叔之雲南教官知君文獻有淵源豈獨風流晉宋間積德百年根自逺登科兩世桂曽攀冷官乘傳方南邁溫室頒恩看北還吾愛吾廬欲歸去少留遲子道家山挽夏可軒夏真人父以子恩封學士拜命而卒鄉里閒居七十年曽經海水變桑田諸郎儒業俱傳素一子仙科獨悟𤣥文館有光興白屋可軒無憾及黃泉秪知門外方來賀誰謂堂中已泫然題延安李氏賀八十二詩卷富貴康寧畀自天君能好德更為賢幾人如此享全福八秩豈惟多二年倒指鄉中稀行輩牽衣堂上見曽𤣥詞林有筆難輕許敬老何妨贈一篇壽秋谷李平章延祐五年十一月一日胸中浩浩渺無垠智數何如一味淳貝錦縱成萋菲巧珠旒難眩是非真吉人壽考惟天相盛德光輝與日新底事勤拳苦祈祝斯文元氣在公身送趙子敬平章之蜀省耿耿孤忠結聖明羣言力詆不能傾方參國論還持憲既掌綸言復鎮京分省新加金虎重去程舊識碧雞名腹心一旦勞宸慮召節旋聞到錦城向曽赤手掣鯨鯢桃李何言下自蹊帝座正期星拱北蜀天還見月生西琴無餘蓄師清憲錦不為榮慕稚圭誰果留行深愛惜酸鹹異嗜固難齊和霍思齊接駕六軍嚴衛抱珠璠曉發衝開宿霧寒象輦塵清千里至龍顔喜動萬人看踐禾屢戒畋秋騎獻果爭迎住夏官自愧涓埃無以報敢辭奔走候儀鑾揚厲鋪張大雅詩紀功頌德不求竒兩都全盛有今日千載遭逢無此時龍駕逺同虞夏狩羽林雜用漢唐儀近臣護從歸來喜飲至滿斟金屈巵送光州成知州聞說光州太守賢寧辭朝籍撫民編雖云有祿二千石肯取無功三百㕓燕市春隨行色動淮流日共政聲傳恫瘝正望龔黃藥莫惜圭刀使盡痊寄陜省蔡逢原參政禁林風采動羣英國學師模藹盛名蘇子文章妙天下陽城忠孝誨諸生蒹葭倚玉吾何敢舟楫杭川孰與京厚祿故人書不斷十年滿慰别離情蔡見和前詩至復用韻寄之明時西顧倚耆英實惠非求赫赫名但願人皆簞食樂寧教我獨甑塵生九天寶墨欣分陜一旦徴車恐赴京矯首悽然東北望無因傾寫向來情題敬山詩卷北窗自作山中夢南國真逢夢裡山不比楚襄因嗜欲擬隨謝守共躋攀竒峰已隔江湖外拳石長陪几案間敬字終歸仁者壽公年雖老尚童顔寄鹽運使王君貢京師分袂閲年深不意榮除送好音調鼎定為他日兆生財且盡此時心舜城風物供新眺漢郡烟花入舊吟兩地相望難晤語空齊鬱鬱抱塵襟題王士敏副運時省齊敬能直內此心存不逐紛華向外奔政要惺惺明理欲豈容兀兀度朝昏反身固闕希曽氏篤力情知過孟賁頃刻工夫無間斷修途端造聖人門題吕氏火後屋存手卷儀真有客近傳聞佐部廉平昔吕君親老便為萊子養屋成不負退之勤嘻嘻出出災難避默默冥冥理自分可道祝融無具眼從教玉石與俱焚題紫陽先生故居詩卷當年吾亦愛吾廬身後寧容老氏居精爽自今還舊觀斯文終古見遺書雖無嗣世能傳業賴有當途為表閭闕是中行真義勇我知過者但欷歔挽秋谷李平章二首往來徒步走神京導日天教作啓明朱邸既升黃屋貴蒼生始識白衣名兩封大國雖為重三入中書未足榮定難崇文相真主甘盤舊學獨崢嶸一舟也㑹弄烟波事有難為可若何涕淚仰頭瞻北極夢魂開眼悟南柯用人誰解當年意取士仍循舊日科磊落勳庸無復紀令人憤悶寄哀歌寄和運使王君貢久矣斯文嘆陸沉邇來不意聽韶音兩篇都是清新語一片深知故舊心華髮殘年良足慰青燈永夜獨微吟海鵬東去雙飛翼對坐琅琅寫我襟己巳何茂實山莊天開地闢有佳處須待智人方見幾一把茅茨真得要四周風物總知歸雨晴巒嶂名工畫霜晚溝塍衲子衣林表雲端煩指㸃不妨極目到殘暉南岡勝處結團茅四面峰巒湧翠濤坐卧都教收好景往來不復厭長郊心田樂為塵囂靜眼界寬因地步髙况有主人偏好事更能置酒具山肴丁卯賦杏花旭日東墻老樹新一枝迸出許多春嬌兒稚女生來好袨服妍粧聚不勻紫蠟光凝初㸃蒂丹砂力盡恐成塵詩家自有如神筆安用徐熙更寫真與德衡弟論詩書以贈之松姿鶴相兩臞仙閲世都過七十年得意江山元有助放懷風月自無邊古今膏馥奚從丐伯仲塤箎孰使然天與吾宗真樂在大家心㑹口難傳病起示德衡弟兩顴髙聳目眶深短髮蓬如不受簮博帶褒衣惟我甚陳編墜簡復誰尋瓠肥可愛難同昔松瘦能堅繼自今血氣已衰餘習氣曉來欹枕尚微吟辭陜西儒學提舉閒居言志布榖聲中雨散絲曉窗濃睡正炊時春來暖透黃紬被老去甜歸白粲糜仕及引年何况病官雖閒局亦當辭為豫多謝門前客莫怪慵夫應接遲宋待制父子璋年八十二封京兆伯積善由來獲報豐吉人方寸與天通賢郎已陟烏臺貴神理應憐鶴髮翁五爵登三榮亦至八旬逾二壽兼隆世間孰是無親者泚筆題詩喜意同詠雪三首臘後春前正欲求天心人意似相謀六花半夜將平尺二麥明年占上籌神理定償憂國願聖明真得富民侯作詩紀實非虛美誰為傳聞逹冕旒斯民一飽復何求三白能為久逺謀簌簌寒聲隨晚籟濛濛隂氣暗更籌麥肥是處遮黃壤人足豪家比素侯寬得九重宵旰慮逺方無路獻前旒貽我來牟副夙求天教滕六預先謀夜忩聽響初鳴紙曉砌探深已沒籌客寓吾鄉稱樂土農歌此瑞屬賢侯須臾見睍還消鑠簷溜淙淙若綴旒題雙峯王氏卷家學淵源久益醇緒餘才出便驚人雙峯自號存丘首兩辟皆辭重席珍身已歸全無愧怍子能嗣業更光新芳名合載連城録秉筆伊誰繼後塵題西鄉張明府佚老堂明府辭榮樂道真襄山題扁見情親忘言秋水心無纍屬望晴嵐德有鄰座上一樽今日計門前五柳舊時春殷勤為報升堂客料擬西風滿袖塵德衡弟餽石榴三枚遺我盤中碩果三纍纍多子出包含光搖鏡面丹砂碎冷結金莖瑞露甘一本同胞吾有感逺條盈掬彼無堪夏花歲歲開時節莫忘重拈助笑談仙桃千歲又三三此果初花孕已含勻顆看來無㨂擇異根嘗處有酸甘蔗漿縱美色難比芡實雖多味不堪舌本乾時微嚼破對君應不倦髙談賦棕扇三首夜義獰惡挾飛廉驅逐蚊蠅號令嚴更得此君遭柄用少寬其帝正司炎爽邦自可詢黃髮除虐何妨奮紫髯髠首剝膚依見笑庶令人免汗流沾剪葉裁綃價亦廉面雖窪橢性方嚴謖然綺席風生細忘却崑山火勢炎無事笑談勝麈尾有時驚詫捋龍髯髮皆上指君知否恨殺青蠅到處沾清臞仙相伯夷廉火正聞風自解嚴倒著漁簑能禦濕傴為鮐背肯趨炎相看似隔年前面一笑還掀尺許髯伴我納凉供雅具不妨席上雨來沾題鄜州張使君漢臣母貞節詩卷孀親凛凛柏舟風自幼嶄然已不同涵養果能成令器激揚應亦待諸公在官美績傳身後頌德佳章滿軸中有子佐州還嗣業情知世澤尚無窮題沁鄉諸公同樂㑹卷後鄉里歸休㑹故人却尋野服脫朝紳歡情不厭詩兼酒笑語奚分主與賔洛社流風今未减沁鄉同樂意尤真畫圖題詠閒披玩俯仰還驚迹已陳送何審道之韶州巡檢任為士安居不可懷出門前步儘無涯傳家醫術經三世發軔官程始一階帆順好風通澤國書應何日到山齊九齡生處休言逺有志飛騰亦與儕寶雞縣與雷縣令值中秋寶雞濡滯阻湍流喜識賢明百里侯學道愛人君可紀樂天知命我何憂兩家各有根原自一話都無芥蒂留别後相思渺何許年年須記此中秋次素巖賈文起秋闈同考試見贈韻陜省朅來秦地豈優遊要試朱衣暗㸃頭力主斯文惟舊德情知元氣在中州清宵忽起家山夢何日還陪杖屨遊别後有書能寄否碧天無際雁橫秋棘闈清論浣塵襟掃退淫哇奏雅音不恤從違喧俗議要期取舍合天心鼎彛陳列瞻清廟矛㦸森嚴見羽林考閲已從公借重歸歟三徑復幽尋九天充賦破天慳漸覺斯文古意還多幸長鬚為座主更驚偉節在人間得材應共掀髯笑為國難甘袖手閒數日陪從重倒指管中文豹僅窺斑羅道録以事詿誤至鳯翔得解而回玉虛人羡地行仙陽九相遭不偶然官府久知辭上界風波何事起平田向時公冶元非罪此日王駘幸獲全益信聖朝寬大意更勤香火祝堯年金叉剪燭幼作歌舞蘭堂夜色深燭花輕剪試叉金分開小鳯雙飛翼撥盡寒灰一寸心玉淚亂隨紅袖落蠟香留得碧雲簮短檠二尺挑寒雨頭白書生正苦吟題李行簡憲使錦城西墅錦城西墅類槃阿釀酒弦琴適意多軒冕浮雲莊夢蝶桑榆斜日魯陽戈門無定客來同飲兒有新詞許再歌老我漢南忘寵辱碧江烟景侣漁簑槐芽樛枝屈曲走龍形無數新荑已茁青嫩色逺看浮古陌清隂漸欲蔽閒庭蟻根初入封侯夢卵碗凉挑煮餅馨種德曽聞興相業願從萌蘖乞餘靈間居叢稿卷六
