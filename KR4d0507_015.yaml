body:
  text: 閑居叢稿卷十五元蒲道源撰制贈嘉議大夫奉元郡侯鄂屯達格妻珠勒根氏追封奉元郡夫人制節惠易名所以待先朝之勲舊推恩及配蓋亦從前代之典章用勸方来以彰淑德具官某妻某氏来嬪盛族恪守柔儀勤儉而家道以成肅雍而閨門是賴子孫益熾邦國有光從夫於大郡之封正位於小君之號幽扃永賁明命是承可贈中奉大夫行中書省參知政事奉元郡公鄂屯蒙古岱妻劉氏伏氏并封奉元郡夫人制闕宣威外庸之效雖闕家闕正位内助之力居多既示寵綏豈容遺闕具官某妻某氏某氏相門毓德將裔聮芳惟良人自昔有勞爰加䘏典在若等亦皆從爵俱錫優封於戲象服是宜愍身前之莫逮龍光均被居地下以何殊惟其有知尚服休命宣慰司同知鄂屯妻楊氏封奉元郡夫人制夙夜在公人臣所以事其上室家胥慶王者亦當遂其私爰沛洪恩均沾嘉耦具官妻某氏係繇名閲生稟令儀汝能相夫以效忠貞則亦終身而保富貴於兹寵錫尚克欽承可翰林院和搭拉都哩黙色承㫖曽祖父制朕惟積行累功固不期於今日求源探本尚有待於後人具官某曽祖父某材武冠時嚴明御下整齊部伍總戎律於髙昌鎮服邉陲震威聲於西域爾曽孫為我之近侍在恩典宜加於愍章於戲考世論年距兹時之已逺封公胙土凛生氣以如新尚其有知服之無斁可和承㫖曽祖母制英傑起家必有相成之賢婦忠誠佐國又逢特立之曽孫不有䘏章曷旌懿德具官某曽祖母出自右族嬪於偉人克育五男既顯於當代傳至四世復興於我朝原本而言推恩當及闕作郡公之配獲榮遇於斯時有闕封益光増於幽壌惟其不昧闕承可賀正表伏以闕生順天造陽春之布人時敬授奉聖朝正朔之頒萬彚昭蘇兩儀交暢中賀運開泰治仁體乾元闢閶闔而受朝日月大明於黄道肅衣冠而進賀星辰環拱於紫垣豈惟導淑氣於八荒将以垂鴻休於億載臣某叨居逺闕幸際昌期心切祝釐願上延洪之闕職當宣化仰承寛大之書又伏以帝出震以當乾肇開人統陽進臨而為泰式紀王春極裁成輔相之闕運含育發生之妙中賀闕元居正歛福錫民德動皇天坐掃闕亡之象威加荒徼克成厎定之勲闕端朝益隆洪祚臣某承流在外闕扉前奉萬嵗之椒觴惟深素念闕民之輿頌徒切丹誠聖節表伏以乾畫龍飛數協九闕之闕坤輿燕賀喜逢千載之一時闕之期適際太平之運中賀堯仁溥施舜孝彌恭靄和氣於東陽暢皇威於北顧安民輯吏申詔語之丁寜作善降祥宜帝心之眷祐受兹介福惟以永年臣某濫闕梁封阻趨魏闕奉玉巵而稱壽徒切葵傾上金鑑以攄忠尚懷芹獻又伏以位正龍飛光啓五陽之月史闕虹瑞聿臨載震之期海宇均歡臣鄰胥慶中賀皇威逺暢文德誕敷為宗社而建元良大義昭明於天下滌瑕愆而霈洪澤至仁固結於人心皇太子正旦翰林院賀牋治厯明時月紀建元之首承祧主鬯天彰與子之心氣轉鴻鈞春融鶴禁中賀温恭夙著仁孝生知視膳問安益謹三朝之禮經文緯武摠持兩府之權輿情共屬於重離品彚咸亨於交泰臣某欣逢盛旦忝綴賀班玉署叨恩千嵗效端辰之祝青宫毓德寸𠂻祈又日之新賀正表翰林院賀伏以元正首祚膺萬國之賀珍閏月歸餘定四時而成嵗際天所覆有物皆春中賀運撫泰亨德侔乾健宗藩来㑹咸加懷輯之恩慈閫問安永奉怡愉之樂洪緒益隆於綿逺方輿坐致於敉寜臣等誤被綸音忝居禁署寸心願效少禆制作之文億載是祈仰荅生成之造立皇太子賀表延佑三年太師府賀伏以聖明在御嗣厯服之無疆海宇同心歌吾君之有子神民胥悦日月増華中賀濬發逺謨丕承前烈為宗廟社稷之重宜豫建於儲宫雖藩戚臣鄰之言猶毎持於謙德逮申懇請方賜俞音稽於衆則人謀與能告於郊則天廸從保果應震男之一索咸瞻離象之重光邦本益隆輿情允協臣某忝司台鉉祗慶宸居羽翼已成不待四人之輔佐股肱願效永延萬世之基圖同前賀皇太后牋伏以易著格言主器必歸於長子書垂大訓正邦允屬於元良於皇聖上之建儲有賴慈闈而决策中賀功施社稷力正乾坤克闕仁孝之孫迓續靈長之祚扶持治道惟求賢而審官佑啓後人復貽謀而燕翼天下晏然而無事禁中穆若以如春臣某忝在具瞻叨監信史載濡彤管難名盛德之毫釐願䕶青宫仰祝脩齡之億萬皇太后賀正牋伏以兩儀叶氣允符泰道之亨萬物資生咸仰坤元之盛賀章載舉歡頌惟均中賀慶衍姜嫄福隆文母肆誕膺於寳冊益著鴻名申擁佑於瑤圖方期燕翼茂對始和之旦倍增永錫之祥臣某濫秉政機恪監史職咫尺天而在上俯攄北向之誠八千嵗以為春永介東朝之壽閑居叢稿卷十五
